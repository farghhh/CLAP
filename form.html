<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Form Validation</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .error { color: #d9534f; font-size: 0.8rem; margin-top: 5px; display: none; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="card">
    <h2>Register</h2>
    <form id="registrationForm">
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="At least 3 characters">
            <div id="userError" class="error">Username is too short.</div>
        </div>

        <div class="input-group">
            <label for="email">Email</label>
            <input type="text" id="email" placeholder="email@example.com">
            <div id="emailError" class="error">Please enter a valid email.</div>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min. 6 characters">
            <div id="passError" class="error">Password must be 6+ characters.</div>
        </div>

        <button type="submit">Submit</button>
    </form>
</div>

<script>
    const form = document.getElementById('registrationForm');

    form.addEventListener('submit', (e) => {
        // Prevent actual submission
        e.preventDefault();

        // Get values
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        let isValid = true;

        // 1. Username Validation (Length check)
        if (username.length < 3) {
            document.getElementById('userError').style.display = 'block';
            isValid = false;
        } else {
            document.getElementById('userError').style.display = 'none';
        }

        // 2. Email Validation (Regex check)
        const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
        if (!email.match(emailPattern)) {
            document.getElementById('emailError').style.display = 'block';
            isValid = false;
        } else {
            document.getElementById('emailError').style.display = 'none';
        }

        // 3. Password Validation
        if (password.length < 6) {
            document.getElementById('passError').style.display = 'block';
            isValid = false;
        } else {
            document.getElementById('passError').style.display = 'none';
        }

        // Final Action
        if (isValid) {
            alert('Form submitted successfully! 🎉');
            form.reset();
        }
    });
</script>

</body>
</html>
