<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CLAP — Schedule</title>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>
<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>

  <main class="main-content">
    <header id="topbar" class="topbar"></header>

    <!-- ======================================================
         PAGE HEADER
         ====================================================== -->
    <div class="sch-header">
      <div>
        <div class="sch-title">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2"></rect>
            <path d="M16 2v4M8 2v4M3 10h18"></path>
          </svg>
          Schedule
        </div>
        <div class="sch-meta" id="sch-week"><b>Week:</b> —</div>
      </div>

      <button class="regen-btn" id="regen-btn" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3">
          <path d="M21 2v6h-6"></path>
          <path d="M3 12a9 9 0 0 1 15.55-6.36L21 8"></path>
          <path d="M3 22v-6h6"></path>
          <path d="M21 12a9 9 0 0 1-15.55 6.36L3 16"></path>
        </svg>
        Regenerate Schedule
      </button>
    </div>

    <!-- ======================================================
         TIMETABLE
         ====================================================== -->
    <div class="timetable-card">
      <table class="timetable">
        <thead>
          <tr>
            <th class="time-col">Time</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
          </tr>
        </thead>
        <tbody id="sch-body">
          <tr>
            <td colspan="6" style="text-align:center;padding:24px;color:var(--text-muted)">
              Loading…
            </td>
          </tr>
        </tbody>
      </table>

      <div class="gen-label">Generated from your assignment difficulty and study plan.</div>
    </div>
  </main>
</div>

<!-- ==========================================================
     LEGEND POPUP
     ========================================================== -->
<button class="info-fab" id="info-fab" type="button">i</button>

<div class="legend-popup" id="legend-popup">
  <div class="leg-row"><span class="leg-sw" style="background:#c8f0d4"></span>Easy</div>
  <div class="leg-row"><span class="leg-sw" style="background:#fde9c0"></span>Medium</div>
  <div class="leg-row"><span class="leg-sw" style="background:#fac8c8"></span>Hard</div>
  <div class="leg-row"><span class="leg-sw" style="background:#b8d4f8"></span>Study</div>
</div>

<!-- ==========================================================
     REGENERATE CONFIRMATION MODAL
     ========================================================== -->
<div id="regen-modal" class="modal-overlay" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(26,58,92,0.35);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
  <div style="background:var(--white);border-radius:var(--radius-xl);padding:var(--space-xl);max-width:400px;width:90%;text-align:center;animation:modalIn 0.25s ease both;">
    <div style="font-size:2.5rem;margin-bottom:var(--space-md)">🔄</div>
    <div style="font-family:var(--font-heading);font-size:1.2rem;font-weight:700;color:var(--text-primary);margin-bottom:var(--space-sm)">Regenerate Schedule?</div>
    <div style="color:var(--text-muted);font-size:.875rem;margin-bottom:var(--space-xl);line-height:1.5">
      This will overwrite your current schedule and any tasks you've marked as done. This cannot be undone.
    </div>
    <div style="display:flex;gap:var(--space-md);justify-content:center;">
      <button class="btn btn-ghost btn-sm" id="regen-cancel" type="button">Cancel</button>
      <button class="btn btn-primary btn-sm" id="regen-confirm" type="button">Yes, Regenerate</button>
    </div>
  </div>
</div>

<script src="js/core.js"></script>
<script src="js/app-shell.js"></script>
<script>
'use strict';

/* ============================================================
   PAGE INIT
   ============================================================ */

// Build shared sidebar / shell
AppShell.init('schedule.html', { showTopbar: false });

// Remove injected topbar because this page uses its own header layout
document.getElementById('topbar')?.remove();

/* ============================================================
   CONSTANTS
   ============================================================ */

// These are the weekdays shown in the schedule table
const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];

/* ============================================================
   SMALL HELPERS
   ============================================================ */

// Escape text before inserting into HTML
function esc(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

// Convert a time string into minutes for sorting
// Supports:
// - 10.00 AM
// - 10:00 AM
// - 09:00
function parseTimeToMinutes(str) {
  if (!str) return 0;

  const s = String(str).trim().replace(/\./g, ':').toUpperCase();

  // Handle 12-hour format
  if (s.includes('AM') || s.includes('PM')) {
    const [time, ap] = s.split(/\s+/);
    let [h, m] = time.split(':').map(Number);

    if (ap === 'PM' && h !== 12) h += 12;
    if (ap === 'AM' && h === 12) h = 0;

    return h * 60 + (m || 0);
  }

  // Handle 24-hour format
  const parts = s.split(':').map(Number);
  return (parts[0] || 0) * 60 + (parts[1] || 0);
}

/* ============================================================
   MOCK DATA
   Used if backend schedule endpoint is missing / empty
   ============================================================ */
function getMock() {
  return {
    week: 'March 10 – 14',
    slots: [
      { id: 1,  day: 'Monday',    time: '10.00 AM', end: '11.00 AM', title: 'Database (FP)', difficulty: 'easy' },
      { id: 2,  day: 'Monday',    time: '11.00 AM', end: '12.00 PM', title: 'Parallel Computing\nAssignment 1', difficulty: 'medium' },
      { id: 3,  day: 'Monday',    time: '2.00 PM',  end: '4.00 PM',  title: 'Mobile Application\nDevelopment (FP)', difficulty: 'hard' },
      { id: 4,  day: 'Tuesday',   time: '10.00 AM', end: '12.00 PM', title: 'Mobile Application\nDevelopment (FP)', difficulty: 'hard' },
      { id: 5,  day: 'Wednesday', time: '10.00 AM', end: '11.00 AM', title: 'Parallel Computing\nAssignment 1', difficulty: 'medium' },
      { id: 6,  day: 'Wednesday', time: '11.00 AM', end: '12.00 PM', title: 'Database (FP)', difficulty: 'easy' },
      { id: 7,  day: 'Thursday',  time: '11.00 AM', end: '12.00 PM', title: 'Mobile Application\nDevelopment (FP)', difficulty: 'hard' },
      { id: 8,  day: 'Thursday',  time: '2.00 PM',  end: '3.00 PM',  title: 'Mobile Application\nDevelopment (FP)', difficulty: 'hard' },
      { id: 9,  day: 'Thursday',  time: '4.00 PM',  end: '5.00 PM',  title: 'Parallel Computing\nAssignment 1', difficulty: 'medium' },
      { id: 10, day: 'Friday',    time: '11.00 AM', end: '12.00 PM', title: 'Parallel Computing\nAssignment 1', difficulty: 'medium' },
      { id: 11, day: 'Friday',    time: '2.00 PM',  end: '4.00 PM',  title: 'Mobile Application\nDevelopment (FP)', difficulty: 'hard' }
    ]
  };
}

/* ============================================================
   NORMALIZE DATA
   This makes schedule rendering safer because backend data
   can come in 2 different shapes:
   1) { slots: [...] }
   2) { Monday:[...], Tuesday:[...], ... }
   ============================================================ */
function normalizeSlots(data) {
  // Shape 1: slots array
  if (Array.isArray(data?.slots)) {
    return data.slots.map((slot, idx) => ({
      id: slot.id || idx + 1,
      day: slot.day,
      time: slot.time,
      end: slot.end || slot.time,
      title: slot.title || 'Untitled Task',
      difficulty: (slot.difficulty || 'study').toLowerCase(),
      completed: !!slot.completed
    }));
  }

  // Shape 2: grouped by day
  if (data && typeof data === 'object') {
    const out = [];

    Object.entries(data).forEach(([day, tasks]) => {
      if (!Array.isArray(tasks)) return;

      tasks.forEach((slot, idx) => {
        out.push({
          id: slot.id || `${day}-${idx + 1}`,
          day,
          time: slot.time,
          end: slot.end || slot.time,
          title: slot.title || 'Untitled Task',
          difficulty: (slot.difficulty || 'study').toLowerCase(),
          completed: !!slot.completed
        });
      });
    });

    return out;
  }

  return [];
}

/* ============================================================
   TIME ROWS
   Build unique row labels from actual schedule times
   ============================================================ */
function buildTimeRows(slots) {
  const seen = new Set();

  slots.forEach(slot => {
    if (slot.time) seen.add(slot.time);
  });

  return [...seen].sort((a, b) => parseTimeToMinutes(a) - parseTimeToMinutes(b));
}

/* ============================================================
   TABLE RENDER
   ============================================================ */
function renderScheduleTable(payload) {
  const body = document.getElementById('sch-body');
  const weekEl = document.getElementById('sch-week');

  // Normalize schedule data first
  const slots = normalizeSlots(payload);

  // Show week text
  weekEl.innerHTML = `<b>Week:</b> ${esc(payload?.week || 'Current Week')}`;

  // If empty, show fallback message
  if (!slots.length) {
    body.innerHTML = `
      <tr>
        <td colspan="6" style="text-align:center;padding:24px;color:var(--text-muted)">
          No schedule available.
        </td>
      </tr>
    `;
    return;
  }

  // Build vertical time rows
  const times = buildTimeRows(slots);

  // Build lookup map: map[day][time] = slot
  const map = {};
  DAYS.forEach(day => map[day] = {});

  slots.forEach(slot => {
    if (map[slot.day]) {
      map[slot.day][slot.time] = slot;
    }
  });

  let html = '';

  times.forEach(time => {
    html += `<tr><td class="time-cell">${esc(time)}</td>`;

    DAYS.forEach(day => {
      const task = map[day][time];

      // Empty cell if no task at this day/time
      if (!task) {
        html += '<td><div class="empty-cell"></div></td>';
        return;
      }

      html += `
        <td>
          <div class="task-block ${task.difficulty} ${task.completed ? 'done' : ''}" id="task-${task.id}">
            <div>
              <div class="tb-title">${esc(task.title)}</div>
              <div class="tb-time">${esc(task.time)} - ${esc(task.end)}</div>
            </div>
            <button
              class="tb-check ${task.completed ? 'done' : ''}"
              onclick="toggleTask('${task.id}', this, event)"
              title="Mark task as done"
            ></button>
          </div>
        </td>
      `;
    });

    html += '</tr>';
  });

  body.innerHTML = html;
}

/* ============================================================
   TASK TOGGLE
   Mark task done / undone
   ============================================================ */
window.toggleTask = async function(id, btn, ev) {
  ev.stopPropagation();

  const block = document.getElementById(`task-${id}`);
  const isDone = !btn.classList.contains('done');

  // Update UI immediately
  btn.classList.toggle('done', isDone);
  if (block) block.classList.toggle('done', isDone);

  // Try backend update if endpoint exists
  try {
    if (window.CLAP && CLAP.API && CLAP.API.patch) {
      await CLAP.API.patch(`/tasks/${id}/`, { completed: isDone });
    }
  } catch (err) {
    // Keep page usable even if backend not ready
  }
};

/* ============================================================
   LOAD SCHEDULE
   ============================================================ */
async function loadSchedule() {
  let data;

  try {
    // Try backend first
    if (window.CLAP && CLAP.API && CLAP.API.get) {
      data = await CLAP.API.get('/schedule/');
    }

    // Force fallback if response is empty/invalid
    if (!data || typeof data !== 'object') {
      throw new Error('Empty schedule response');
    }
  } catch (err) {
    // Fallback to mock data
    data = getMock();
  }

  renderScheduleTable(data);
}

/* ============================================================
   LEGEND POPUP
   ============================================================ */
document.getElementById('info-fab').addEventListener('click', () => {
  document.getElementById('legend-popup').classList.toggle('show');
});

// Close legend when user clicks outside it
document.addEventListener('click', e => {
  if (!e.target.closest('#info-fab') && !e.target.closest('#legend-popup')) {
    document.getElementById('legend-popup').classList.remove('show');
  }
});

/* ============================================================
   REGENERATE MODAL
   ============================================================ */

// Open modal
document.getElementById('regen-btn').addEventListener('click', () => {
  document.getElementById('regen-modal').style.display = 'flex';
});

// Cancel modal
document.getElementById('regen-cancel').addEventListener('click', () => {
  document.getElementById('regen-modal').style.display = 'none';
});

// Close when clicking outside box
document.getElementById('regen-modal').addEventListener('click', function(e) {
  if (e.target === this) {
    this.style.display = 'none';
  }
});

// Confirm regenerate
document.getElementById('regen-confirm').addEventListener('click', async () => {
  document.getElementById('regen-modal').style.display = 'none';

  const btn = document.getElementById('regen-btn');
  btn.disabled = true;
  btn.style.opacity = '.7';

  try {
    // Call backend endpoint if ready
    if (window.CLAP && CLAP.API && CLAP.API.post) {
      await CLAP.API.post('/schedule/regenerate/', {});
    }

    CLAP.Toast?.success?.('Schedule regenerated!');
  } catch (err) {
    // Safe fallback message
    CLAP.Toast?.info?.('Regenerate endpoint not ready yet. Reloading current schedule.');
  } finally {
    // Reload schedule view either way
    await loadSchedule();

    btn.disabled = false;
    btn.style.opacity = '1';
  }
});

/* ============================================================
   START PAGE
   ============================================================ */
loadSchedule();
</script>
</body>
</html>
