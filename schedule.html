<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAP — Schedule</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
</div>
</div>
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>

<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation menu" aria-expanded="false">&#9776;</button>
<div class="sidebar-backdrop" id="sidebar-backdrop" role="presentation"></div>

<div class="app-layout">
  <aside id="sidebar" class="sidebar" aria-label="Main navigation"></aside>

  <main class="main-content" id="main" aria-label="Schedule" tabindex="-1">
    <header id="topbar" class="topbar" role="banner"></header>

    <!-- ===== SCHEDULE HEADER ===== -->
    <div class="assignments-header">
      <h1 class="page-title">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        AI Generated Study Plan
      </h1>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-outline btn-sm" id="prev-week-btn" aria-label="Previous week">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Prev
        </button>
        <span id="week-label" style="font-family:var(--font-heading);font-weight:700;font-size:0.9rem;color:var(--text-primary);white-space:nowrap;"></span>
        <button class="btn btn-outline btn-sm" id="next-week-btn" aria-label="Next week">
          Next
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ===== ERROR BANNER ===== -->
    <div id="schedule-error" class="burnout-alert hidden" role="alert" aria-live="assertive" style="margin-bottom:var(--space-lg);">
      <span class="burnout-alert-icon" aria-hidden="true">⚠️</span>
      <div class="burnout-alert-body">
        <h3 id="schedule-error-title">Could not load schedule</h3>
        <p id="schedule-error-msg">Using sample data. Connect to the backend to see your real schedule.</p>
      </div>
    </div>

    <!-- ===== FULL TIMETABLE ===== -->
    <div class="schedule-full-card" role="region" aria-label="Weekly timetable">
      <div class="timetable-wrap">
        <table class="timetable" id="schedule-table" aria-label="AI generated weekly study plan">
          <thead>
            <tr id="timetable-header">
              <!-- Injected by JS -->
            </tr>
          </thead>
          <tbody id="timetable-body">
            <!-- Injected by JS -->
          </tbody>
        </table>
      </div>

      <!-- Legend -->
      <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:var(--space-lg);padding-top:var(--space-md);border-top:1px solid var(--border);" role="list" aria-label="Subject legend">
        <div id="schedule-legend" style="display:flex;flex-wrap:wrap;gap:10px;"></div>
      </div>
    </div>

    <!-- ===== COGNITIVE LOAD ROW ===== -->
    <div style="margin-top:var(--space-lg);" role="region" aria-label="Daily workload summary">
      <h2 class="section-title">Daily Workload Breakdown</h2>
      <div id="daily-workload-cards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:var(--space-md);">
        <!-- Injected by JS -->
      </div>
    </div>

    <!-- ===== CLAP RECOMMENDATION (if any) ===== -->
    <div id="schedule-recommendation" class="recommendation-card hidden" role="alert" aria-live="polite" style="margin-top:var(--space-lg);">
      <div class="rec-header">
        <span class="rec-icon" aria-hidden="true">⚡</span>
        <span class="rec-title">CLAP Smart Recommendation</span>
        <span class="rec-badge" aria-hidden="true">Generated by CLAP</span>
      </div>
      <div class="rec-body">
        <p id="rec-alert-text" class="rec-alert"></p>
        <p id="rec-suggestion-text" style="font-size:0.875rem;color:var(--text-secondary);margin-top:6px;"></p>
        <p id="rec-reduction-text" style="font-size:0.875rem;font-weight:700;color:var(--success);margin-top:4px;"></p>
      </div>
    </div>

  </main>
</div>

<!-- ===== TASK DETAIL MODAL ===== -->
<div id="task-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="task-modal-title" aria-hidden="true">
  <div class="modal-card" style="max-width:400px;">
    <div class="modal-header">
      <h2 class="modal-title" id="task-modal-title">Task Details</h2>
      <button class="modal-close" id="task-modal-close" aria-label="Close task details">×</button>
    </div>
    <div class="modal-body" id="task-modal-body">
      <!-- Injected by JS -->
    </div>
    <div class="modal-footer" style="justify-content:flex-end;">
      <button class="btn btn-outline btn-sm" id="task-modal-dismiss">Close</button>
    </div>
  </div>
</div>

<script src="js/core.js"></script>
<script src="js/app-shell.js"></script>
<script>
'use strict';

/* ============================================================
   SCHEDULE PAGE
   - Fetches /schedule/ from the Django API
   - Falls back to MockData if the API is unavailable
   - Renders a full Mon–Fri weekly timetable
   - Week navigation (prev/next)
   ============================================================ */

/* ---------- Constants ---------- */
const TIME_SLOTS = ['09:00','10:00','11:00','12:00','13:00','14:00'];
const DAYS       = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const DAY_KEYS   = ['mon','tue','wed','thu','fri'];
const COLORS     = ['orange','blue','red','purple','green'];

/* Color assignment map: subject name → color class */
const colorMap = {};
let colorIndex = 0;
function getColor(subject) {
  const key = (subject || '').toLowerCase().split(' ')[0];
  if (!colorMap[key]) {
    colorMap[key] = COLORS[colorIndex % COLORS.length];
    colorIndex++;
  }
  return colorMap[key];
}

/* ---------- Week Navigation ---------- */
let weekOffset = 0; // 0 = current week

function getWeekStart(offset = 0) {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  monday.setHours(0, 0, 0, 0);
  return monday;
}

function formatWeekLabel(monday) {
  const friday = new Date(monday);
  friday.setDate(monday.getDate() + 4);
  const fmt = d => d.toLocaleDateString('en-MY', { day: 'numeric', month: 'short' });
  return `${fmt(monday)} – ${fmt(friday)}, ${friday.getFullYear()}`;
}

function updateWeekLabel() {
  const monday = getWeekStart(weekOffset);
  document.getElementById('week-label').textContent = formatWeekLabel(monday);
}

/* ---------- API / Data ---------- */
async function fetchSchedule() {
  try {
    const data = await CLAP.API.get('/schedule/');
    return { source: 'api', data };
  } catch (err) {
    showError('Could not connect to server.', 'Showing sample schedule data. Your real schedule will appear once the backend is connected.');
    return { source: 'mock', data: buildMockSchedule() };
  }
}

function buildMockSchedule() {
  /* Transforms CLAP.MockData.schedule into the format expected by the renderer */
  const raw = CLAP.MockData ? CLAP.MockData.schedule : null;
  if (raw) return raw;

  /* Fallback static mock */
  return {
    slots: [
      { day: 'mon', time: '09:00', subject: 'Database Project',   code: 'CSC2383', duration: 1, color: 'orange' },
      { day: 'mon', time: '11:00', subject: 'Parallel Computing', code: 'CSC2613', duration: 1, color: 'blue'   },
      { day: 'tue', time: '10:00', subject: 'Study Session',      code: 'SELF',    duration: 2, color: 'blue'   },
      { day: 'wed', time: '11:00', subject: 'Mobile App',         code: 'CSC2434', duration: 2, color: 'red'    },
      { day: 'thu', time: '09:00', subject: 'Mobile App',         code: 'CSC2434', duration: 1, color: 'red'    },
      { day: 'thu', time: '11:00', subject: 'Database Project',   code: 'CSC2383', duration: 1, color: 'orange' },
      { day: 'fri', time: '10:00', subject: 'Study Session',      code: 'SELF',    duration: 2, color: 'blue'   },
    ],
    recommendation: {
      alert: 'Thursday exceeds safe cognitive load.',
      suggestion: 'Move "Parallel Computing Assignment" to Friday 14:00.',
      reduction: 22
    },
    daily_load: { mon: 72, tue: 45, wed: 60, thu: 88, fri: 50 }
  };
}

/* ---------- Render Timetable ---------- */
function renderTimetable(schedule) {
  const thead = document.getElementById('timetable-header');
  const tbody = document.getElementById('timetable-body');

  /* --- Header Row --- */
  thead.innerHTML = `
    <th scope="col" style="min-width:44px;">Time / Day</th>
    ${DAYS.map(d => `<th scope="col">${d}</th>`).join('')}
  `;

  /* Build lookup: dayKey+time → slot */
  const lookup = {};
  (schedule.slots || []).forEach(slot => {
    const k = `${slot.day}-${slot.time}`;
    lookup[k] = slot;
  });

  /* Track which cells are spanned (skip rendering) */
  const spanned = new Set();

  /* --- Body Rows --- */
  tbody.innerHTML = '';

  TIME_SLOTS.forEach((time, rowIdx) => {
    const tr = document.createElement('tr');

    /* Time label */
    const timeTd = document.createElement('td');
    timeTd.textContent = time;
    timeTd.setAttribute('scope', 'row');
    tr.appendChild(timeTd);

    DAY_KEYS.forEach(dayKey => {
      const cellId = `${dayKey}-${rowIdx}`;
      if (spanned.has(cellId)) return; /* skipped by rowspan */

      const slotKey = `${dayKey}-${time}`;
      const slot = lookup[slotKey];

      const td = document.createElement('td');

      if (slot) {
        const dur = Math.max(1, slot.duration || 1);
        if (dur > 1) {
          td.rowSpan = dur;
          /* Mark subsequent cells as spanned */
          for (let d = 1; d < dur; d++) {
            const nextRowIdx = rowIdx + d;
            if (nextRowIdx < TIME_SLOTS.length) {
              spanned.add(`${dayKey}-${nextRowIdx}`);
            }
          }
        }
        td.style.verticalAlign = 'top';

        const color = slot.color || getColor(slot.subject);
        const block = document.createElement('button');
        block.className = `task-block ${color}`;
        block.style.cssText = `width:100%;height:100%;min-height:${dur * 52}px;border:none;cursor:pointer;`;
        block.setAttribute('aria-label', `${slot.subject} — ${time}${dur > 1 ? ' for ' + dur + ' hours' : ''}`);
        block.innerHTML = `<span>${slot.subject}</span>`;

        block.addEventListener('click', () => openTaskModal(slot));
        td.appendChild(block);
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  /* --- Recovery Row --- */
  const recoveryRow = document.createElement('tr');
  recoveryRow.className = 'recovery-row';
  const recoveryTh = document.createElement('td');
  recoveryTh.textContent = '14:00';
  recoveryTh.setAttribute('scope', 'row');
  recoveryRow.appendChild(recoveryTh);
  const recoveryTd = document.createElement('td');
  recoveryTd.setAttribute('colspan', '5');
  recoveryTd.textContent = 'RECOVERY / REST';
  recoveryRow.appendChild(recoveryTd);
  tbody.appendChild(recoveryRow);
}

/* ---------- Render Legend ---------- */
function renderLegend(schedule) {
  const legend = document.getElementById('schedule-legend');
  const seen = new Set();
  const items = [];

  (schedule.slots || []).forEach(slot => {
    const key = slot.subject;
    if (!seen.has(key)) {
      seen.add(key);
      items.push({ subject: slot.subject, code: slot.code, color: slot.color || getColor(slot.subject) });
    }
  });

  legend.innerHTML = items.map(item => `
    <div style="display:flex;align-items:center;gap:6px;" role="listitem">
      <span style="width:14px;height:14px;border-radius:4px;background:var(--assign-${item.color},var(--clap-teal));display:inline-block;flex-shrink:0;" aria-hidden="true"></span>
      <span style="font-size:0.78rem;font-weight:600;color:var(--text-secondary);">${item.subject}${item.code && item.code !== 'SELF' ? ` (${item.code})` : ''}</span>
    </div>
  `).join('');
}

/* ---------- Render Daily Load Cards ---------- */
function renderDailyLoad(schedule) {
  const container = document.getElementById('daily-workload-cards');
  if (!schedule.daily_load) { container.innerHTML = ''; return; }

  const load = schedule.daily_load;
  container.innerHTML = DAYS.map((day, i) => {
    const key = DAY_KEYS[i];
    const pct = load[key] || 0;
    let badgeClass = 'low', badgeLabel = 'Low';
    if (pct >= 80) { badgeClass = 'critical'; badgeLabel = 'Critical'; }
    else if (pct >= 60) { badgeClass = 'high'; badgeLabel = 'High'; }
    else if (pct >= 40) { badgeClass = 'moderate'; badgeLabel = 'Moderate'; }

    return `
      <div class="stat-card" aria-label="${day} workload ${pct}%">
        <span class="stat-label" style="font-size:0.75rem;">${day}</span>
        <span class="stat-value" style="font-size:1.4rem;">${pct}%</span>
        <span class="load-badge ${badgeClass}">${badgeLabel}</span>
      </div>
    `;
  }).join('');
}

/* ---------- Render Recommendation ---------- */
function renderRecommendation(schedule) {
  const rec = schedule.recommendation;
  const card = document.getElementById('schedule-recommendation');
  if (!rec) { card.classList.add('hidden'); return; }

  card.classList.remove('hidden');
  document.getElementById('rec-alert-text').textContent    = '⚠ ' + (rec.alert || '');
  document.getElementById('rec-suggestion-text').innerHTML = `<strong>Suggested change:</strong> ${rec.suggestion || ''}`;
  document.getElementById('rec-reduction-text').textContent = rec.reduction
    ? `Estimated stress reduction: ${rec.reduction}%`
    : '';
}

/* ---------- Task Detail Modal ---------- */
function openTaskModal(slot) {
  const modal = document.getElementById('task-modal');
  const body  = document.getElementById('task-modal-body');
  document.getElementById('task-modal-title').textContent = slot.subject;

  body.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:12px;">
      ${slot.code && slot.code !== 'SELF' ? `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg-light);border-radius:var(--radius-sm);">
        <span style="font-size:0.8rem;font-weight:700;color:var(--text-muted);">Course Code</span>
        <span style="font-size:0.875rem;font-weight:700;color:var(--text-primary);">${slot.code}</span>
      </div>` : ''}
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg-light);border-radius:var(--radius-sm);">
        <span style="font-size:0.8rem;font-weight:700;color:var(--text-muted);">Time</span>
        <span style="font-size:0.875rem;font-weight:700;color:var(--text-primary);">${slot.time}${slot.duration > 1 ? ' – ' + addHours(slot.time, slot.duration) : ''}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg-light);border-radius:var(--radius-sm);">
        <span style="font-size:0.8rem;font-weight:700;color:var(--text-muted);">Duration</span>
        <span style="font-size:0.875rem;font-weight:700;color:var(--text-primary);">${slot.duration || 1} hour${(slot.duration || 1) > 1 ? 's' : ''}</span>
      </div>
      ${slot.day ? `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg-light);border-radius:var(--radius-sm);">
        <span style="font-size:0.8rem;font-weight:700;color:var(--text-muted);">Day</span>
        <span style="font-size:0.875rem;font-weight:700;color:var(--text-primary);">${DAYS[DAY_KEYS.indexOf(slot.day)] || slot.day}</span>
      </div>` : ''}
    </div>
  `;

  modal.classList.remove('hidden');
  modal.setAttribute('aria-hidden', 'false');
  document.getElementById('task-modal-close').focus();
  document.body.style.overflow = 'hidden';
}

function closeTaskModal() {
  const modal = document.getElementById('task-modal');
  modal.classList.add('hidden');
  modal.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

function addHours(timeStr, hours) {
  const [h, m] = timeStr.split(':').map(Number);
  const total = h + hours;
  return `${String(total).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}

/* ---------- Error Banner ---------- */
function showError(title, msg) {
  const banner = document.getElementById('schedule-error');
  document.getElementById('schedule-error-title').textContent = title;
  document.getElementById('schedule-error-msg').textContent   = msg;
  banner.classList.remove('hidden');
}

/* ---------- Colour variable fallback ---------- */
function injectColorVars() {
  /* Ensure assign-* CSS variables exist for legend dots */
  const root = document.documentElement.style;
  root.setProperty('--assign-orange', '#F5A623');
  root.setProperty('--assign-blue',   '#4A90D9');
  root.setProperty('--assign-red',    '#E74C3C');
  root.setProperty('--assign-purple', '#9B59B6');
  root.setProperty('--assign-green',  '#27AE60');
}

/* ---------- Init ---------- */
document.addEventListener('DOMContentLoaded', async () => {
  AppShell.init('schedule.html');
  injectColorVars();
  updateWeekLabel();

  const { data: schedule } = await fetchSchedule();

  renderTimetable(schedule);
  renderLegend(schedule);
  renderDailyLoad(schedule);
  renderRecommendation(schedule);

  /* Week nav */
  document.getElementById('prev-week-btn').addEventListener('click', () => {
    weekOffset--;
    updateWeekLabel();
    /* Re-fetch or re-render; for now just update label (backend may support week offset) */
    CLAP.Toast.info('Showing previous week data.');
  });
  document.getElementById('next-week-btn').addEventListener('click', () => {
    weekOffset++;
    updateWeekLabel();
    CLAP.Toast.info('Showing next week data.');
  });

  /* Modal close handlers */
  document.getElementById('task-modal-close').addEventListener('click', closeTaskModal);
  document.getElementById('task-modal-dismiss').addEventListener('click', closeTaskModal);
  document.getElementById('task-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeTaskModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeTaskModal();
  });

  /* Search filter */
  document.addEventListener('clap:search', e => {
    const q = e.detail.toLowerCase();
    document.querySelectorAll('.task-block').forEach(block => {
      const match = block.textContent.toLowerCase().includes(q);
      block.style.opacity = match ? '1' : '0.25';
    });
    if (!q) document.querySelectorAll('.task-block').forEach(b => b.style.opacity = '1');
  });
});
</script>
</body>
</html>
