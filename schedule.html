<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAP — Schedule</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>
<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main-content" id="main">
    <header id="topbar" class="topbar"></header>

    <h1 class="schedule-page-title">Generated Study Plan</h1>

    <div class="card-white">
      <div class="timetable-wrap">
        <table class="timetable" id="schedule-table">
          <thead>
            <tr id="sched-header">
              <th>Time / Day</th>
              <th>Monday</th><th>Tuesday</th><th>Wednesday</th><th>Thursday</th><th>Friday</th>
            </tr>
          </thead>
          <tbody id="sched-body">
            <tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-muted)">Loading schedule…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Legend -->
      <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:var(--space-lg);padding-top:var(--space-md);border-top:1px solid var(--border);" id="sched-legend"></div>
    </div>

  </main>
</div>

<script src="js/core.js"></script>
<script src="js/app-shell.js"></script>
<script>
'use strict';
AppShell.init('schedule.html');

const TIMES = ['09:00','10:00','11:00','12:00','13:00'];
const DAYS  = ['Monday','Tuesday','Wednesday','Thursday','Friday'];

const MOCK_SLOTS = [
  { day:'Monday',    time:'09:00', title:'Database Project',  color:'orange', span:1 },
  { day:'Monday',    time:'11:00', title:'Parallel Comp.',    color:'blue',   span:1 },
  { day:'Tuesday',   time:'10:00', title:'Study Session',     color:'blue',   span:2 },
  { day:'Wednesday', time:'11:00', title:'Mobile App',        color:'red',    span:2 },
  { day:'Thursday',  time:'09:00', title:'Mobile App',        color:'red',    span:1 },
  { day:'Thursday',  time:'11:00', title:'Database Project',  color:'orange', span:1 },
  { day:'Friday',    time:'10:00', title:'Study Session',     color:'blue',   span:2 },
];

async function loadSchedule() {
  let slots;
  try {
    const data = await CLAP.API.get('/schedule/');
    slots = data.slots || data;
  } catch {
    slots = MOCK_SLOTS;
  }
  renderSchedule(slots);
}

function renderSchedule(slots) {
  /* Build lookup: day → time → slot */
  const map = {};
  DAYS.forEach(d => { map[d] = {}; });
  slots.forEach(s => { if (map[s.day]) map[s.day][s.time] = s; });

  /* Track rowspan-skipped cells */
  const skip = {};

  let html = '';
  TIMES.forEach((time, ti) => {
    html += `<tr><td>${time}</td>`;
    DAYS.forEach(day => {
      const key = day + time;
      if (skip[key]) return; /* skipped by rowspan */
      const slot = map[day]?.[time];
      if (slot) {
        const span = slot.span || 1;
        /* Mark subsequent rows as skipped */
        for (let s = 1; s < span; s++) {
          const nextTime = TIMES[ti + s];
          if (nextTime) skip[day + nextTime] = true;
        }
        const rs = span > 1 ? ` rowspan="${span}"` : '';
        html += `<td${rs} style="vertical-align:top"><div class="task-block ${slot.color||'teal'}" style="height:${span>1?span*46+'px':'auto'}">${slot.title}</div></td>`;
      } else {
        html += '<td></td>';
      }
    });
    html += '</tr>';
  });

  /* Recovery row */
  html += `<tr class="recovery-row"><td>14:00</td><td colspan="5">R E C O V E R Y / R E S T</td></tr>`;
  document.getElementById('sched-body').innerHTML = html;

  /* Legend */
  const seen = {};
  const colors = { orange:'#F5A623', blue:'#4A90D9', red:'#E74C3C', purple:'#9B59B6', green:'#27AE60', teal:'#4BBFBF' };
  const legend = document.getElementById('sched-legend');
  legend.innerHTML = [...new Map(slots.map(s => [s.title, s])).values()].map(s =>
    `<div style="display:flex;align-items:center;gap:6px;">
      <span style="width:14px;height:14px;border-radius:4px;background:${colors[s.color]||colors.teal};display:inline-block;flex-shrink:0;"></span>
      <span style="font-size:0.78rem;font-weight:600;color:var(--text-secondary);">${s.title}</span>
    </div>`
  ).join('');
}

loadSchedule();
</script>
</body>
</html>
