<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CLAP — Schedule</title>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/app.css"/>
  <style>
    /* ── Page header ── */
    .sch-title   {
      font-family:var(--font-heading);
      font-size:1.5rem;
      font-weight:800;
      color:var(--clap-teal);
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:4px;
    }
    .sch-meta    {
      font-size:0.82rem;
      color:var(--text-muted);
      font-weight:600;
    }
    .sch-meta b  {
      color:var(--text-secondary);
      font-weight:700;
    }

    /* ===== HEADER FIX ===== */
    .sch-header {
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:20px;
      margin-bottom:8px;
    }

    .sch-header-left {
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    /* ===== CLEAN WEEK NAV ===== */
    .week-nav {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin: 10px 0 22px;

      background: rgba(255,255,255,0.6);
      border-radius: 999px;
      padding: 6px 16px;
      width: fit-content;
      margin: 12px auto 22px;
    }

    /* Date */
    .nav-label {
      font-weight:800;
      font-size:1.1rem;
      color:var(--clap-teal);
    }

    /* Arrows */
    .nav-arrow {
      cursor:pointer;
      font-size:1.8rem;
      font-weight:900;
      color: var(--clap-teal);
      line-height: 1;
      padding: 6px 10px;
      border-radius: 8px;
      display:inline-flex;
      align-items:center;
      justify-content: center;
      transition:all 0.2s ease;
      /* button reset */
      background: none;
      border: none;
      font-family: inherit;
    }
    .nav-arrow:hover {
      background:rgba(75, 191, 191, 0.12);
      transform: scale(1.1);
    }

    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Timetable card ── */
    .timetable-card {
      background:var(--white);
      border-radius:var(--radius-lg);
      padding:var(--space-lg);
      box-shadow:var(--shadow-card);
      overflow-x:auto;
    }
    .timetable {
      min-width:650px;
      width:100%;
      border-collapse:separate;
      border-spacing:4px;
    }
    .timetable th {
      font-family:var(--font-heading);
      font-size:0.82rem;
      font-weight:700;
      color:var(--text-secondary);
      text-align:center;
      padding:12px 6px;
      background:var(--bg-light);
      border-radius:var(--radius-sm);
    }
    .timetable th.time-col {
      text-align:left;
      background:transparent;
      color:var(--text-muted);
      font-size:0.72rem;
      min-width:60px;
      padding-left:4px;
    }
    .timetable td {
      vertical-align:top;
      padding:2px;
      min-width:110px;
    }
    .timetable td.time-cell {
      font-size:0.72rem;
      font-weight:700;
      color:var(--text-muted);
      text-align:left;
      padding-left:4px;
      padding-top:8px;
      min-width:60px;
      white-space:nowrap;
      vertical-align:top;
    }

    /* Task blocks */
    .task-block {
      border-radius:var(--radius-md);
      padding:10px 12px;
      font-size:0.72rem;
      font-weight:700;
      min-height:56px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      cursor:pointer;
      transition:transform var(--transition), box-shadow var(--transition);
      position:relative;
    }
    .task-block:hover {
      transform:translateY(-2px);
      box-shadow:0 6px 18px rgba(0,0,0,0.12);
    }
    .task-block.easy   { background:#c8f0d4; color:#1a5c30; }
    .task-block.medium { background:#fde9c0; color:#7a4300; }
    .task-block.hard   { background:#fac8c8; color:#7a1a1a; }

    .tb-title {
      font-size:0.78rem;
      font-weight:800;
      line-height:1.25;
      margin-bottom:2px;
      white-space:pre-line;
    }
    .tb-time {
      font-size:0.66rem;
      font-weight:600;
      opacity:0.8;
    }

    .tb-check {
      position:absolute;
      bottom:8px;
      right:8px;
      width:20px;
      height:20px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,0.8);
      background:rgba(255,255,255,0.5);
      cursor:pointer;
      transition:background var(--transition);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      color:transparent;
    }
    .tb-check:hover {
      background:rgba(255,255,255,0.85);
      color:rgba(0,0,0,0.5);
    }
    .tb-check.done {
      background:rgba(255,255,255,0.9);
      color:#27AE60;
      border-color:rgba(255,255,255,1);
    }
    .tb-check::after {
      content:'✓';
      font-size:10px;
      font-weight:800;
    }

    .empty-cell { height:56px; }

    .gen-label {
      text-align:center;
      font-size:0.72rem;
      color:var(--text-muted);
      font-style:italic;
      margin-top:var(--space-md);
    }

    .task-block.done {
      opacity:0.5;
      text-decoration:line-through;
      filter:grayscale(0.4);
    }
    .tb-check.done {
      background:rgba(75, 191, 191, 0.8);
      border-color:var(--clap-teal);
    }

    /* ── Legend popup ── */
    .info-fab {
      position:fixed;
      bottom:28px;
      right:28px;
      width:38px;
      height:38px;
      border-radius:50%;
      background:var(--clap-teal);
      color:#fff;
      border:none;
      cursor:pointer;
      font-size:1rem;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 4px 14px rgba(75,191,191,0.4);
      z-index:50;
    }
    .legend-popup {
      position:fixed;
      bottom:74px;
      right:28px;
      background:#fff;
      border-radius:var(--radius-md);
      padding:var(--space-md);
      box-shadow:var(--shadow-md);
      display:none;
      z-index:60;
      min-width:155px;
    }
    .legend-popup.show { display:block; }
    .leg-row {
      display:flex;
      align-items:center;
      gap:8px;
      font-size:0.78rem;
      font-weight:600;
      color:var(--text-muted);
      padding:3px 0;
    }
    .leg-sw {
      width:14px;
      height:14px;
      border-radius:4px;
      flex-shrink:0;
    }

    @media (max-width: 700px) {
      .sch-header {
        align-items:stretch;
        gap:12px;
      }
      .week-nav {
        justify-content:center;
        width: 100%;
      }
      .regen-btn {
        align-self: flex-start;
      }
    }

    /* ── Pixel-height proportional calendar (schedule page) ── */
    .px-calendar   { overflow-x:auto; }
    .px-hdr-row    { display:grid; grid-template-columns:64px repeat(5,1fr); gap:4px; margin-bottom:4px; }
    .px-hdr-time   { background:transparent; }
    .px-hdr-day    { font-family:var(--font-heading); font-size:0.82rem; font-weight:700; color:var(--text-secondary); text-align:center; padding:12px 6px; background:var(--bg-light); border-radius:var(--radius-sm); }
    .px-body       { display:grid; grid-template-columns:64px repeat(5,1fr); gap:4px; min-width:640px; position:relative; }
    .px-time-col   { position:relative; }
    .px-time-lbl   { position:absolute; right:6px; font-size:0.65rem; font-weight:700; color:var(--text-muted); transform:translateY(-50%); white-space:nowrap; }
    .px-hline      { position:absolute; left:0; right:0; height:1px; background:var(--border); opacity:0.4; pointer-events:none; }
    .px-day-col    { position:relative; }
    .px-block      { position:absolute; left:2px; right:2px; border-radius:var(--radius-md); padding:8px 10px; display:flex; flex-direction:column; justify-content:space-between; cursor:pointer; box-sizing:border-box; transition:transform 0.15s,box-shadow 0.15s; overflow:hidden; }
    .px-block:hover{ transform:translateY(-1px); box-shadow:0 6px 18px rgba(0,0,0,0.12); }
    .px-block.easy  { background:#c8f0d4; color:#1a5c30; }
    .px-block.medium{ background:#fde9c0; color:#7a4300; }
    .px-block.hard  { background:#fac8c8; color:#7a1a1a; }
    .px-block.done  { opacity:0.5; filter:grayscale(0.4); }
    .px-block-inner { flex:1; overflow:hidden; }
    /* tb-check, tb-title, tb-time reused from existing CSS */
    .px-block .tb-check { position:absolute; bottom:6px; right:6px; }
  </style>
</head>
<body>
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>
<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle">&#9776;</button>
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main-content">

    <!-- Page header -->
    <div class="sch-header">

      <!-- LEFT -->
      <div class="sch-header-left">
        <div class="sch-title">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          Schedule
        </div>

        <div class="sch-meta" id="sch-week">
          <b>Week:</b> —
        </div>
      </div>
      
      <!-- RIGHT -->
      <button class="regen-btn" id="regen-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">

          <path d="M1 20v-6h6"/>

    <!-- Timetable -->
    <div class="timetable-card">

</div>

<!-- Floating legend button -->
<button class="info-fab" id="info-fab" aria-label="Show legend">i</button>
<div class="legend-popup" id="legend-popup" role="tooltip">
  <div class="leg-row"><div class="leg-sw" style="background:#c8f0d4"></div>Easy</div>
  <div class="leg-row"><div class="leg-sw" style="background:#fde9c0"></div>Medium</div>
  <div class="leg-row"><div class="leg-sw" style="background:#fac8c8"></div>Hard</div>
</div>

<!-- Regenerate confirmation modal -->
<div id="regen-modal" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(26,58,92,0.35);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
  <div style="background:var(--white);border-radius:var(--radius-xl);padding:var(--space-xl);max-width:400px;width:90%;text-align:center;animation:modalIn 0.25s ease both;">
    <div style="font-size:2.5rem;margin-bottom:var(--space-md)">🔄</div>
    <div style="font-family:var(--font-heading);font-size:1.2rem;font-weight:700;color:var(--text-primary);margin-bottom:var(--space-sm)">Regenerate Schedule?</div>
    <div style="color:var(--text-muted);font-size:0.875rem;margin-bottom:var(--space-xl);line-height:1.5">
      This will overwrite your current schedule and any tasks you've marked as done. This cannot be undone.
    </div>
    <div style="display:flex;gap:var(--space-md);justify-content:center;">
      <button class="btn btn-ghost btn-sm" id="regen-cancel">Cancel</button>
      <button class="btn btn-primary btn-sm" id="regen-confirm">Yes, Regenerate</button>
    </div>
  </div>
</div>

<script src="js/core.js"></script>
<script src="js/app-shell.js"></script>
<script>
'use strict';

AppShell.init('schedule.html', { showTopbar: false });

const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
let weekOffset = 0;



/* ── MOCK DATA ───────────────────────────────────────────── */
function getMock() {
  return {
    week: 'March 10 – 14',
    slots: [
      { day:'Monday',    time:'10.00 AM', end:'11.00 AM', title:'Database (FP)', difficulty:'easy' },
      { day:'Monday',    time:'11.00 AM', end:'12.00 PM', title:'Parallel Computing\nAssignment 1', difficulty:'easy' },
      { day:'Tuesday',   time:'10.00 AM', end:'12.00 PM', title:'Mobile Application\nDevelopment (FP)', difficulty:'hard' },
      { day:'Friday',    time:'9.00 AM',  end:'1.00 PM',  title:'CSC123 Yapping', difficulty:'hard' }
    ]
  };
}

/* ── TIME HELPERS ────────────────────────────────────────── */
function buildTimeRows(slots) {
  const seen = new Set();
  slots.forEach(s => seen.add(s.time));

  return [...seen].sort((a, b) => {
    const parse = t => {
      const [hm, ap] = t.split(' ');
      let [h, mi] = hm.split('.').map(Number);
      if (ap === 'PM' && h !== 12) h += 12;
      if (ap === 'AM' && h === 12) h = 0;
      return h * 60 + (mi || 0);
    };
    return parse(a) - parse(b);
  });
}

function buildEndMinutes(time) {
  const [hm, ap] = time.split(' ');
  let [h, mi] = hm.split('.').map(Number);
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  return h * 60 + (mi || 0);
}

function formatTime(time24) {
  if (!time24) return '';

  /* If the value is already in "H.MM AM/PM" format (e.g. from mock data), pass through */
  if (/^\d{1,2}\.\d{2}\s?(AM|PM)$/i.test(time24.trim())) return time24.trim();

  let [hour, minute] = time24.split(':').map(Number);
  if (isNaN(hour)) return time24; // unrecognised format — return as-is
  const ampm = hour >= 12 ? 'PM' : 'AM';

  if (hour === 0) hour = 12;
  else if (hour > 12) hour -= 12;

  return `${hour}.${String(minute).padStart(2, '0')} ${ampm}`;
}

function addHoursToTime(time24, duration) {
  if (!time24) return '';

  let [hour, minute] = time24.split(':').map(Number);
  const startTotal = hour * 60 + minute;
  const endTotal = startTotal + (duration * 60);

  let endHour = Math.floor(endTotal / 60) % 24;
  const endMinute = endTotal % 60;
  const ampm = endHour >= 12 ? 'PM' : 'AM';

  if (endHour === 0) endHour = 12;
  else if (endHour > 12) endHour -= 12;

  return `${endHour}.${String(endMinute).padStart(2, '0')} ${ampm}`;
}

function mapDifficulty(duration) {
  if (duration <= 1) return 'easy';
  if (duration <= 2) return 'medium';
  return 'hard';
}

/* ── NORMALIZE BACKEND RESPONSE ──────────────────────────── */
function normalizeScheduleData(apiData) {
  if (!apiData) return { week: '—', slots: [] };

  const dayMap = {
    mon: 'Monday',
    tue: 'Tuesday',
    wed: 'Wednesday',
    thu: 'Thursday',
    fri: 'Friday'
  };

  /*
   * The backend may return slots under different keys, or as a day-keyed
   * object ({ Monday: [...], Tuesday: [...] }) rather than a flat array.
   * Resolve to a flat array before processing.
   */
  function extractRawSlots(data) {
    /* Flat array keys — try each in order of likelihood */
    for (const key of ['slots', 'sessions', 'schedule_slots', 'data', 'items']) {
      if (Array.isArray(data[key]) && data[key].length > 0) return data[key];
    }
    /* Day-keyed object: { Monday: [...], Tuesday: [...], ... } */
    const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
    if (DAY_NAMES.some(d => Array.isArray(data[d]))) {
      return DAY_NAMES.flatMap(d =>
        (data[d] || []).map(s => ({ ...s, day: s.day || d.slice(0,3).toLowerCase() }))
      );
    }
    /* If the response itself is an array */
    if (Array.isArray(data)) return data;
    return [];
  }

  /* Helper: convert total minutes → formatted "H.MM AM/PM" string */
  function minsToFormatted(totalMins) {
    let h = Math.floor(totalMins / 60) % 24;
    const m = totalMins % 60;
    const ampm = h >= 12 ? 'PM' : 'AM';
    if (h === 0) h = 12;
    else if (h > 12) h -= 12;
    return `${h}.${String(m).padStart(2, '0')} ${ampm}`;
  }

  /* Helper: parse raw "HH:MM" 24h string → total minutes */
  function rawTimeToMins(t) {
    if (!t) return 0;
    const [h, m] = String(t).split(':').map(Number);
    return h * 60 + (m || 0);
  }

  /*
   * FIX: The backend assigns slot times by index (slot 0 → study_start,
   * slot 1 → study_start+1h, slot 2 → study_start+2h …) regardless of
   * each session's actual duration. This causes overlapping/wrong times.
   *
   * Correct approach: group slots by day, then recalculate each session's
   * start time cumulatively — session N starts where session N-1 ends.
   * We use the backend's time field for session 0 as the anchor, then
   * chain the rest using their actual durations.
   */

  /* First pass: build raw slots with duration info, grouped by day */
  const rawByDay = {};
  extractRawSlots(apiData).forEach(slot => {
    const day = dayMap[(slot.day || '').toLowerCase()] || slot.day;
    if (!rawByDay[day]) rawByDay[day] = [];
    const sessionDuration = slot.duration ?? slot.scheduled_hours ?? slot.duration_hours ?? 1;
    const rawDiff = slot.difficulty ?? slot.task_difficulty ?? slot.assignment_difficulty ?? null;
    const difficulty = (rawDiff !== null && rawDiff !== '')
      ? String(rawDiff).trim().toLowerCase()
      : mapDifficulty(sessionDuration);
    rawByDay[day].push({
      slot_id:       slot.session_id ?? slot.id       ?? slot.slot_id ?? null,
      assignment_id: slot.task_id    ?? slot.assignment_id ?? null,
      day,
      rawTime:       slot.time,       // original "HH:MM" string for anchor
      hasRealEnd:    !!slot.end,
      rawEnd:        slot.end || null,
      title:         slot.title || slot.name || [slot.code, slot.subject].filter(Boolean).join(' '),
      difficulty,
      is_completed:  slot.is_completed || false,
      duration:      sessionDuration,
    });
  });

  /* Second pass: for each day, recalculate start/end times cumulatively */
  const slots = [];
  Object.values(rawByDay).forEach(daySessions => {
    /* Anchor: use first session's raw time as the day's study start */
    let curMins = rawTimeToMins(daySessions[0].rawTime);

    daySessions.forEach(s => {
      const startMins = curMins;
      const durationMins = Math.round(s.duration * 60);
      const endMins = startMins + durationMins;

      slots.push({
        slot_id:       s.slot_id,
        assignment_id: s.assignment_id,
        day:           s.day,
        time:          minsToFormatted(startMins),
        end:           s.hasRealEnd ? formatTime(s.rawEnd) : minsToFormatted(endMins),
        title:         s.title,
        difficulty:    s.difficulty,
        is_completed:  s.is_completed,
        duration:      s.duration,
      });

      /* Next session starts where this one ends */
      curMins = endMins;
    });
  });

  return {
    week: (apiData.week && apiData.week.trim && apiData.week.trim() !== '')
      ? apiData.week
      : getWeekLabelFromOffset(weekOffset),
    slots
  };
}

/* ── WEEK LABEL ──────────────────────────────────────────── */
function getWeekLabelFromOffset(offset) {
  const today = new Date();
  const day = today.getDay();
  const mondayOffset = day === 0 ? -6 : 1 - day;

  const monday = new Date(today);
  monday.setDate(today.getDate() + mondayOffset + (offset * 7));

  const friday = new Date(monday);
  friday.setDate(monday.getDate() + 4);

  const monthNames = [
    'January', 'February', 'March', 'April', 'May', 'June',
    'July', 'August', 'September', 'October', 'November', 'December'
  ];

  const startMonth = monthNames[monday.getMonth()];
  const endMonth = monthNames[friday.getMonth()];
  const startDate = monday.getDate();
  const endDate = friday.getDate();

  if (monday.getMonth() === friday.getMonth()) {
    return `${startMonth} ${startDate} – ${endDate}`;
  }

  return `${startMonth} ${startDate} – ${endMonth} ${endDate}`;
}

function updateWeekNavLabel() {
  const label = getWeekLabelFromOffset(weekOffset);
  document.getElementById('week-nav-label').textContent = label;
}

/* ── RENDER TIMETABLE — proportional pixel-height calendar ── */
function renderSchedule(data) {
  document.getElementById('sch-week').innerHTML = `<b>Week:</b> ${data.week || '—'}`;

  const slots = data.slots || [];

  if (!slots.length) {
    const emptyMsg = weekOffset === 0
      ? 'No sessions scheduled for this week yet. Use › to check next week or tap Regenerate.'
      : weekOffset > 0
        ? 'No sessions scheduled for this week.'
        : 'No sessions for that week.';
    document.getElementById('sch-body').innerHTML =
      `<tr><td colspan="6" style="text-align:center;padding:36px 24px;color:var(--text-muted);font-size:0.88rem">${emptyMsg}</td></tr>`;
    return;
  }

  const PX_PER_MIN = 1.3;  // 1 minute = 1.3px → 1 hour = 78px

  /* Convert formatted time (H.MM AM/PM) to total minutes */
  function toMins(t) {
    if (!t) return 0;
    t = t.trim();
    const [hm, ap] = t.split(/\s+/);
    let [h, m] = hm.split('.').map(Number);
    if (/PM/i.test(ap) && h !== 12) h += 12;
    if (/AM/i.test(ap) && h === 12) h = 0;
    return h * 60 + (m || 0);
  }
  function minsToLabel(mins) {
    let h = Math.floor(mins / 60) % 24;
    const m = mins % 60;
    const ap = h >= 12 ? 'PM' : 'AM';
    if (h === 0) h = 12; else if (h > 12) h -= 12;
    return `${h}.${String(m).padStart(2,'0')} ${ap}`;
  }

  /* Group by day, sorted by start time */
  const daySlots = {};
  DAYS.forEach(d => { daySlots[d] = []; });
  slots.forEach(s => { if (daySlots[s.day]) daySlots[s.day].push(s); });
  DAYS.forEach(d => { daySlots[d].sort((a,b) => toMins(a.time) - toMins(b.time)); });

  /* Time window */
  const allSlots = slots;
  const minMins  = Math.floor(Math.min(...allSlots.map(s => toMins(s.time))) / 60) * 60;
  const maxMins  = Math.ceil( Math.max(...allSlots.map(s => toMins(s.end)))  / 60) * 60;
  const bodyH    = (maxMins - minMins) * PX_PER_MIN;

  /* Replace <table> with a CSS-grid based pixel calendar */
  const card = document.querySelector('.timetable-card');
  const genLabel = document.getElementById('gen-label');

  /* Build the pixel-calendar container (replaces table) */
  const DIFF_COLOR = { easy:'easy', medium:'medium', hard:'hard' };

  /* Time axis + hour lines */
  let timeAxisHTML = '';
  let hlinesHTML   = '';
  for (let m = minMins; m <= maxMins; m += 60) {
    const top = (m - minMins) * PX_PER_MIN;
    timeAxisHTML += `<div class="px-time-lbl" style="top:${top}px">${minsToLabel(m)}</div>`;
    hlinesHTML   += `<div class="px-hline"    style="top:${top}px"></div>`;
  }

  /* Day columns */
  const dayCols = DAYS.map(day => {
    const blocks = daySlots[day].map(slot => {
      const top    = (toMins(slot.time) - minMins) * PX_PER_MIN;
      const height = Math.max((toMins(slot.end) - toMins(slot.time)) * PX_PER_MIN - 3, 40);
      const doneClass = slot.is_completed ? 'done' : '';
      const checkDoneClass = slot.is_completed ? 'done' : '';
      const dataAttrs = [
        slot.slot_id       != null ? `data-slot-id="${slot.slot_id}"`             : '',
        slot.assignment_id != null ? `data-assignment-id="${slot.assignment_id}"` : '',
      ].filter(Boolean).join(' ');

      return `<div class="px-block ${slot.difficulty} ${doneClass}" ${dataAttrs}
                   data-duration="${slot.duration || 1}"
                   style="top:${top}px;height:${height}px;">
        <div class="px-block-inner">
          <div class="tb-title">${slot.title}</div>
          <div class="tb-time">${slot.time} – ${slot.end}</div>
        </div>
        <button class="tb-check ${checkDoneClass}" onclick="toggleDone(this)" title="Mark done"></button>
      </div>`;
    }).join('');
    return `<div class="px-day-col" style="height:${bodyH}px">${blocks}</div>`;
  }).join('');

  /* Day headers row */
  const hdrs = `<div class="px-hdr-row">
    <div class="px-hdr-time"></div>
    ${DAYS.map(d => `<div class="px-hdr-day">${d}</div>`).join('')}
  </div>`;

  /* Body — hlines go in an absolute overlay so they span all day columns */
  const body = `<div class="px-body" style="height:${bodyH}px;">
    <div class="px-time-col" style="height:${bodyH}px">${timeAxisHTML}</div>
    <div style="position:absolute;left:68px;right:0;top:0;height:${bodyH}px;pointer-events:none;">${hlinesHTML}</div>
    ${dayCols}
  </div>`;

  card.innerHTML = `<div class="px-calendar">${hdrs}${body}</div>`;
  if (genLabel) card.appendChild(genLabel);
}

/* ── LOAD SCHEDULE ───────────────────────────────────────── */
async function loadSchedule(offset = 0, options = {}) {
  const { silent = false } = options;

  weekOffset = offset;
  updateWeekNavLabel();
  const currentWeekLabel = getWeekLabelFromOffset(weekOffset);
  document.getElementById('sch-week').innerHTML = `<b>Week:</b> ${currentWeekLabel}`;

  let apiData;
  try {
    apiData = await CLAP.API.get(`/schedule/?week_offset=${weekOffset}`);
  } catch (err) {
    console.error('[CLAP] Schedule load error:', err);
    CLAP.Toast.error('Could not load schedule. Please try again.');
    renderSchedule({ week: currentWeekLabel, slots: [] });
    return;
  }

  /* null = 401 expired session, core.js is already redirecting to sign-in */
  if (apiData === null) return;

  const normalizedData = normalizeScheduleData(apiData);
  normalizedData.week = currentWeekLabel;
  renderSchedule(normalizedData);
}

/* ── DONE TOGGLE ─────────────────────────────────────────── */
/*
 * When a session is ticked:
 *  1. UI updates immediately (optimistic — no spinner)
 *  2. PATCH /schedule/slots/{slot_id}/   → is_completed: true/false
 *  3. Recalculate progress for that assignment from the DOM
 *     (done slots / total slots for this assignment_id) * 100
 *  4. PATCH /assignments/{assignment_id}/ → progress: <number>
 *  5. Broadcast via BroadcastChannel so assignments.html updates live
 */
window.toggleDone = async function(btn) {
  const taskBlock    = btn.closest('.task-block') || btn.closest('.px-block');
  const isDone       = !taskBlock.classList.contains('done'); // toggling TO this state
  const slotId       = taskBlock.dataset.slotId       || null;
  const assignmentId = taskBlock.dataset.assignmentId || null;

  /* Step 1 — update UI immediately, don't wait for API */
  taskBlock.classList.toggle('done', isDone);
  btn.classList.toggle('done', isDone);
  btn.title = isDone ? 'Mark undone' : 'Mark done';

  /* Step 2 — persist slot completion */
  if (slotId) {
    try {
      await CLAP.API.patch(`/schedule/sessions/${slotId}/complete/`, { completed: isDone });
    } catch (err) {
      /* Revert optimistic UI on server error so state doesn't permanently de-sync */
      console.warn('[CLAP] Could not sync slot completion to server:', err);
      taskBlock.classList.toggle('done', !isDone);
      btn.classList.toggle('done', !isDone);
      btn.title = !isDone ? 'Mark undone' : 'Mark done';
      CLAP.Toast.error('Could not save — please try again.');
      return;
    }
  } else {
    /* No slot ID — can't persist, revert and warn */
    taskBlock.classList.toggle('done', !isDone);
    btn.classList.toggle('done', !isDone);
    btn.title = !isDone ? 'Mark undone' : 'Mark done';
    CLAP.Toast.warning('Session ID missing — try regenerating your schedule.');
    return;
  }

  /* Steps 3 + 5 — recalculate client-side progress and broadcast to assignments.html */
  if (assignmentId) {
    /* Progress based on total hours done vs total hours for this assignment */
    const allBlocksSel  = `[data-assignment-id="${assignmentId}"]`;
    const allBlocks     = document.querySelectorAll(`.task-block${allBlocksSel}, .px-block${allBlocksSel}`);
    const doneBlocks    = document.querySelectorAll(`.task-block${allBlocksSel}.done, .px-block${allBlocksSel}.done`);

    /* Use data-duration (hours) if available, else count sessions */
    let totalHours = 0, doneHours = 0;
    allBlocks.forEach(b => {
      const dur = parseFloat(b.dataset.duration || '1');
      totalHours += dur;
      if (b.classList.contains('done')) doneHours += dur;
    });
    const newProgress = totalHours > 0 ? Math.round((doneHours / totalHours) * 100) : (doneBlocks.length > 0 ? Math.round((doneBlocks.length / allBlocks.length) * 100) : 0);

    CLAP.Toast.success(`Progress updated: ${newProgress}%`);

    /* Step 5 — notify assignments.html if open in another tab */
    try {
      const ch = new BroadcastChannel('clap_progress');
      ch.postMessage({ type: 'progress_update', assignmentId, progress: newProgress });
      ch.close();
    } catch { /* BroadcastChannel not supported — silent fail */ }
  } else {
    CLAP.Toast.success(isDone ? 'Session marked complete!' : 'Session unmarked.');
  }
};

/* ── WEEK NAVIGATION ─────────────────────────────────────── */
document.getElementById('prev-week-btn').addEventListener('click', () => {
  loadSchedule(weekOffset - 1);
});

document.getElementById('next-week-btn').addEventListener('click', () => {
  loadSchedule(weekOffset + 1);
});

/* ── LEGEND POPUP ────────────────────────────────────────── */
document.getElementById('info-fab').addEventListener('click', () => {
  document.getElementById('legend-popup').classList.toggle('show');
});

document.addEventListener('click', e => {
  if (!e.target.closest('#info-fab') && !e.target.closest('#legend-popup')) {
    document.getElementById('legend-popup').classList.remove('show');
  }
});

/* ── REGENERATE ──────────────────────────────────────────── */
document.getElementById('regen-btn').addEventListener('click', () => {
  document.getElementById('regen-modal').style.display = 'flex';
});

document.getElementById('regen-cancel').addEventListener('click', () => {
  document.getElementById('regen-modal').style.display = 'none';
});

document.getElementById('regen-modal').addEventListener('click', function(e) {
  if (e.target === this) this.style.display = 'none';
});

document.getElementById('regen-confirm').addEventListener('click', async () => {
  document.getElementById('regen-modal').style.display = 'none';

  const btn = document.getElementById('regen-btn');
  btn.disabled = true;
  btn.style.opacity = '0.7';

  try {
    /* FIX (Bug 4): POST /schedule/regenerate/ returns only { message } — no slots.
       Rendering that response always produced a blank timetable.
       Instead: fire the regenerate call, then re-fetch the fresh schedule. */
    await CLAP.API.post('/schedule/regenerate/', {});
    await loadSchedule(weekOffset);
    CLAP.Toast.success('Schedule regenerated!');
  } catch (err) {
    console.error('REGENERATE ERROR:', err);
    CLAP.Toast.error('Could not regenerate schedule.');
  } finally {
    btn.disabled = false;
    btn.style.opacity = '1';
  }
});

/* ── INIT ────────────────────────────────────────────────── */
loadSchedule(weekOffset);

/* ── CROSS-TAB SYNC: react to assignment changes from assignments.html ── */
try {
  const assignCh = new BroadcastChannel('clap_assignments');
  assignCh.addEventListener('message', (event) => {
    const { type } = event.data || {};
    if (type === 'assignment_deleted' || type === 'assignment_updated') {
      /* Re-fetch the schedule so stale task titles / removed slots disappear */
      loadSchedule(weekOffset);
    }
  });
} catch { /* BroadcastChannel not supported — silent fail */ }
</script>
