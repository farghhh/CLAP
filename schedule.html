<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAP — Schedule</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>
<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main-content" id="main">
 
  <div class="schedule-header">
    <div class="schedule-title-wrap">
      <h1 class="schedule-page-title">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Schedule
      </h1>
      <div class="schedule-meta" id="schedule-meta">
        <span id="mode-line"></span>
        Week: <span id="week-label">March 10 – 14</span>
      </div>
    </div>
    <button class="regen-btn" id="regen-btn" onclick="regenerateSchedule()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" id="regen-icon"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10"/><path d="M20.49 15A9 9 0 015.64 18.36L1 14"/></svg>
      Regenerate
    </button>
  </div>
 
  <div class="timetable-card">
    <div style="overflow-x:auto;">
      <table class="timetable" id="schedule-table">
        <thead>
          <tr>
            <th class="time-col">Day /<br>Time</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
          </tr>
        </thead>
        <tbody id="schedule-tbody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
    <p class="generated-label" id="generated-label">Generated by CLAP</p>
  </div>
 
</main>
 
<!-- Legend -->
<div class="legend-popup" id="legend-popup">
  <div class="legend-row"><div class="legend-swatch" style="background:#c8f0d4;"></div>Easy</div>
  <div class="legend-row"><div class="legend-swatch" style="background:#fde9c0;"></div>Medium</div>
  <div class="legend-row"><div class="legend-swatch" style="background:#fac8c8;"></div>Hard</div>
</div>
<button class="info-fab" onclick="toggleLegend()">i</button>
 
</div>

<script src="js/core.js"></script>
<script src="js/app-shell.js"></script>
<script>
'use strict';
AppShell.init('schedule.html');

// ── Schedule data ──────────────────────────────────────────────
const TIMES = ['10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM'];
 
// mode A = default, mode B = balanced
const SCHEDULES = {
  A: {
    label: '',
    blocks: [
      // [day(0=Mon), startTime, endTime, title, type, span]
      [0,'10:00 AM','11:00 AM','Database (FP)','easy',1],
      [0,'11:00 AM','12:00 PM','Parallel Computing Assignment 1','easy',1],
      [0,'2:00 PM','4:00 PM','Mobile Application Development (FP)','hard',2],
      [1,'10:00 AM','12:00 PM','Mobile Application Development (FP)','hard',2],
      [2,'10:00 AM','11:00 AM','Parallel Computing Assignment 1','medium',1],
      [2,'11:00 AM','12:00 PM','Database (FP)','easy',1],
      [3,'11:00 AM','12:00 PM','Mobile Application Development (FP)','hard',1],
      [3,'2:00 PM','3:00 PM','Mobile Application Development (FP)','hard',1],
      [3,'4:00 PM','5:00 PM','Parallel Computing Assignment 1','medium',1],
      [4,'11:00 AM','12:00 PM','Parallel Computing Assignment 1','medium',1],
      [4,'2:00 PM','4:00 PM','Mobile Application Development (FP)','hard',2],
    ]
  },
  B: {
    label: 'Balanced',
    blocks: [
      [0,'10:00 AM','11:00 AM','Database (FP)','easy',1],
      [0,'11:00 AM','12:00 PM','Parallel Computing Assignment 1','easy',1],
      [0,'2:00 PM','4:00 PM','Mobile Application Development (FP)','hard',2],
      [1,'10:00 AM','12:00 PM','Mobile Application Development (FP)','hard',2],
      [2,'10:00 AM','11:00 AM','Parallel Computing Assignment 1','medium',1],
      [2,'11:00 AM','12:00 PM','Database (FP)','easy',1],
      [3,'11:00 AM','3:00 PM','Mobile Application Development (FP)','hard',3],
      [3,'4:00 PM','5:00 PM','Parallel Computing Assignment 1','medium',1],
      [4,'11:00 AM','12:00 PM','Parallel Computing Assignment 1','medium',1],
      [4,'2:00 PM','4:00 PM','Mobile Application Development (FP)','hard',2],
    ]
  }
};
 
let currentMode = 'A';
 
function buildTable(modeKey) {
  const schedule = SCHEDULES[modeKey];
  const tbody = document.getElementById('schedule-tbody');
  tbody.innerHTML = '';
 
  // Build cell map: [dayIndex][timeIndex] = block or null
  const cellMap = {};
  for (let d = 0; d < 5; d++) cellMap[d] = {};
 
  schedule.blocks.forEach(([day, start, end, title, type]) => {
    const si = TIMES.indexOf(start);
    const ei = TIMES.indexOf(end);
    const span = ei - si;
    if (si < 0) return;
    cellMap[day][si] = { title, type, span, end };
    for (let i = si + 1; i < si + span; i++) cellMap[day][i] = 'skip';
  });
 
  TIMES.forEach((time, ti) => {
    const tr = document.createElement('tr');
    const timeTd = document.createElement('td');
    timeTd.className = 'time-cell';
    timeTd.textContent = time;
    tr.appendChild(timeTd);
 
    for (let d = 0; d < 5; d++) {
      const cell = cellMap[d][ti];
      if (cell === 'skip') continue;
      const td = document.createElement('td');
      if (cell) {
        td.rowSpan = cell.span;
        const block = document.createElement('div');
        block.className = `task-block ${cell.type}`;
        block.style.height = '100%';
        block.innerHTML = `
          <div>
            <div class="task-block-title">${cell.title}</div>
            <div class="task-block-time">${cell.title !== 'Study' ? cell.end ? `${TIMES[TIMES.indexOf(time)]} – ${cell.end}` : time : `${time} – ${cell.end}`}</div>
          </div>
          <button class="task-block-check" title="Mark done" onclick="this.classList.toggle('done')"></button>
        `;
        td.appendChild(block);
      } else {
        td.innerHTML = '<div class="empty-cell"></div>';
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });
 
  // Update meta
  const modeLine = document.getElementById('mode-line');
  modeLine.innerHTML = schedule.label ? `Mode: <strong>${schedule.label}</strong><br>` : '';
}
 
function regenerateSchedule() {
  const btn = document.getElementById('regen-btn');
  btn.disabled = true;
  document.getElementById('regen-icon').style.animation = 'spin 0.6s linear infinite';
  setTimeout(() => {
    currentMode = currentMode === 'A' ? 'B' : 'A';
    buildTable(currentMode);
    btn.disabled = false;
    document.getElementById('regen-icon').style.animation = '';
    showToast('Schedule regenerated!', 'success');
  }, 900);
}
 
function toggleLegend() {
  document.getElementById('legend-popup').classList.toggle('show');
}
 
function showToast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type === 'success' ? '✅' : 'ℹ️'}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => { t.style.animation = 'toastOut 0.3s forwards'; setTimeout(() => t.remove(), 300); }, 3000);
}
 
buildTable(currentMode);
</script>
</body>
</html>
