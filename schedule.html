<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CLAP — Schedule</title>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/app.css"/>
  <style>
    .sch-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 20px; margin-bottom: 8px;
    }
    .sch-header-left { display: flex; flex-direction: column; gap: 4px; }
    .sch-title {
      font-family: var(--font-heading); font-size: 1.5rem; font-weight: 800;
      color: var(--clap-teal); display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
    }
    .sch-meta   { font-size: 0.82rem; color: var(--text-muted); font-weight: 600; }
    .sch-meta b { color: var(--text-secondary); font-weight: 700; }

    .week-nav {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: rgba(255,255,255,0.6); border-radius: 999px; padding: 6px 16px;
      width: fit-content; margin: 12px auto 22px;
    }
    .nav-label { font-weight: 800; font-size: 1.1rem; color: var(--clap-teal); }
    .nav-arrow {
      cursor: pointer; font-size: 1.8rem; font-weight: 900; color: var(--clap-teal);
      line-height: 1; padding: 6px 10px; border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all 0.2s ease; background: none; border: none; font-family: inherit;
    }
    .nav-arrow:hover { background: rgba(75,191,191,0.12); transform: scale(1.1); }

    .timetable-card {
      background: var(--white); border-radius: var(--radius-lg);
      padding: var(--space-lg); box-shadow: var(--shadow-card); overflow-x: auto;
    }

    .px-calendar { overflow-x: auto; }
    .px-hdr-row  { display: grid; grid-template-columns: 64px repeat(5,1fr); gap: 4px; margin-bottom: 4px; }
    .px-hdr-time { background: transparent; }
    .px-hdr-day  {
      font-family: var(--font-heading); font-size: 0.82rem; font-weight: 700;
      color: var(--text-secondary); text-align: center; padding: 12px 6px;
      background: var(--bg-light); border-radius: var(--radius-sm);
    }
    .px-body     { display: grid; grid-template-columns: 64px repeat(5,1fr); gap: 4px; min-width: 640px; position: relative; }
    .px-time-col { position: relative; }
    .px-time-lbl {
      position: absolute; right: 6px; font-size: 0.65rem; font-weight: 700;
      color: var(--text-muted); transform: translateY(-50%); white-space: nowrap;
    }
    .px-hline    { position: absolute; left: 0; right: 0; height: 1px; background: var(--border); opacity: 0.4; pointer-events: none; }
    .px-day-col  { position: relative; }
    .px-block    {
      position: absolute; left: 2px; right: 2px; border-radius: var(--radius-md);
      padding: 8px 10px; display: flex; flex-direction: column; justify-content: space-between;
      cursor: pointer; box-sizing: border-box; transition: transform 0.15s, box-shadow 0.15s; overflow: hidden;
    }
    .px-block:hover  { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
    .px-block.easy   { background: #c8f0d4; color: #1a5c30; }
    .px-block.medium { background: #fde9c0; color: #7a4300; }
    .px-block.hard   { background: #fac8c8; color: #7a1a1a; }
    .px-block.done   { opacity: 0.5; filter: grayscale(0.4); }
    .px-block-inner  { flex: 1; overflow: hidden; }
    .tb-title { font-size: 0.78rem; font-weight: 800; line-height: 1.25; margin-bottom: 2px; }
    .tb-time  { font-size: 0.66rem; font-weight: 600; opacity: 0.8; }
    .tb-check {
      position: absolute; bottom: 6px; right: 6px;
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.8); background: rgba(255,255,255,0.5);
      cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; justify-content: center; font-size: 11px; color: transparent;
    }
    .tb-check::after      { content: '✓'; font-weight: 800; }
    .tb-check:hover       { background: rgba(255,255,255,0.85); color: rgba(0,0,0,0.4); }
    .tb-check.done        { background: rgba(75,191,191,0.85); border-color: var(--clap-teal); color: #fff; }

    .empty-msg {
      text-align: center; padding: 48px 24px;
      color: var(--text-muted); font-size: 0.88rem; line-height: 1.7;
    }
    .gen-label {
      text-align: center; font-size: 0.72rem; color: var(--text-muted);
      font-style: italic; margin-top: var(--space-md);
    }

    .info-fab {
      position: fixed; bottom: 28px; right: 28px; width: 38px; height: 38px;
      border-radius: 50%; background: var(--clap-teal); color: #fff; border: none;
      cursor: pointer; font-size: 1rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(75,191,191,0.4); z-index: 50;
    }
    .legend-popup {
      position: fixed; bottom: 74px; right: 28px; background: #fff;
      border-radius: var(--radius-md); padding: var(--space-md);
      box-shadow: var(--shadow-md); display: none; z-index: 60; min-width: 155px;
    }
    .legend-popup.show { display: block; }
    .leg-row { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); padding: 3px 0; }
    .leg-sw  { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }

    @media (max-width: 700px) {
      .sch-header { align-items: stretch; gap: 12px; }
      .week-nav   { width: 100%; }
    }
  </style>
</head>
<body>
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>
<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle">&#9776;</button>
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main-content">

    <div class="sch-header">
      <div class="sch-header-left">
        <div class="sch-title">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          Schedule
        </div>
        <div class="sch-meta" id="sch-week"><b>Week:</b> —</div>
      </div>
      <button class="regen-btn" id="regen-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Regenerate
      </button>
    </div>

    <div class="week-nav">
      <button id="prev-btn" class="nav-arrow" aria-label="Previous week">‹</button>
      <span id="week-label" class="nav-label">—</span>
      <button id="next-btn" class="nav-arrow" aria-label="Next week">›</button>
    </div>

    <div class="timetable-card" id="timetable-card">
      <div class="empty-msg">Loading schedule…</div>
      <div class="gen-label" id="gen-label">Generated by CLAP</div>
    </div>

  </main>
</div>

<button class="info-fab" id="info-fab" aria-label="Show legend">i</button>
<div class="legend-popup" id="legend-popup">
  <div class="leg-row"><div class="leg-sw" style="background:#c8f0d4"></div>Easy</div>
  <div class="leg-row"><div class="leg-sw" style="background:#fde9c0"></div>Medium</div>
  <div class="leg-row"><div class="leg-sw" style="background:#fac8c8"></div>Hard</div>
</div>

<div id="regen-modal" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(26,58,92,0.35);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
  <div style="background:var(--white);border-radius:var(--radius-xl);padding:var(--space-xl);max-width:400px;width:90%;text-align:center;">
    <div style="font-size:2.5rem;margin-bottom:var(--space-md)">🔄</div>
    <div style="font-family:var(--font-heading);font-size:1.2rem;font-weight:700;color:var(--text-primary);margin-bottom:var(--space-sm)">Regenerate Schedule?</div>
    <div style="color:var(--text-muted);font-size:0.875rem;margin-bottom:var(--space-xl);line-height:1.5">
      This will overwrite your current schedule and any tasks you've marked as done. This cannot be undone.
    </div>
    <div style="display:flex;gap:var(--space-md);justify-content:center;">
      <button class="btn btn-ghost btn-sm" id="regen-cancel">Cancel</button>
      <button class="btn btn-primary btn-sm" id="regen-confirm">Yes, Regenerate</button>
    </div>
  </div>
</div>

<script src="js/core.js"></script>
<script src="js/app-shell.js"></script>
<script>
'use strict';

AppShell.init('schedule.html', { showTopbar: false });

const DAYS   = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const DAYMAP = { mon:'Monday', tue:'Tuesday', wed:'Wednesday', thu:'Thursday', fri:'Friday' };
const PPM    = 1.3; // px per minute

let weekOffset = 0;

/* ── Week label (matches backend logic: weekend → snap to next Monday) ── */
function weekLabel(offset) {
  const today   = new Date();
  const wd      = today.getDay(); // 0=Sun, 6=Sat
  const toMon   = wd === 0 ? 1 : wd === 6 ? 2 : 1 - wd;
  const mon     = new Date(today);
  mon.setDate(today.getDate() + toMon + offset * 7);
  const fri = new Date(mon);
  fri.setDate(mon.getDate() + 4);
  const M = ['January','February','March','April','May','June',
             'July','August','September','October','November','December'];
  return mon.getMonth() === fri.getMonth()
    ? `${M[mon.getMonth()]} ${mon.getDate()} – ${fri.getDate()}`
    : `${M[mon.getMonth()]} ${mon.getDate()} – ${M[fri.getMonth()]} ${fri.getDate()}`;
}

function setHeader() {
  const lbl = weekLabel(weekOffset);
  document.getElementById('week-label').textContent = lbl;
  document.getElementById('sch-week').innerHTML = `<b>Week:</b> ${lbl}`;
}

/* ── Time helpers ── */
function mins(t) {
  if (!t) return 0;
  t = String(t).trim();
  if (/^\d{1,2}:\d{2}$/.test(t)) {
    const [h, m] = t.split(':').map(Number); return h * 60 + m;
  }
  const [hm, ap] = t.split(/\s+/);
  let [h, m] = hm.split(/[.:]/).map(Number);
  if (/PM/i.test(ap) && h !== 12) h += 12;
  if (/AM/i.test(ap) && h === 12) h = 0;
  return h * 60 + (m || 0);
}

function label(m) {
  let h = Math.floor(m / 60) % 24, mn = m % 60;
  const ap = h >= 12 ? 'PM' : 'AM';
  if (h === 0) h = 12; else if (h > 12) h -= 12;
  return `${h}.${String(mn).padStart(2,'0')} ${ap}`;
}

/* ── Normalise API → flat slots ── */
function normalise(api) {
  if (!api) return [];
  let raw = [];
  for (const k of ['slots','sessions','schedule_slots','data','items'])
    if (Array.isArray(api[k]) && api[k].length) { raw = api[k]; break; }
  if (!raw.length && Array.isArray(api)) raw = api;
  if (!raw.length) return [];

  // Group by day
  const byDay = {};
  raw.forEach(s => {
    const day = DAYMAP[(s.day||'').toLowerCase()] || s.day;
    if (!DAYS.includes(day)) return;
    (byDay[day] = byDay[day] || []).push(s);
  });

  const out = [];
  DAYS.forEach(day => {
    if (!byDay[day]) return;
    let cur = null;
    byDay[day].forEach(s => {
      const start = cur !== null ? cur : mins(s.time || '09:00');
      const dur   = parseFloat(s.duration ?? s.scheduled_hours ?? 1);
      const end   = start + Math.round(dur * 60);
      cur = end;
      const d = (s.difficulty ?? '').toString().trim().toLowerCase();
      out.push({
        day, dur,
        start, end,
        timeLabel: label(start),
        endLabel:  label(end),
        title:     s.title || s.name || [s.code, s.subject].filter(Boolean).join(' ') || '—',
        diff:      ['easy','medium','hard'].includes(d) ? d : dur <= 1 ? 'easy' : dur <= 2 ? 'medium' : 'hard',
        done:      !!s.is_completed,
        slotId:    s.session_id ?? s.slot_id ?? s.id ?? null,
        taskId:    s.task_id ?? s.assignment_id ?? null,
      });
    });
  });
  return out;
}

/* ── Render ── */
function render(slots) {
  const card = document.getElementById('timetable-card');
  const gen  = document.getElementById('gen-label');

  if (!slots.length) {
    card.innerHTML = `<div class="empty-msg">
      No sessions scheduled for this week.<br>
      Add assignments and tap <b>Regenerate</b>, or use <b>›</b> to browse other weeks.
    </div>`;
    card.appendChild(gen);
    return;
  }

  const byDay  = {};
  DAYS.forEach(d => byDay[d] = []);
  slots.forEach(s => byDay[s.day] && byDay[s.day].push(s));
  DAYS.forEach(d => byDay[d].sort((a,b) => a.start - b.start));

  const allMins = slots.flatMap(s => [s.start, s.end]);
  const lo      = Math.floor(Math.min(...allMins) / 60) * 60;
  const hi      = Math.ceil( Math.max(...allMins) / 60) * 60;
  const bodyH   = (hi - lo) * PPM;

  let axis = '', hlines = '';
  for (let m = lo; m <= hi; m += 60) {
    const top = (m - lo) * PPM;
    axis   += `<div class="px-time-lbl" style="top:${top}px">${label(m)}</div>`;
    hlines += `<div class="px-hline"    style="top:${top}px"></div>`;
  }

  const cols = DAYS.map(day =>
    `<div class="px-day-col" style="height:${bodyH}px">` +
    byDay[day].map(s => {
      const top = (s.start - lo) * PPM;
      const ht  = Math.max((s.end - s.start) * PPM - 3, 40);
      const dc  = s.done ? 'done' : '';
      const da  = [
        s.slotId ? `data-slot-id="${s.slotId}"` : '',
        s.taskId ? `data-task-id="${s.taskId}"` : '',
        `data-dur="${s.dur}"`,
      ].filter(Boolean).join(' ');
      return `<div class="px-block ${s.diff} ${dc}" ${da} style="top:${top}px;height:${ht}px;">
        <div class="px-block-inner">
          <div class="tb-title">${s.title}</div>
          <div class="tb-time">${s.timeLabel} – ${s.endLabel}</div>
        </div>
        <button class="tb-check ${dc}" onclick="toggleDone(this)" title="Mark done"></button>
      </div>`;
    }).join('') +
    `</div>`
  ).join('');

  card.innerHTML = `<div class="px-calendar">
    <div class="px-hdr-row">
      <div class="px-hdr-time"></div>
      ${DAYS.map(d => `<div class="px-hdr-day">${d}</div>`).join('')}
    </div>
    <div class="px-body" style="height:${bodyH}px;">
      <div class="px-time-col" style="height:${bodyH}px">${axis}</div>
      <div style="position:absolute;left:68px;right:0;top:0;height:${bodyH}px;pointer-events:none;">${hlines}</div>
      ${cols}
    </div>
  </div>`;
  card.appendChild(gen);
}

/* ── Load ── */
async function load(offset) {
  console.log('weekOffset sent =', offset);
  weekOffset = offset;
  setHeader();
  let data;
  try {
    data = await CLAP.API.get(`/schedule/?week_offset=${weekOffset}`);
  } catch (err) {
    console.error('[CLAP]', err);
    CLAP.Toast.error('Could not load schedule. Please try again.');
    render([]);
    return;
  }
  if (data === null) return; // 401
  render(normalise(data));
}

/* ── Mark done ── */
window.toggleDone = async function(btn) {
  const block  = btn.closest('.px-block');
  const isDone = !block.classList.contains('done');
  const slotId = block.dataset.slotId || null;
  const taskId = block.dataset.taskId || null;

  block.classList.toggle('done', isDone);
  btn.classList.toggle('done', isDone);

  if (!slotId) {
    CLAP.Toast.warning('Session ID missing — try regenerating your schedule.');
    block.classList.toggle('done', !isDone);
    btn.classList.toggle('done', !isDone);
    return;
  }

  try {
    await CLAP.API.patch(`/schedule/sessions/${slotId}/complete/`, { completed: isDone });
  } catch {
    block.classList.toggle('done', !isDone);
    btn.classList.toggle('done', !isDone);
    CLAP.Toast.error('Could not save — please try again.');
    return;
  }

  if (taskId) {
    const all  = [...document.querySelectorAll(`[data-task-id="${taskId}"]`)];
    let th = 0, dh = 0;
    all.forEach(b => { const d = parseFloat(b.dataset.dur||1); th += d; if (b.classList.contains('done')) dh += d; });
    const pct = th ? Math.round(dh/th*100) : 0;
    CLAP.Toast.success(`Progress updated: ${pct}%`);
    try { const ch = new BroadcastChannel('clap_progress'); ch.postMessage({ type:'progress_update', assignmentId:taskId, progress:pct }); ch.close(); } catch {}
  } else {
    CLAP.Toast.success(isDone ? 'Session marked complete!' : 'Session unmarked.');
  }
};

/* ── Nav ── */
document.getElementById('prev-btn').addEventListener('click', () => load(weekOffset - 1));
document.getElementById('next-btn').addEventListener('click', () => load(weekOffset + 1));

/* ── Legend ── */
document.getElementById('info-fab').addEventListener('click', () => document.getElementById('legend-popup').classList.toggle('show'));
document.addEventListener('click', e => { if (!e.target.closest('#info-fab') && !e.target.closest('#legend-popup')) document.getElementById('legend-popup').classList.remove('show'); });

/* ── Regenerate ── */
document.getElementById('regen-btn').addEventListener('click', () => document.getElementById('regen-modal').style.display = 'flex');
document.getElementById('regen-cancel').addEventListener('click', () => document.getElementById('regen-modal').style.display = 'none');
document.getElementById('regen-modal').addEventListener('click', function(e) { if (e.target === this) this.style.display = 'none'; });
document.getElementById('regen-confirm').addEventListener('click', async () => {
  document.getElementById('regen-modal').style.display = 'none';
  const btn = document.getElementById('regen-btn');
  btn.disabled = true; btn.style.opacity = '0.7';
  try {
    const res = await CLAP.API.post('/schedule/regenerate/', {});
    if (res?.still_overloaded && res?.warning) CLAP.Toast.warning(res.warning);
    else CLAP.Toast.success('Schedule regenerated!');
    load(weekOffset);
  } catch { CLAP.Toast.error('Could not regenerate schedule.'); }
  finally { btn.disabled = false; btn.style.opacity = '1'; }
});

/* ── Cross-tab sync ── */
try {
  const ch = new BroadcastChannel('clap_assignments');
  ch.addEventListener('message', ({ data }) => {
    if (data?.type === 'assignment_deleted' || data?.type === 'assignment_updated') load(weekOffset);
  });
} catch {}

/* ── Init ── */
console.log('loading current week');
load(0);
</script>
</body>
</html>
