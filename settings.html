<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAP — Settings</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/app.css" />
  <style>
    /* ── Team Section ── */
    .team-grid {
      width: 100%;
    }
    .team-header-banner {
      background: var(--grad-primary, linear-gradient(135deg, #4bbfbf, #1a3a5c));
      border-radius: var(--radius-lg, 16px);
      padding: 28px 24px;
      text-align: center;
      margin-bottom: var(--space-xl, 28px);
    }
    .team-banner-title {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
      margin: 0;
    }
    .team-members-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-md, 16px);
    }
    .team-member-card {
      background: var(--white, #fff);
      border: 1px solid var(--border, #e8f4f4);
      border-radius: var(--radius-lg, 16px);
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    .team-member-card:hover {
      box-shadow: 0 8px 24px rgba(75,191,191,0.15);
      transform: translateY(-3px);
    }
    .team-member-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--clap-teal-light, #b2e8e8);
      margin-bottom: 12px;
      position: relative;
      background: var(--bg-light, #f0fafa);
      flex-shrink: 0;
    }
    .team-avatar-fallback {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 1.6rem;
      color: var(--clap-teal, #4bbfbf);
      background: var(--bg-light, #f0fafa);
    }
    .team-member-name {
      font-family: var(--font-heading);
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--text-primary, #1a3a5c);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .team-leader-badge {
      font-size: 0.65rem;
      font-weight: 700;
      color: #fff;
      background: var(--grad-primary, linear-gradient(135deg, #4bbfbf, #1a3a5c));
      border-radius: 999px;
      padding: 2px 8px;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }
    .team-member-role {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--clap-teal, #4bbfbf);
      margin-bottom: 8px;
    }
    .team-member-contributions {
      font-size: 0.75rem;
      color: var(--text-muted, #7a9ab5);
      line-height: 1.6;
      text-align: left;
      padding-left: 16px;
      margin: 0;
      width: 100%;
      list-style: disc !important;
    }
    .team-member-contributions li {
      margin-bottom: 3px;
      list-style: disc !important;
      display: list-item !important;
    }
    @media (max-width: 900px) {
      .team-members-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 520px) {
      .team-members-row { grid-template-columns: 1fr; }
    }
    /* pw-toggle inside form-input-wrap (change password panel) */
    .form-input-wrap .pw-toggle {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--placeholder);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--transition);
      z-index: 1;
    }
    .form-input-wrap .pw-toggle:hover { color: var(--clap-teal); }
    .form-input-wrap .form-input { padding-right: 44px; }

    /* Compact requirement pill badges */
    .req-pill { display:flex; align-items:center; gap:5px; font-size:0.72rem; font-weight:700; padding:4px 8px; border-radius:999px; transition:background 0.2s,color 0.2s; }
    .req-pill.req-fail { background:#fde8e8; color:#c0392b; }
    .req-pill.req-pass { background:#e8f8ee; color:#1e8449; }
    .req-dot { font-size:0.8rem; font-weight:800; }
    .pw-strength { margin-top:6px; }
    .pw-strength-bar { height:4px; background:#e0ecec; border-radius:999px; overflow:hidden; margin-bottom:5px; }
    .pw-strength-fill { height:100%; border-radius:999px; transition:width 0.4s, background 0.4s; width:0%; }
    .pw-strength-fill.weak   { background:#E74C3C; width:25%; }
    .pw-strength-fill.fair   { background:#F5A623; width:50%; }
    .pw-strength-fill.good   { background:#3498DB; width:75%; }
    .pw-strength-fill.strong { background:#27AE60; width:100%; }
    .pw-strength-label { font-size:0.75rem; font-weight:700; color:#7a9ab5; }
    .pw-strength-label.weak   { color:#E74C3C; }
    .pw-strength-label.fair   { color:#F5A623; }
    .pw-strength-label.good   { color:#3498DB; }
    .pw-strength-label.strong { color:#27AE60; }
    /* Requirements checklist */
    .pw-req { display:flex; align-items:center; gap:6px; font-size:0.78rem; font-weight:600; }
    .req-icon { font-size:0.85rem; font-weight:800; }
  </style>
</head>
<body>
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>
<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main-content" id="main">

    <!-- ── Page title ── -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:var(--space-xl);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--clap-teal)" stroke-width="2.5" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <h1 class="page-title">Settings</h1>
    </div>

    <!-- ── Two-column layout: left nav + right panel ── -->
    <div class="settings-layout">

      <!-- Left navigation -->
      <nav class="settings-sidenav" aria-label="Settings sections">
        <button class="settings-sidenav-item" data-sec="general-menu">General</button>
        <!-- Sub-items revealed when "General" is active -->
        <div id="general-subnav" class="settings-subnav" style="display:none">
          <button class="settings-subnav-item" data-sub="profile">Profile</button>
          <button class="settings-subnav-item" data-sub="study-prefs">Study Preferences</button>
        </div>
        <button class="settings-sidenav-item" data-sec="about">About Us</button>
        <button class="settings-sidenav-item" data-sec="team">Our Team &amp; Contributions</button>
      </nav>

      <!-- Right content panel — innerHTML replaced by setSection() -->
      <div class="settings-panel" id="settings-panel">
        <p style="color:var(--text-muted);text-align:center;padding:40px 0">
          Select a section from the left to get started.
        </p>
      </div>

    </div>
  </main>
</div>

<script src="js/core.js"></script>
<script src="js/app-shell.js"></script>
<script>
'use strict';

/*
 * Settings has its own page title in the HTML above,
 * so we do not need the AppShell topbar greeting.
 */
AppShell.init('settings.html', { showSearch: false, showTopbar: false });

/* Read the stored user profile (set during sign-in). */
const user = CLAP.Auth.getUser() || {};

/* Track the current section and sub-section. */
let curSec = '';
let curSub = 'profile'; // default sub-section within "General"

/*
 * FIX: panelStudyPrefs originally read from localStorage('clap_prefs'),
 * but preferences are saved via the API in onboarding and never written
 * to localStorage — so the panel always showed default/empty values.
 *
 * Now preferences are fetched from GET /api/users/preferences/ and stored
 * in the module-level `prefs` object. A loading state is shown while the
 * request is in flight.
 */
let prefs = {}; // populated by loadPreferences()

/** Format a "HH:MM" 24-hour time string into a human-readable label. */
function fmtTime(t) {
  if (!t) return '—';
  const [h, m] = t.split(':').map(Number);
  const ampm = h < 12 ? 'AM' : 'PM';
  const h12  = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${String(h12).padStart(2, '0')}:${String(m || 0).padStart(2, '0')} ${ampm}`;
}

/** Fetch study preferences from the API once per page load. */
async function loadPreferences() {
  /* First load from localStorage for instant display */
  try {
    const stored = localStorage.getItem('clap_prefs');
    if (stored) prefs = JSON.parse(stored);
  } catch {}

  /* Also refresh the user profile from the server */
  try {
    const profileData = await CLAP.API.get('/auth/profile/');
    if (profileData) {
      user.name  = profileData.name;
      user.email = profileData.email;
      localStorage.setItem(CLAP.CONFIG.USER_KEY, JSON.stringify(user));
    }
  } catch {}

  /* Fetch preferences from backend */
  try {
    const fresh = await CLAP.API.get('/users/preferences/get/');
    if (fresh) {
      prefs = fresh;
      localStorage.setItem('clap_prefs', JSON.stringify(prefs));
    }
  } catch {
    /* Fall back to safe defaults if no data found anywhere */
    if (!prefs || !prefs.sleep_start) {
      prefs = {
        sleep_start:     '23:00',
        sleep_end:       '07:00',
        study_start:     '09:00',
        study_end:       '18:00',
        max_focus_hours: 6,
      };
    }
  }
}

/* ── PANEL BUILDERS ─────────────────────────────────────────── */

/**
 * Entry point for the "General" section.
 * Ensures the sub-nav is visible and delegates to the active sub-panel.
 */
function panelGeneral() {
  document.getElementById('general-subnav').style.display = 'flex';
  return curSub === 'study-prefs' ? panelStudyPrefs() : panelProfile();
}

/** Renders the profile editing panel. */
function panelProfile() {
  const initial = (user.name || 'S').charAt(0).toUpperCase();
  return `
    <div class="settings-breadcrumb">Settings › <span>General</span> › <span>Profile</span></div>

    <!-- Avatar: preview + upload/remove buttons -->
    <div class="profile-pic-wrap">
      <div class="profile-avatar" id="av-preview" aria-label="Profile picture preview">${initial}</div>
      <div>
        <div style="font-size:.8rem;font-weight:700;color:var(--text-muted);margin-bottom:8px">Profile Picture</div>
        <div style="display:flex;gap:8px">
          <!-- Remove photo -->
          <button class="upload-btn" id="del-avatar-btn"
                  style="background:var(--danger-light);border-color:rgba(231,76,60,.3);color:var(--danger)"
                  title="Remove photo" aria-label="Remove profile photo">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
            Remove
          </button>
          <!-- Upload new photo -->
          <label class="upload-btn" style="cursor:pointer;" title="Upload photo" aria-label="Upload profile photo">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Upload
            <input type="file" id="avatar-file-input" accept="image/*" style="display:none"
                   aria-label="Choose profile photo file" />
          </label>
        </div>
      </div>
    </div>

    <!-- Editable profile fields -->
    <div class="settings-row" id="row-name">
      <div>
        <div class="settings-row-label">Full Name</div>
        <div class="settings-row-value" id="val-name">${user.name || '—'}</div>
      </div>
      <button class="edit-btn" onclick="startInlineEdit('name','Full Name')">Edit</button>
    </div>
    <div class="settings-row" id="row-email">
      <div>
        <div class="settings-row-label">Email</div>
        <div class="settings-row-value" id="val-email">${user.email || '—'}</div>
      </div>
      <button class="edit-btn" onclick="startInlineEdit('email','Email')">Edit</button>
    </div>
    <div class="settings-row" style="border:none" id="row-password">
      <div>
        <div class="settings-row-label">Change Password</div>
        <div class="settings-row-value" style="letter-spacing:3px;color:var(--text-muted);">••••••••</div>
      </div>
      <button class="edit-btn" onclick="showChangePassword()">Edit</button>
    </div>

    <button class="save-changes-btn" onclick="saveProfile()">Save Changes</button>`;
}

/** Renders the Change Password sub-view. */
function panelChangePassword() {
  return `
    <div style="margin-bottom:var(--space-lg);">
      <button onclick="showProfile()" style="background:none;border:none;cursor:pointer;
              display:flex;align-items:center;gap:6px;font-family:var(--font-heading);
              font-size:0.85rem;font-weight:700;color:var(--text-muted);padding:0;
              transition:color var(--transition);"
              onmouseover="this.style.color='var(--clap-teal)'"
              onmouseout="this.style.color='var(--text-muted)'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
      </button>
    </div>

    <h2 style="font-family:var(--font-heading);font-size:1.6rem;font-weight:800;
               color:var(--clap-teal);margin-bottom:var(--space-xl);">Change Password</h2>

    <div style="display:flex;flex-direction:column;gap:var(--space-md);max-width:400px;">

      <!-- Old Password -->
      <div class="form-group">
        <label class="form-label" for="cp-old">Old Password*</label>
        <div class="form-input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input class="form-input" type="password" id="cp-old"
                 placeholder="Enter current password" autocomplete="current-password" />
          <button type="button" class="pw-toggle" id="cp-old-toggle"
                  onclick="togglePw('cp-old','cp-old-toggle')" aria-label="Toggle password visibility">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- New Password -->
      <div class="form-group">
        <label class="form-label" for="cp-new">New Password*</label>
        <div class="form-input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input class="form-input" type="password" id="cp-new"
                 placeholder="Enter new password" autocomplete="new-password"
                 oninput="updatePwStrength(this.value)" />
          <button type="button" class="pw-toggle" id="cp-new-toggle"
                  onclick="togglePw('cp-new','cp-new-toggle')" aria-label="Toggle password visibility">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <!-- Strength bar -->
        <div class="pw-strength" id="pw-strength-wrap" style="display:none;margin-top:4px;">
          <div class="pw-strength-bar"><div class="pw-strength-fill" id="pw-strength-fill"></div></div>
          <span class="pw-strength-label" id="pw-strength-label"></span>
        </div>
        <!-- Compact pill badges — shown while typing -->
        <div id="pw-reqs" style="display:none;margin-top:7px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">
            <div id="req-len"   class="req-pill req-fail"><span class="req-dot">✗</span>8+ chars</div>
            <div id="req-upper" class="req-pill req-fail"><span class="req-dot">✗</span>Uppercase</div>
            <div id="req-num"   class="req-pill req-fail"><span class="req-dot">✗</span>Number</div>
            <div id="req-sym"   class="req-pill req-fail"><span class="req-dot">✗</span>Symbol</div>
          </div>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label" for="cp-confirm">Confirm New Password*</label>
        <div class="form-input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input class="form-input" type="password" id="cp-confirm"
                 placeholder="Re-enter new password" autocomplete="new-password" />
          <button type="button" class="pw-toggle" id="cp-confirm-toggle"
                  onclick="togglePw('cp-confirm','cp-confirm-toggle')" aria-label="Toggle password visibility">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

    </div>

    <button class="save-changes-btn" style="margin-top:var(--space-lg);"
            onclick="submitChangePassword()">Change Password</button>`;
}

/**
 * FIX: Previously read from localStorage('clap_prefs') which was
 * never written to — preferences were always empty/default.
 * Now renders from the `prefs` object populated by loadPreferences()
 * via GET /api/users/preferences/.
 */
function panelStudyPrefs() {
  return `
    <div class="settings-breadcrumb">Settings › <span>General</span> › <span>Study Preferences</span></div>
    <h3 style="font-family:var(--font-heading);font-size:1rem;font-weight:700;
               color:var(--text-primary);margin-bottom:var(--space-lg)">Study Preferences</h3>

    <div class="settings-row">
      <div style="flex:1;">
        <div class="settings-row-label">Sleep Time</div>
        <div id="sp-sleep-view" class="settings-row-value">
          ${fmtTime(prefs.sleep_start)} to ${fmtTime(prefs.sleep_end)}
        </div>
        <div id="sp-sleep-edit" style="display:none;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px;">
          <input type="time" id="sp-sleep-start" class="inline-input" style="width:140px;"
                 value="${prefs.sleep_start || '23:00'}" />
          <span style="font-size:0.82rem;color:var(--text-muted);font-weight:600;">to</span>
          <input type="time" id="sp-sleep-end" class="inline-input" style="width:140px;"
                 value="${prefs.sleep_end || '07:00'}" />
        </div>
      </div>
      <button class="edit-btn" onclick="toggleSpEdit('sleep', this)">Edit</button>
    </div>

    <div class="settings-row">
      <div style="flex:1;">
        <div class="settings-row-label">Active Study Hours</div>
        <div id="sp-study-view" class="settings-row-value">
          ${fmtTime(prefs.study_start)} to ${fmtTime(prefs.study_end)}
        </div>
        <div id="sp-study-edit" style="display:none;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px;">
          <input type="time" id="sp-study-start" class="inline-input" style="width:140px;"
                 value="${prefs.study_start || '09:00'}" />
          <span style="font-size:0.82rem;color:var(--text-muted);font-weight:600;">to</span>
          <input type="time" id="sp-study-end" class="inline-input" style="width:140px;"
                 value="${prefs.study_end || '18:00'}" />
        </div>
      </div>
      <button class="edit-btn" onclick="toggleSpEdit('study', this)">Edit</button>
    </div>

    <div class="settings-row" style="border:none">
      <div style="flex:1;">
        <div class="settings-row-label">Daily Study Limit</div>
        <div id="sp-limit-view" class="settings-row-value">${prefs.max_focus_hours || 6} Hours</div>
        <div id="sp-limit-edit" style="display:none;align-items:center;gap:8px;margin-top:6px;">
          <input type="number" id="sp-limit-val" class="inline-input" style="width:80px;"
                 min="1" max="16" value="${prefs.max_focus_hours || 6}" />
          <span style="font-size:0.82rem;color:var(--text-muted);font-weight:600;">hours</span>
        </div>
      </div>
      <button class="edit-btn" onclick="toggleSpEdit('limit', this)">Edit</button>
    </div>

    <button class="save-changes-btn" onclick="saveStudyPrefs()">Save Changes</button>`;
}

/** Renders the About Us panel. */
function panelAbout() {
  return `
    <div class="settings-breadcrumb">Settings › <span>About Us</span></div>
    <div class="about-section">
      <h3>About CLAP:</h3>
      <p>CLAP (Cognitive Load-Based Adaptive Academic Planner) is a smart academic planning system
         designed to help students manage their workload effectively.</p>
      <p style="margin-top:8px">It uses cognitive load principles to generate balanced study schedules,

/**
 * Switch the visible section in the right panel.
 * @param {string} sec  'general-menu' | 'about'
 */
function setSection(sec) {
  curSec = sec;

  /* Reset UI state. */
  document.getElementById('general-subnav').style.display = 'none';
  document.querySelectorAll('.settings-sidenav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.sec === sec);
  });
  document.querySelectorAll('.settings-subnav-item').forEach(b => {
    b.classList.remove('active');
  });

  /* Build panel HTML. */
  let html = '';
  if (sec === 'general-menu') {
    html = panelGeneral();
    document.getElementById('general-subnav').style.display = 'flex';
  } else if (sec === 'about') {
    html = panelAbout();
  } else if (sec === 'team') {
    html = panelTeam();
  }

  document.getElementById('settings-panel').innerHTML = html;

  /* Highlight the active sub-item. */
  document.querySelectorAll('.settings-subnav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.sub === curSub);
  });

  /* Wire up avatar file-picker handlers after innerHTML replacement. */
  if (sec === 'general-menu' && curSub === 'profile') {
    attachAvatarHandlers();
  }
}

/* Main nav click handlers. */
document.querySelectorAll('.settings-sidenav-item').forEach(btn => {

/* Sub-nav click handlers. */

});

/* ── INLINE EDIT ────────────────────────────────────────────── */

/**
 * Replace a static value display with an editable input + Save/Cancel.
 * @param {string} field  Key in the `user` object ('name'|'email'|'program').
 * @param {string} label  Human-readable label for the input.
 */
window.startInlineEdit = function(field, label) {
  const valEl = document.getElementById('val-' + field);
  if (!valEl) return;
  const currentVal = user[field] || '';

  /* FIX (Bug 7): Previously used innerHTML with unescaped currentVal — breaks on names
     containing ' or " (e.g. O'Brien) and is an XSS vector if data comes from the API.
     Now uses safe DOM property assignments only. */
  valEl.innerHTML = '';

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'display:flex;align-items:center;gap:8px;flex-wrap:wrap;';

  const input = document.createElement('input');
  input.id          = `edit-input-${field}`;
  input.className   = 'inline-input';
  input.type        = 'text';
  input.value       = currentVal;        // safe: DOM property, not attribute injection
  input.placeholder = label;
  input.style.cssText = 'flex:1;min-width:140px;';
  input.setAttribute('aria-label', `Edit ${label}`);

  const saveBtn = document.createElement('button');
  saveBtn.className   = 'edit-btn';
  saveBtn.style.cssText = 'color:var(--success);border:1px solid var(--success);';
  saveBtn.textContent = 'Save';
  saveBtn.addEventListener('click', () => commitInlineEdit(field));

  const cancelBtn = document.createElement('button');
  cancelBtn.className   = 'edit-btn';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', () => cancelInlineEdit(field, currentVal));

  wrapper.appendChild(input);
  wrapper.appendChild(saveBtn);
  wrapper.appendChild(cancelBtn);
  valEl.appendChild(wrapper);
  input.focus();
};

/**
 * Commit the inline edit value to the local `user` object.
 * Changes are persisted to the server when "Save Changes" is clicked.
 */
window.commitInlineEdit = function(field) {
  const input = document.getElementById('edit-input-' + field);
  if (!input) return;
  const newVal = input.value.trim();
  if (!newVal) { CLAP.Toast.error('Field cannot be empty.'); return; }

  user[field] = newVal;
  document.getElementById('val-' + field).textContent = newVal;
  CLAP.Toast.success(`${field.charAt(0).toUpperCase() + field.slice(1)} updated. Click Save Changes to persist.`);
};

/** Revert the field back to its original value (cancel the edit). */
window.cancelInlineEdit = function(field, originalVal) {
  const valEl = document.getElementById('val-' + field);
  if (valEl) valEl.textContent = originalVal || '—';
};

/* ── AVATAR UPLOAD/REMOVE ───────────────────────────────────── */

/**
 * Attach change and click handlers to the avatar controls after
 * they are injected into the DOM by panelProfile().
 */
function attachAvatarHandlers() {
  const fileInput = document.getElementById('avatar-file-input');
  const delBtn    = document.getElementById('del-avatar-btn');
  const preview   = document.getElementById('av-preview');

  /* Read selected image file and show it as a circular preview. */
  if (fileInput) {
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.innerHTML = `<img src="${e.target.result}" alt="Profile photo"
          style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
        user.avatarDataUrl = e.target.result;
        CLAP.Toast.success('Photo updated. Click Save Changes to persist.');
      };
      reader.readAsDataURL(file);
    });
  }

  /* Remove the photo and revert to the initial letter. */
  if (delBtn) {
    delBtn.addEventListener('click', () => {
      const initial = (user.name || 'S').charAt(0).toUpperCase();
      preview.innerHTML = initial;
      user.avatarDataUrl = null;
      CLAP.Toast.info('Photo removed. Click Save Changes to persist.');
    });
  }
}

/* ── SAVE PROFILE ───────────────────────────────────────────── */

/**
 * Send the modified profile fields to the API and update localStorage.
 * CONNECT: PATCH /api/users/me/
 */
window.saveProfile = async function() {
  const userKey = CLAP.CONFIG.USER_KEY || 'clap_user';

  try {
    const data = await CLAP.API.put('/auth/profile/', {
      name:  user.name,
      email: user.email,
    });
    /* Update local user object with what the server confirmed */
    if (data) {
      user.name  = data.name  || user.name;
      user.email = data.email || user.email;
    }
    localStorage.setItem(userKey, JSON.stringify(user));
    CLAP.Toast.success('Profile saved!');
  } catch (err) {
    /* Save locally even if API fails, and show specific error */
    localStorage.setItem(userKey, JSON.stringify(user));
    if (err && err.data && err.data.error) {
      CLAP.Toast.error(err.data.error);
    } else {
      CLAP.Toast.success('Profile saved locally!');
    }
  }
};

/** Update password-strength bar and requirement pill badges. */
window.updatePwStrength = function(val) {
  const wrap  = document.getElementById('pw-strength-wrap');
  const fill  = document.getElementById('pw-strength-fill');
  const label = document.getElementById('pw-strength-label');
  const reqs  = document.getElementById('pw-reqs');
  if (!wrap || !fill || !label) return;

  if (!val) {
    wrap.style.display = 'none';
    if (reqs) reqs.style.display = 'none';
    return;
  }
  wrap.style.display = 'block';
  if (reqs) reqs.style.display = 'block';

  const checks = {
    len:   val.length >= 8,
    upper: /[A-Z]/.test(val),
    num:   /[0-9]/.test(val),
    sym:   /[^A-Za-z0-9]/.test(val),
  };
  const score = Object.values(checks).filter(Boolean).length;

  /* Update pill badges */
  Object.entries(checks).forEach(([key, ok]) => {
    const el = document.getElementById(`req-${key}`);
    if (!el) return;
    el.className = `req-pill ${ok ? 'req-pass' : 'req-fail'}`;
    const dot = el.querySelector('.req-dot');
    if (dot) dot.textContent = ok ? '✓' : '✗';
  });

  const levels = ['', 'weak', 'fair', 'good', 'strong'];
  const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
  const cls    = levels[score] || 'weak';
  fill.className  = `pw-strength-fill ${cls}`;
  label.className = `pw-strength-label ${cls}`;
  label.textContent = labels[score] || 'Weak';
};

/**
 * Submit the change-password form.
 * CONNECT: POST /api/auth/change-password/
 */
window.submitChangePassword = async function() {
  const oldPw  = document.getElementById('cp-old')?.value;
  const newPw  = document.getElementById('cp-new')?.value;
  const confPw = document.getElementById('cp-confirm')?.value;

  if (!oldPw || !newPw || !confPw) {
    CLAP.Toast.error('Please fill in all password fields.');
    return;
  }
  if (newPw !== confPw) {
    CLAP.Toast.error('New passwords do not match.');
    return;
  }
  if (newPw.length < 8) {
    CLAP.Toast.error('New password must be at least 8 characters.');
    return;
  }

  const btn = document.querySelector('.save-changes-btn');
  if (btn) { btn.textContent = 'Saving…'; btn.disabled = true; }

  try {
    await CLAP.API.post('/auth/password/change/', {
      old_password:  oldPw,
      new_password1: newPw,
      new_password2: confPw,
    });
    CLAP.Toast.success('Password changed successfully!');
    window.showProfile();
  } catch (err) {
    /* Map backend error messages to user-friendly text */
    const msg = (err && err.data && err.data.error) ? err.data.error : (err && err.message);
    if (msg && msg.toLowerCase().includes('incorrect')) {
      CLAP.Toast.error('Current password is incorrect.');
    } else if (msg && msg.toLowerCase().includes('different')) {
      CLAP.Toast.error('New password must be different from your current password.');
    } else {
      CLAP.Toast.error(msg || 'Failed to change password. Please try again.');
    }
  } finally {
    if (btn) { btn.textContent = 'Change Password'; btn.disabled = false; }
  }
};

    } else if (field === 'study') {

      const e = document.getElementById('sp-study-end')?.value   || prefs.study_end   || '18:00';
      view.textContent = `${fmtTime(s)} to ${fmtTime(e)}`;
    } else if (field === 'limit') {

      view.textContent = `${v} Hours`;

    view.style.display = '';

      const endEl   = document.getElementById('sp-sleep-end');
      if (startEl) startEl.oninput = () => { /* preview updates on Done */ };
      if (endEl)   endEl.oninput   = () => {};
    } else if (field === 'study') {
      const startEl = document.getElementById('sp-study-start');
      const endEl   = document.getElementById('sp-study-end');
      if (startEl) startEl.oninput = () => {};
      if (endEl)   endEl.oninput   = () => {};

  }
};

/**
 * Save updated study preferences to the API.
 * Validates inputs the same way the onboarding page does before saving.
 * CONNECT: PATCH /api/users/preferences/
 */
window.saveStudyPrefs = async function() {
  const sleepStartEl = document.getElementById('sp-sleep-start');
  const sleepEndEl   = document.getElementById('sp-sleep-end');
  const studyStartEl = document.getElementById('sp-study-start');
  const studyEndEl   = document.getElementById('sp-study-end');
  const limitEl      = document.getElementById('sp-limit-val');

  /* Read current values — fall back to saved prefs if an edit row is collapsed */
  const sleepStart = sleepStartEl?.value || prefs.sleep_start || '23:00';
  const sleepEnd   = sleepEndEl?.value   || prefs.sleep_end   || '07:00';
  const studyStart = studyStartEl?.value || prefs.study_start || '09:00';
  const studyEnd   = studyEndEl?.value   || prefs.study_end   || '18:00';
  const maxHours   = parseInt(limitEl?.value) || prefs.max_focus_hours || 6;

  /* ── Validation (mirrors onboarding.html) ── */
  function toMins(t) {
    const [h, m] = (t || '00:00').split(':').map(Number);
    return h * 60 + (m || 0);
  }

  /* Study end must be after study start */
  if (toMins(studyEnd) <= toMins(studyStart)) {
    CLAP.Toast.error('Study end time must be after study start time.');
    /* Open the study edit row so the user can see the problem */
    const studyEdit = document.getElementById('sp-study-edit');
    const studyView = document.getElementById('sp-study-view');
    const studyBtn  = document.querySelector('[onclick*="toggleSpEdit(\'study\'"]') ||
                      document.querySelector('.edit-btn[onclick*="study"]');
    if (studyEdit) studyEdit.style.display = 'flex';
    if (studyView) studyView.style.display = 'none';
    if (studyBtn)  studyBtn.textContent = 'Done';
    return;
  }

  /* Study hours should not overlap with sleep */
  if (toMins(studyStart) < toMins(sleepEnd)) {
    CLAP.Toast.error('Study hours overlap with your sleep time. Please adjust.');
    return;
  }

  /* Max focus must not exceed study window */
  const studyDurationMins  = (toMins(studyEnd) - toMins(studyStart) + 1440) % 1440;
  const studyDurationHours = studyDurationMins / 60;
  if (maxHours > studyDurationHours) {
    CLAP.Toast.error(`Max focus hours (${maxHours}h) exceeds your study window (${studyDurationHours.toFixed(1)}h).`);
    return;
  }

  /* Max focus must be at least 1 */
  if (maxHours < 1 || maxHours > 16) {
    CLAP.Toast.error('Daily study limit must be between 1 and 16 hours.');
    return;
  }

  /* ── All valid — save ── */
  const updated = {
    sleep_start:     sleepStart,
    sleep_end:       sleepEnd,
    study_start:     studyStart,
    study_end:       studyEnd,
    max_focus_hours: maxHours,
  };

  /* Update local prefs immediately */
  prefs = { ...prefs, ...updated };
  try { localStorage.setItem('clap_prefs', JSON.stringify(prefs)); } catch {}

  /* Try API */
  try { await CLAP.API.put('/users/preferences/update/', updated); } catch {}

  /* Update the view text */
  const sleepView = document.getElementById('sp-sleep-view');
  const studyView = document.getElementById('sp-study-view');
  const limitView = document.getElementById('sp-limit-view');
  if (sleepView) sleepView.textContent = `${fmtTime(sleepStart)} to ${fmtTime(sleepEnd)}`;
  if (studyView) studyView.textContent = `${fmtTime(studyStart)} to ${fmtTime(studyEnd)}`;
  if (limitView) limitView.textContent = `${maxHours} Hours`;

  /* Collapse all edit rows */
  ['sleep', 'study', 'limit'].forEach(f => {
    const editEl = document.getElementById(`sp-${f}-edit`);
    const viewEl = document.getElementById(`sp-${f}-view`);
    if (editEl) editEl.style.display = 'none';
    if (viewEl) viewEl.style.display = '';
  });
  document.querySelectorAll('.settings-panel .edit-btn').forEach(b => {
    if (b.textContent === 'Done') b.textContent = 'Edit';
  });

  CLAP.Toast.success('Study preferences saved!');
};
