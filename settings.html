<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAP — Settings</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>
<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main-content" id="main">

    <!-- Page Title -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:var(--space-xl);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--clap-teal)" stroke-width="2.5">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <h1 class="page-title">Settings</h1>
    </div>

    <div class="settings-layout">
      <!-- Left nav -->
      <nav class="settings-sidenav">
        <button class="settings-sidenav-item" data-sec="general-menu">General</button>
        <div id="general-subnav" class="settings-subnav" style="display:none">
          <button class="settings-subnav-item" data-sub="profile">Profile</button>
          <button class="settings-subnav-item" data-sub="study-prefs">Study Preferences</button>
        </div>
        <button class="settings-sidenav-item" data-sec="about">About Us</button>
      </nav>

      <!-- Right panel -->
      <div class="settings-panel" id="settings-panel">
        <p style="color:var(--text-muted);text-align:center;padding:40px 0">Select a section from the left to get started.</p>
      </div>
    </div>
  </main>
</div>

<script src="js/core.js"></script>
<script src="js/app-shell.js"></script>
<script>
'use strict';
AppShell.init('settings.html', { showSearch: false });

// FIX: clone user object so in-memory edits don't corrupt the stored copy until Save
const _stored = CLAP.Auth.getUser() || {};
const user = { ..._stored };
let curSec = '';
let curSub = 'profile';

/* ── PANEL CONTENT ── */
function panelGeneral() {
  document.getElementById('general-subnav').style.display = 'flex';
  return curSub === 'study-prefs' ? panelStudyPrefs() : panelProfile();
}

function panelProfile() {
  const initial = (user.name || 'S').charAt(0).toUpperCase();
  return `
    <div class="settings-breadcrumb">Settings › <span>General</span> › <span>Profile</span></div>
    <div class="profile-pic-wrap">
      <div class="profile-avatar" id="av-preview">${
        user.avatarDataUrl
          ? `<img src="${user.avatarDataUrl}" alt="Avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`
          : initial
      }</div>
      <div>
        <div style="font-size:.8rem;font-weight:700;color:var(--text-muted);margin-bottom:8px">Profile Picture</div>
        <div style="display:flex;gap:8px">
          <button class="upload-btn" id="del-avatar-btn" style="background:var(--danger-light);border-color:rgba(231,76,60,.3);color:var(--danger)" title="Remove photo">🗑️ Remove</button>
          <label class="upload-btn" style="cursor:pointer;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload
            <input type="file" id="avatar-file-input" accept="image/*" style="display:none" />
          </label>
        </div>
      </div>
    </div>
    <div class="settings-row" id="row-name">
      <div><div class="settings-row-label">Full Name</div><div class="settings-row-value" id="val-name">${escHtml(user.name || '—')}</div></div>
      <button class="edit-btn" onclick="startInlineEdit('name','Full Name')">Edit</button>
    </div>
    <div class="settings-row" id="row-email">
      <div><div class="settings-row-label">Email</div><div class="settings-row-value" id="val-email">${escHtml(user.email || '—')}</div></div>
      <button class="edit-btn" onclick="startInlineEdit('email','Email')">Edit</button>
    </div>
    <div class="settings-row" style="border:none" id="row-program">
      <div><div class="settings-row-label">Program</div><div class="settings-row-value" id="val-program">${escHtml(user.program || 'Computer Science')}</div></div>
      <button class="edit-btn" onclick="startInlineEdit('program','Program')">Edit</button>
    </div>
    <button class="save-changes-btn" onclick="saveProfile()">Save Changes</button>`;
}

function panelStudyPrefs() {
  /* FIX: read from the CONFIG USER_KEY-based preferences stored by onboarding.
     Onboarding saves to /users/preferences/ on the backend and also stores
     locally under 'clap_prefs' as a convenience key.
     Fallback to sensible defaults if not yet set. */
  let p = {};
  try { p = JSON.parse(localStorage.getItem('clap_prefs') || '{}'); } catch {}

  const fmt = (t) => {
    if (!t) return '—';
    const [h, m] = t.split(':').map(Number);
    const ampm = h < 12 ? 'AM' : 'PM';
    const h12  = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return `${String(h12).padStart(2,'0')}:${String(m||0).padStart(2,'0')} ${ampm}`;
  };

  return `
    <div class="settings-breadcrumb">Settings › <span>General</span> › <span>Study Preferences</span></div>
    <h3 style="font-family:var(--font-heading);font-size:1rem;font-weight:700;color:var(--text-primary);margin-bottom:var(--space-md)">Study Preferences</h3>
    <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:var(--space-lg)">To update your sleep or study hours, use the Daily Routine setup in Onboarding. Backend editing will be available soon.</p>
    <div class="settings-row">
      <div><div class="settings-row-label">Sleep Time</div><div class="settings-row-value">${fmt(p.sleep_start) || '11:00 PM'} to ${fmt(p.sleep_end) || '7:00 AM'}</div></div>
    </div>
    <div class="settings-row">
      <div><div class="settings-row-label">Active Study Hours</div><div class="settings-row-value">${fmt(p.study_start) || '9:00 AM'} to ${fmt(p.study_end) || '7:00 PM'}</div></div>
    </div>
    <div class="settings-row" style="border:none">
      <div><div class="settings-row-label">Daily Study Limit</div><div class="settings-row-value">${p.max_focus_hours || 6} Hours</div></div>
    </div>`;
}

function panelAbout() {
  return `
    <div class="settings-breadcrumb">Settings › <span>About Us</span></div>
    <div class="about-section">
      <h3>About CLAP:</h3>
      <p>CLAP (Cognitive Load-Based Adaptive Academic Planner) is a smart academic planning system designed to help students manage their workload effectively.</p>
      <p style="margin-top:8px">It uses cognitive load principles to generate balanced study schedules, reduce stress, and prevent burnout.</p>
    </div>
    <div class="about-section">
      <h3>The Problem:</h3>
      <p>CLAP analyzes assignments, deadlines, and workload to automatically generate an optimized study plan. It also monitors cognitive load and provides smart recommendations to help students stay productive while maintaining balance.</p>
    </div>
    <div class="about-section">
      <h3>Key Features:</h3>
      <p>• AI-generated study planning<br>• Cognitive load tracking<br>• Smart task prioritization<br>• Adaptive schedule adjustments</p>
    </div>
    <div class="about-version">CLAP v1.0.0 — Developed for IIEF 2026</div>`;
}

/* ── NAVIGATION ── */
function setSection(sec) {
  curSec = sec;
  document.getElementById('general-subnav').style.display = 'none';
  document.querySelectorAll('.settings-sidenav-item').forEach(b => b.classList.toggle('active', b.dataset.sec === sec));
  document.querySelectorAll('.settings-subnav-item').forEach(b => b.classList.remove('active'));

  let html = '';
  if (sec === 'general-menu') {
    html = panelGeneral();
    document.getElementById('general-subnav').style.display = 'flex';
  } else if (sec === 'about') {
    html = panelAbout();
  }

  document.getElementById('settings-panel').innerHTML = html;
  document.querySelectorAll('.settings-subnav-item').forEach(b =>
    b.classList.toggle('active', b.dataset.sub === curSub)
  );

  if (sec === 'general-menu' && curSub === 'profile') {
    attachAvatarHandlers();
  }
}

document.querySelectorAll('.settings-sidenav-item').forEach(btn => {
  btn.addEventListener('click', () => setSection(btn.dataset.sec));
});
document.querySelectorAll('.settings-subnav-item').forEach(btn => {
  btn.addEventListener('click', () => { curSub = btn.dataset.sub; setSection('general-menu'); });
});

/* ── INLINE EDIT ── */
window.startInlineEdit = function(field, label) {
  const valEl = document.getElementById('val-' + field);
  const rowEl = document.getElementById('row-' + field);
  if (!valEl || !rowEl) return;

  const currentVal = user[field] || '';
  valEl.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <input id="edit-input-${field}" class="inline-input" type="text"
             value="${escHtml(currentVal)}" placeholder="${escHtml(label)}"
             style="flex:1;min-width:140px;" />
      <button class="edit-btn" style="color:var(--success);border:1px solid var(--success);"
              onclick="commitInlineEdit('${field}')">Save</button>
      <button class="edit-btn" onclick="cancelInlineEdit('${field}','${escHtml(currentVal)}')">Cancel</button>
    </div>`;
  document.getElementById('edit-input-' + field)?.focus();
};

window.commitInlineEdit = function(field) {
  const input = document.getElementById('edit-input-' + field);
  if (!input) return;
  const newVal = input.value.trim();
  if (!newVal) { CLAP.Toast.error('Field cannot be empty.'); return; }
  user[field] = newVal;
  document.getElementById('val-' + field).textContent = newVal;
  CLAP.Toast.success(`${field.charAt(0).toUpperCase() + field.slice(1)} updated. Click Save Changes to persist.`);
};

window.cancelInlineEdit = function(field, originalVal) {
  const valEl = document.getElementById('val-' + field);
  if (valEl) valEl.textContent = originalVal || '—';
};

/* ── AVATAR HANDLERS ── */
function attachAvatarHandlers() {
  const fileInput = document.getElementById('avatar-file-input');
  const delBtn    = document.getElementById('del-avatar-btn');
  const preview   = document.getElementById('av-preview');

  if (fileInput) {
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      /* Validate file size (max 2MB) */
      if (file.size > 2 * 1024 * 1024) {
        CLAP.Toast.error('Image must be under 2MB.');
        return;
      }
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.innerHTML = `<img src="${e.target.result}" alt="Avatar"
          style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
        user.avatarDataUrl = e.target.result;
        CLAP.Toast.success('Photo updated. Click Save Changes to persist.');
      };
      reader.readAsDataURL(file);
    });
  }

  if (delBtn) {
    delBtn.addEventListener('click', () => {
      const initial = (user.name || 'S').charAt(0).toUpperCase();
      preview.innerHTML = initial;
      user.avatarDataUrl = null;
      CLAP.Toast.info('Photo removed. Click Save Changes to persist.');
    });
  }
}

/* ── SAVE PROFILE ── */
window.saveProfile = async function() {
  const payload = {
    name:    user.name,
    email:   user.email,
    program: user.program,
  };
  try {
    /* CONNECT: PATCH /api/users/me/ */
    await CLAP.API.patch('/users/me/', payload);
    /* Persist locally only after successful server save */
    localStorage.setItem(CLAP.CONFIG.USER_KEY, JSON.stringify(user));
    CLAP.Toast.success('Profile saved!');
  } catch (err) {
    /* FIX: show error if API fails instead of always showing success */
    CLAP.Toast.error(err?.message || 'Failed to save profile. Please try again.');
  }
};

/* ── HELPER ── */
function escHtml(str) {
  if (str == null) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}
</script>
</body>
</html>
