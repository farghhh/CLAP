<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAP — My Assignments</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>

    <main class="main-content assign-page" id="main">
      <section class="assign-shell">
        <div class="assign-top-row" id="page-header">
          <h1 class="assign-page-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
              <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
            </svg>
            <span>My Assignments</span>
          </h1>

          <button class="add-btn" id="add-btn" type="button">
            <span class="add-btn-icon" aria-hidden="true">⊕</span>
            <span>Add Assignment</span>
          </button>
        </div>

        <div class="tab-bar" id="tab-bar" role="tablist" aria-label="Assignment views">
          <button class="tab-btn active" id="tab-progress" type="button" role="tab" aria-selected="true" data-tab="progress">Assignment Progress</button>
          <button class="tab-btn" id="tab-all" type="button" role="tab" aria-selected="false" data-tab="all">All Assignments</button>
        </div>

        <section id="view-progress" class="assign-view" aria-labelledby="tab-progress">
          <div class="progress-card" id="progress-list"></div>
        </section>

        <section id="view-all" class="assign-view" aria-labelledby="tab-all" hidden>
          <div class="assignments-table-wrap">
            <div class="tbl-search-wrap">
              <span class="tbl-search-icon" aria-hidden="true">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3">
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.35-4.35"></path>
                </svg>
              </span>
              <input class="tbl-search-bar" id="tbl-search-input" type="search" placeholder="Find your assignments." aria-label="Search assignments" />
            </div>

            <div class="assign-table-scroll">
              <table class="assignments-table">
                <thead>
                  <tr>
                    <th>No.</th>
                    <th>Code</th>
                    <th>Assignment Title</th>
                    <th>Deadline</th>
                    <th>Hours</th>
                    <th>Difficulty</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="assign-tbody"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section id="view-form" class="assign-view assign-form-view" hidden>
          <button class="back-btn" id="back-btn" type="button" aria-label="Go back">
            <span aria-hidden="true">‹</span>
            <span>Back</span>
          </button>

          <h2 class="add-assign-title" id="form-title">Add Assignment</h2>

          <form class="add-assign-wrap" id="assignment-form" novalidate>
            <div class="form-field form-field-short">
              <label for="f-code">Course Code<span>*</span></label>
              <input id="f-code" name="course_code" type="text" placeholder="Eg: CSC2434" maxlength="20" />
              <small class="field-note" id="err-code"></small>
            </div>

            <div class="form-field form-field-wide">
              <label for="f-title">Assignment Title<span>*</span></label>
              <input id="f-title" name="title" type="text" placeholder="Eg: Database Final Project" maxlength="120" />
              <small class="field-note" id="err-title"></small>
            </div>

            <div class="form-field form-field-short form-field-select">
              <label for="f-deadline">Deadline<span>*</span></label>
              <input id="f-deadline" name="deadline" type="date" />
              <small class="field-note" id="err-deadline"></small>
            </div>

            <div class="form-field form-field-short">
              <label for="f-hours">Estimated Hours<span>*</span></label>
              <input id="f-hours" name="hours" type="number" min="1" step="1" placeholder="Eg: 6 Hours" />
              <small class="field-note" id="err-hours"></small>
            </div>

            <div class="form-field form-field-short form-field-select">
              <label for="f-difficulty">Difficulty Level<span>*</span></label>
              <select id="f-difficulty" name="difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
              </select>
              <small class="field-note" id="err-difficulty"></small>
            </div>

            <button class="save-btn" id="save-btn" type="submit">Save</button>
          </form>
        </section>
      </section>
    </main>
  </div>

  <aside class="progress-legend" id="progress-legend" hidden aria-label="Progress meaning">
    <div class="legend-item"><span class="legend-dot legend-dot-completed"></span><span>Completed</span></div>
    <div class="legend-item"><span class="legend-dot legend-dot-not-started"></span><span>Not Started Yet</span></div>
    <div class="legend-item"><span class="legend-dot legend-dot-progress"></span><span>In Progress</span></div>
  </aside>

  <button class="info-fab" id="info-fab" type="button" aria-label="Toggle progress legend">i</button>

  <div class="del-modal-overlay" id="del-modal" aria-hidden="true">
    <div class="del-modal-box" role="dialog" aria-modal="true" aria-labelledby="del-modal-title">
      <div class="del-modal-icon" aria-hidden="true">🗑️</div>
      <h3 class="del-modal-title" id="del-modal-title">Delete Assignment?</h3>
      <p class="del-modal-sub">This assignment will be removed from the list. This action can be connected to backend delete permanently.</p>
      <div class="del-modal-actions">
        <button class="btn btn-ghost btn-sm" id="del-cancel" type="button">Cancel</button>
        <button class="btn btn-danger btn-sm" id="del-confirm" type="button">Delete</button>
      </div>
    </div>
  </div>

  <script src="js/core.js"></script>
  <script src="js/app-shell.js"></script>
  <script>
    'use strict';

    AppShell.init('assignments.html', { showTopbar: false, showSearch: false });

    const AssignmentAPI = {
      endpoint: '/assignments/',

      normalize(item = {}) {
        const progressValue = Number(
          item.progress_percentage ??
          item.progress ??
          item.completion ??
          item.percent ??
          0
        );

        return {
          id: item.id,
          course_code: String(item.course_code ?? item.code ?? '').trim(),
          title: String(item.title ?? item.assignment_title ?? '').trim(),
          deadline: String(item.deadline ?? item.due_date ?? '').slice(0, 10),
          hours: Number(item.hours ?? item.estimated_hours ?? 0),
          difficulty: String(item.difficulty ?? 'easy').toLowerCase(),
          progress: Number.isFinite(progressValue) ? Math.max(0, Math.min(100, progressValue)) : 0,
        };
      },

      serialize(payload = {}) {
        return {
          course_code: payload.course_code,
          title: payload.title,
          deadline: payload.deadline,
          hours: payload.hours,
          difficulty: payload.difficulty,
        };
      },

      async list() {
        const data = await CLAP.API.get(this.endpoint);
        const rows = Array.isArray(data) ? data : (Array.isArray(data.results) ? data.results : []);
        return rows.map(row => this.normalize(row));
      },

      async create(payload) {
        const created = await CLAP.API.post(this.endpoint, this.serialize(payload));
        return this.normalize(created);
      },

      async update(id, payload) {
        const updated = await CLAP.API.put(`${this.endpoint}${id}/`, this.serialize(payload));
        return this.normalize(updated);
      },

      async remove(id) {
        return CLAP.API.delete(`${this.endpoint}${id}/`);
      }
    };

    const FALLBACK_ASSIGNMENTS = (CLAP.MockData?.assignments || []).map(item => AssignmentAPI.normalize(item));

    const state = {
      assignments: [],
      activeTab: 'progress',
      editingId: null,
      deleteId: null,
      useFallback: false,
    };

    const $ = id => document.getElementById(id);

    const els = {
      progressList: $('progress-list'),
      assignTbody: $('assign-tbody'),
      tblSearchInput: $('tbl-search-input'),
      viewProgress: $('view-progress'),
      viewAll: $('view-all'),
      viewForm: $('view-form'),
      pageHeader: $('page-header'),
      tabBar: $('tab-bar'),
      infoFab: $('info-fab'),
      legend: $('progress-legend'),
      delModal: $('del-modal'),
      assignmentForm: $('assignment-form'),
      formTitle: $('form-title'),
      backBtn: $('back-btn'),
      addBtn: $('add-btn'),
      saveBtn: $('save-btn'),
      fields: {
        code: $('f-code'),
        title: $('f-title'),
        deadline: $('f-deadline'),
        hours: $('f-hours'),
        difficulty: $('f-difficulty'),
      },
      fieldErrors: {
        code: $('err-code'),
        title: $('err-title'),
        deadline: $('err-deadline'),
        hours: $('err-hours'),
        difficulty: $('err-difficulty'),
      }
    };

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = String(value ?? '');
      return div.innerHTML;
    }

    function formatDate(dateString) {
      if (!dateString) return '-';
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return dateString;
      const day = date.getDate();
      const month = date.getMonth() + 1;
      const year = date.getFullYear();
      return `${day}/${month}/${year}`;
    }

    function getDifficultyLabel(value) {
      const normalized = String(value || 'easy').toLowerCase();
      return normalized.charAt(0).toUpperCase() + normalized.slice(1);
    }

    function getProgressMeta(progress) {
      const pct = Number(progress) || 0;
      if (pct >= 100) {
        return {
          fillClass: 'completed',
          badgeClass: 'completed',
          badgeText: '100%',
        };
      }
      if (pct <= 0) {
        return {
          fillClass: 'not-started',
          badgeClass: 'not-started',
          badgeText: '0%',
        };
      }
      return {
        fillClass: 'progressing',
        badgeClass: 'progressing',
        badgeText: `${pct}%`,
      };
    }

    function getFilteredAssignments() {
      const q = (state.activeTab === 'all' ? els.tblSearchInput.value : '').trim().toLowerCase();
      if (!q) return [...state.assignments];
      return state.assignments.filter(item => {
        return (
          item.course_code.toLowerCase().includes(q) ||
          item.title.toLowerCase().includes(q) ||
          String(item.deadline).toLowerCase().includes(q)
        );
      });
    }

    function sortAssignments(rows) {
      return [...rows].sort((a, b) => {
        const ad = new Date(a.deadline || '2100-12-31').getTime();
        const bd = new Date(b.deadline || '2100-12-31').getTime();
        return ad - bd;
      });
    }

    function renderProgress() {
      const items = sortAssignments(state.assignments);
      if (!items.length) {
        els.progressList.innerHTML = '<p class="assign-empty-state">No assignments available yet.</p>';
        return;
      }

      els.progressList.innerHTML = items.map(item => {
        const meta = getProgressMeta(item.progress);
        return `
          <article class="progress-item">
            <div class="progress-item-header">
              <h3 class="progress-item-name">${escapeHtml(item.course_code)} ${escapeHtml(item.title)}</h3>
              <span class="progress-pct-badge ${meta.badgeClass}">${meta.badgeText}</span>
            </div>
            <div class="progress-bar-track" aria-label="${escapeHtml(item.title)} progress ${meta.badgeText}">
              <div class="progress-fill ${meta.fillClass}" style="width:${item.progress}%"></div>
            </div>
          </article>
        `;
      }).join('');
    }

    function renderTable() {
      const items = sortAssignments(getFilteredAssignments());
      if (!items.length) {
        els.assignTbody.innerHTML = '<tr><td colspan="7" class="assign-table-empty">No assignments found.</td></tr>';
        return;
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      els.assignTbody.innerHTML = items.map((item, index) => {
        const deadlineDate = new Date(item.deadline);
        const isOverdue = !Number.isNaN(deadlineDate.getTime()) && deadlineDate < today && (Number(item.progress) || 0) < 100;
        return `
          <tr class="${isOverdue ? 'overdue' : ''}">
            <td>${index + 1}</td>
            <td>${escapeHtml(item.course_code)}</td>
            <td>${escapeHtml(item.title)}</td>
            <td>${escapeHtml(formatDate(item.deadline))}</td>
            <td>${escapeHtml(item.hours)}</td>
            <td><span class="diff-badge ${escapeHtml(item.difficulty)}">${escapeHtml(getDifficultyLabel(item.difficulty))}</span></td>
            <td>
              <div class="table-actions">
                <button class="tbl-action-btn edit" type="button" onclick="window.startEdit(${Number(item.id)})" aria-label="Edit ${escapeHtml(item.title)}">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path></svg>
                </button>
                <button class="tbl-action-btn del" type="button" onclick="window.startDelete(${Number(item.id)})" aria-label="Delete ${escapeHtml(item.title)}">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>
                </button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function setView(name) {
      state.activeTab = name;
      const isForm = name === 'form';
      els.pageHeader.hidden = isForm;
      els.tabBar.hidden = isForm;
      els.viewProgress.hidden = name !== 'progress';
      els.viewAll.hidden = name !== 'all';
      els.viewForm.hidden = name !== 'form';
      els.infoFab.hidden = name !== 'progress';
      if (name !== 'progress') {
        els.legend.hidden = true;
      }

      document.querySelectorAll('.tab-btn').forEach(btn => {
        const active = btn.dataset.tab === name;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-selected', active ? 'true' : 'false');
      });
    }

    function resetFormErrors() {
      Object.values(els.fields).forEach(field => field.classList.remove('error'));
      Object.values(els.fieldErrors).forEach(errorEl => errorEl.textContent = '');
    }

    function openCreateForm() {
      state.editingId = null;
      els.formTitle.textContent = 'Add Assignment';
      els.assignmentForm.reset();
      els.fields.difficulty.value = 'easy';
      resetFormErrors();
      setView('form');
    }

    function fillForm(item) {
      els.fields.code.value = item.course_code;
      els.fields.title.value = item.title;
      els.fields.deadline.value = item.deadline;
      els.fields.hours.value = item.hours;
      els.fields.difficulty.value = item.difficulty;
    }

    function validateForm() {
      resetFormErrors();
      let valid = true;

      const code = els.fields.code.value.trim();
      const title = els.fields.title.value.trim();
      const deadline = els.fields.deadline.value;
      const hours = els.fields.hours.value.trim();

      if (!code) {
        valid = false;
        els.fields.code.classList.add('error');
        els.fieldErrors.code.textContent = 'Course code is required.';
      }
      if (!title) {
        valid = false;
        els.fields.title.classList.add('error');
        els.fieldErrors.title.textContent = 'Assignment title is required.';
      }
      if (!deadline) {
        valid = false;
        els.fields.deadline.classList.add('error');
        els.fieldErrors.deadline.textContent = 'Deadline is required.';
      }
      if (!hours || Number(hours) <= 0) {
        valid = false;
        els.fields.hours.classList.add('error');
        els.fieldErrors.hours.textContent = 'Estimated hours must be more than 0.';
      }

      return valid;
    }

    function getFormPayload() {
      return {
        course_code: els.fields.code.value.trim().toUpperCase(),
        title: els.fields.title.value.trim(),
        deadline: els.fields.deadline.value,
        hours: Number(els.fields.hours.value),
        difficulty: els.fields.difficulty.value,
      };
    }

    async function loadAssignments() {
      try {
        state.assignments = await AssignmentAPI.list();
        state.useFallback = false;
      } catch (error) {
        console.warn('Assignments API unavailable, using fallback data.', error);
        state.assignments = [...FALLBACK_ASSIGNMENTS];
        state.useFallback = true;
      }
      renderProgress();
      renderTable();
      setView('progress');
    }

    async function saveAssignment(event) {
      event.preventDefault();
      if (!validateForm()) {
        CLAP.Toast.error('Please complete all required fields.');
        return;
      }

      const payload = getFormPayload();
      els.saveBtn.disabled = true;
      els.saveBtn.textContent = 'Saving...';

      try {
        if (state.editingId !== null) {
          if (state.useFallback) {
            const index = state.assignments.findIndex(item => item.id === state.editingId);
            if (index !== -1) {
              state.assignments[index] = { ...state.assignments[index], ...payload };
            }
          } else {
            const updated = await AssignmentAPI.update(state.editingId, payload);
            const index = state.assignments.findIndex(item => item.id === state.editingId);
            if (index !== -1) state.assignments[index] = updated;
          }
          CLAP.Toast.success('Assignment updated successfully.');
        } else {
          if (state.useFallback) {
            state.assignments.push({ id: Date.now(), progress: 0, ...payload });
          } else {
            const created = await AssignmentAPI.create(payload);
            state.assignments.push({ ...created, progress: created.progress ?? 0 });
          }
          CLAP.Toast.success('Assignment added successfully.');
        }

        renderProgress();
        renderTable();
        setView('all');
      } catch (error) {
        console.error(error);
        CLAP.Toast.error(error?.message || 'Unable to save assignment right now.');
      } finally {
        els.saveBtn.disabled = false;
        els.saveBtn.textContent = 'Save';
      }
    }

    async function confirmDelete() {
      if (state.deleteId === null) return;
      const id = state.deleteId;
      $('del-confirm').disabled = true;

      try {
        if (!state.useFallback) {
          await AssignmentAPI.remove(id);
        }
        state.assignments = state.assignments.filter(item => item.id !== id);
        CLAP.Toast.success('Assignment deleted successfully.');
        renderProgress();
        renderTable();
      } catch (error) {
        console.error(error);
        CLAP.Toast.error(error?.message || 'Unable to delete assignment right now.');
      } finally {
        state.deleteId = null;
        $('del-confirm').disabled = false;
        els.delModal.classList.remove('open');
        els.delModal.setAttribute('aria-hidden', 'true');
      }
    }

    window.startEdit = function(id) {
      const item = state.assignments.find(row => Number(row.id) === Number(id));
      if (!item) return;
      state.editingId = item.id;
      els.formTitle.textContent = 'Edit Assignment';
      fillForm(item);
      resetFormErrors();
      setView('form');
    };

    window.startDelete = function(id) {
      state.deleteId = Number(id);
      els.delModal.classList.add('open');
      els.delModal.setAttribute('aria-hidden', 'false');
    };

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.tab;
        setView(target);
        renderTable();
      });
    });

    els.addBtn.addEventListener('click', openCreateForm);
    els.backBtn.addEventListener('click', () => {
      setView('all');
      renderTable();
    });
    els.assignmentForm.addEventListener('submit', saveAssignment);
    els.tblSearchInput.addEventListener('input', renderTable);

    els.infoFab.addEventListener('click', () => {
      els.legend.hidden = !els.legend.hidden;
    });

    $('del-cancel').addEventListener('click', () => {
      state.deleteId = null;
      els.delModal.classList.remove('open');
      els.delModal.setAttribute('aria-hidden', 'true');
    });

    $('del-confirm').addEventListener('click', confirmDelete);

    els.delModal.addEventListener('click', event => {
      if (event.target === els.delModal) {
        state.deleteId = null;
        els.delModal.classList.remove('open');
        els.delModal.setAttribute('aria-hidden', 'true');
      }
    });

    loadAssignments();
  </script>
</body>
</html>
