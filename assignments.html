<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAP — My Assignments</title>

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>

<body>

<!-- Toast -->
<div id="toast-container"></div>

<!-- Sidebar toggle -->
<button class="sidebar-toggle" id="sidebar-toggle">&#9776;</button>
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<div class="app-layout">

  <!-- Sidebar injected by AppShell -->
  <aside id="sidebar" class="sidebar"></aside>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="main">

    <!-- Header -->
    <div class="assign-page-header" id="page-header">

      <h1 class="assign-page-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
        My Assignments
      </h1>

      <div class="assign-search" id="header-search">
        <span class="s-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </span>
        <input type="search" id="search-input" placeholder="Find your assignments..." />
      </div>

      <button class="add-btn ml-auto" id="add-btn">
        + Add Assignment
      </button>

    </div>

    <!-- Tabs -->
    <div class="tab-bar" id="tab-bar">
      <button class="tab-btn active" id="tab-progress">Assignment Progress</button>
      <button class="tab-btn" id="tab-all">All Assignments</button>
    </div>

    <!-- Progress -->
    <div id="view-progress">
      <div class="progress-card" id="progress-list">
        Loading...
      </div>
    </div>

    <!-- Table -->
    <div id="view-all" style="display:none">
      <div class="assignments-table-wrap">

        <div class="tbl-search-wrap">
          <input class="tbl-search-bar" id="tbl-search-input" placeholder="Search..." />
        </div>

        <table class="assignments-table">
          <thead>
            <tr>
              <th>No</th>
              <th>Code</th>
              <th>Title</th>
              <th>Deadline</th>
              <th>Hours</th>
              <th>Difficulty</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="assign-tbody"></tbody>
        </table>

      </div>
    </div>

    <!-- FORM -->
    <div id="view-form" style="display:none">

      <button class="back-btn" id="back-btn">← Back</button>

      <h2 class="add-assign-title" id="form-title">Add Assignment</h2>

      <div class="add-assign-wrap">

        <div class="form-field">
          <label>Course Code</label>
          <input id="f-code">
        </div>

        <div class="form-field">
          <label>Title</label>
          <input id="f-title">
        </div>

        <div class="form-field">
          <label>Deadline</label>
          <input type="date" id="f-deadline">
        </div>

        <div class="form-field">
          <label>Hours</label>
          <input type="number" id="f-hours">
        </div>

        <div class="form-field">
          <label>Difficulty</label>
          <select id="f-difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>

        <button class="save-btn" id="save-btn">Save</button>

      </div>
    </div>

  </main>
</div>

<!-- Scripts -->
<script src="js/core.js"></script>
<script src="js/app-shell.js"></script>

<script>
  AppShell.init('assignments.html', { showSearch: false });
  /**
 * CLAP — My Assignments Page Script
 * ============================================================
 * Handles: data loading, progress view, table view, add/edit
 * form, delete modal, tab switching, search, and sidebar.
 *
 * Depends on: css/global.css, css/app.css
 * CONNECT: replace MOCK with real API calls via CLAP.API.*
 * ============================================================
 */
'use strict';

/* ── MOCK DATA ─────────────────────────────────────────────────
   Remove once GET /api/assignments/ is connected.
   ─────────────────────────────────────────────────────────── */
const MOCK = [
  { id:1, course_code:'CSC2383', title:'Database Final Project',         deadline:'2026-03-22', hours:6,  difficulty:'easy',   progress:80  },
  { id:2, course_code:'CSC2613', title:'Parallel Computing System',      deadline:'2026-03-25', hours:10, difficulty:'medium', progress:60  },
  { id:3, course_code:'CSC2434', title:'Mobile Application Development', deadline:'2026-03-31', hours:25, difficulty:'hard',   progress:20  },
  { id:4, course_code:'CSC2672', title:'UI/UX Design Prototype',         deadline:'2026-04-25', hours:20, difficulty:'hard',   progress:100 },
  { id:5, course_code:'CSC4832', title:'AI Research Thesis',             deadline:'2026-03-05', hours:7,  difficulty:'easy',   progress:0   },
];

/* ── STATE ── */
let assignments = [];
let editingId   = null;
let deleteId    = null;
let activeTab   = 'progress';

/* ── DOM REFS ── */
const $ = id => document.getElementById(id);

const searchInput    = $('search-input');
const tblSearchInput = $('tbl-search-input');
const progressList   = $('progress-list');
const assignTbody    = $('assign-tbody');
const legendEl       = $('progress-legend');
const infoFab        = $('info-fab');
const viewProgress   = $('view-progress');
const viewAll        = $('view-all');
const viewForm       = $('view-form');
const pageHeader     = $('page-header');
const tabBar         = $('tab-bar');
const headerSearch   = $('header-search');
const delModal       = $('del-modal');
const logoutModal    = $('logout-modal');

/* ── TOAST ─────────────────────────────────────────────────── */
function showToast(msg, type = 'success') {
  const container = $('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span class="toast-msg">${escHtml(msg)}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('hiding');
    toast.addEventListener('animationend', () => toast.remove(), { once: true });
    setTimeout(() => toast.remove(), 400);
  }, 3500);
}

/* ── ESCAPE HTML ── */
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

/* ── LOAD ──────────────────────────────────────────────────────
   Fetches from API; falls back to MOCK data.
   CONNECT: replace with CLAP.API.get('/assignments/')
   ─────────────────────────────────────────────────────────── */
async function loadAssignments() {
  try {
    const res = await fetch('/api/assignments/');
    if (!res.ok) throw new Error('API unavailable');
    assignments = await res.json();
  } catch {
    assignments = MOCK;
  }
  renderProgress();
  renderTable();
}

/* ── RENDER PROGRESS VIEW ────────────────────────────────────── */
function renderProgress() {
  const q = (searchInput.value || '').toLowerCase();
  const items = assignments.filter(a =>
    !q || a.title.toLowerCase().includes(q) || a.course_code.toLowerCase().includes(q)
  );

  if (!items.length) {
    progressList.innerHTML =
      '<p style="color:var(--text-muted);text-align:center;padding:20px">No assignments found.</p>';
    return;
  }

  progressList.innerHTML = items.map(a => {
    const pct        = a.progress ?? 0;
    const isComplete = pct === 100;
    const isNotStart = pct === 0;

    const fillClass = isComplete ? 'completed' : isNotStart ? 'not-started' : '';
    const badgeBg   = isComplete ? 'var(--success)' : isNotStart ? '#222' : 'var(--clap-teal)';
    const labelTxt  = isComplete ? 'Completed' : isNotStart ? 'Not Started' : `${pct}%`;

    return `
      <div class="progress-item">
        <div class="progress-item-header">
          <div class="progress-item-name">${escHtml(a.course_code)} ${escHtml(a.title)}</div>
          <div class="progress-pct-badge" style="background:${badgeBg}">${labelTxt}</div>
        </div>
        <div class="progress-bar-track">
          <div class="progress-fill ${fillClass}" style="width:${pct}%"></div>
        </div>
      </div>`;
  }).join('');
}

/* ── RENDER TABLE VIEW ─────────────────────────────────────── */
function renderTable() {
  const q = ((tblSearchInput && tblSearchInput.value) || searchInput.value || '').toLowerCase();
  const items = assignments.filter(a =>
    !q || a.title.toLowerCase().includes(q) || a.course_code.toLowerCase().includes(q)
  );

  if (!items.length) {
    assignTbody.innerHTML =
      '<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text-muted)">No assignments found.</td></tr>';
    return;
  }

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  assignTbody.innerHTML = items.map((a, i) => {
    const dl    = new Date(a.deadline);
    const over  = dl < today;
    const dlStr = dl.toLocaleDateString('en-GB');
    const diff  = a.difficulty || 'easy';

    return `
      <tr class="${over ? 'overdue' : ''}">
        <td>${i + 1}</td>
        <td>${escHtml(a.course_code)}</td>
        <td>${escHtml(a.title)}</td>
        <td>${dlStr}</td>
        <td>${a.hours}</td>
        <td><span class="diff-badge ${diff}">${diff.charAt(0).toUpperCase() + diff.slice(1)}</span></td>
        <td style="display:flex;gap:4px;">
          <button class="tbl-action-btn edit" onclick="startEdit(${a.id})"   title="Edit assignment"   aria-label="Edit ${escHtml(a.title)}">✏️</button>
          <button class="tbl-action-btn del"  onclick="startDelete(${a.id})" title="Delete assignment" aria-label="Delete ${escHtml(a.title)}">🗑️</button>
        </td>
      </tr>`;
  }).join('');
}

/* ── VIEW SWITCHER ──────────────────────────────────────────── */
function showView(name) {
  /* Hide/show header chrome based on view */
  const isForm = name === 'form';
  pageHeader.style.display = isForm ? 'none' : '';
  tabBar.style.display     = isForm ? 'none' : '';
  infoFab.style.display    = isForm ? 'none' : '';

  /* The header search bar is only shown in progress view;
     the table view has its own internal search bar */
  if (headerSearch) {
    headerSearch.style.display = (name === 'all' || isForm) ? 'none' : '';
  }

  /* Toggle views */
  viewProgress.style.display = name === 'progress' ? '' : 'none';
  viewAll.style.display      = name === 'all'      ? '' : 'none';
  viewForm.style.display     = name === 'form'     ? '' : 'none';

  /* Hide legend when not in progress view */
  if (legendEl) {
    legendEl.style.display = 'none';
  }

  /* Sync tab active states */
  $('tab-progress').classList.toggle('active', name === 'progress');
  $('tab-all').classList.toggle('active',      name === 'all');
}

/* ── TABS ── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-selected', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-selected', 'true');
    activeTab = btn.dataset.tab;
    showView(activeTab);
  });
});

/* ── SEARCH ── */
searchInput.addEventListener('input', () => {
  renderProgress();
  renderTable();
});

if (tblSearchInput) {
  tblSearchInput.addEventListener('input', () => renderTable());
}

/* ── ADD ── */
$('add-btn').addEventListener('click', () => {
  editingId = null;
  $('form-title').textContent = 'Add Assignment';
  ['f-code', 'f-title', 'f-deadline', 'f-hours'].forEach(id => $(id).value = '');
  $('f-difficulty').value = 'easy';
  showView('form');
});

/* ── EDIT ── */
window.startEdit = function(id) {
  const a = assignments.find(x => x.id === id);
  if (!a) return;
  editingId = id;
  $('form-title').textContent   = 'Edit Assignment';
  $('f-code').value             = a.course_code;
  $('f-title').value            = a.title;
  $('f-deadline').value         = a.deadline;
  $('f-hours').value            = a.hours;
  $('f-difficulty').value       = a.difficulty;
  showView('form');
};

/* ── DELETE ── */
window.startDelete = function(id) {
  deleteId = id;
  delModal.classList.add('open');
};

$('del-cancel').addEventListener('click', () => delModal.classList.remove('open'));

delModal.addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

$('del-confirm').addEventListener('click', async () => {
  delModal.classList.remove('open');
  try {
    await fetch(`/api/assignments/${deleteId}/`, { method: 'DELETE' });
  } catch { /* Remove locally even if API fails */ }
  assignments = assignments.filter(a => a.id !== deleteId);
  renderProgress();
  renderTable();
  showToast('Assignment deleted.');
});

/* ── SAVE ── */
$('save-btn').addEventListener('click', async () => {
  const codeEl  = $('f-code');
  const titleEl = $('f-title');
  const dlEl    = $('f-deadline');
  const hrsEl   = $('f-hours');

  const code  = codeEl.value.trim();
  const title = titleEl.value.trim();
  const dl    = dlEl.value;
  const hrs   = parseInt(hrsEl.value);
  const diff  = $('f-difficulty').value;

  /* Highlight invalid fields */
  [codeEl, titleEl, dlEl, hrsEl].forEach(el => {
    const invalid = !el.value.trim();
    el.style.borderColor = invalid ? 'var(--danger)' : '';
    el.style.background  = invalid ? 'var(--danger-light)' : '';
  });

  if (!code || !title || !dl || !hrs) {
    showToast('Please fill all required fields.', 'error');
    return;
  }

  /* Clear error styles */
  [codeEl, titleEl, dlEl, hrsEl].forEach(el => {
    el.style.borderColor = '';
    el.style.background  = '';
  });

  const payload = { course_code: code, title, deadline: dl, hours: hrs, difficulty: diff };

  try {
    if (editingId) {
      /* CONNECT: PUT /api/assignments/{id}/ */
      await fetch(`/api/assignments/${editingId}/`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const idx = assignments.findIndex(a => a.id === editingId);
      if (idx !== -1) assignments[idx] = { ...assignments[idx], ...payload };
      showToast('Assignment updated!');
    } else {
      /* CONNECT: POST /api/assignments/ */
      const res = await fetch('/api/assignments/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const created = await res.json().catch(() => null);
      assignments.push(created || { id: Date.now(), ...payload, progress: 0 });
      showToast('Assignment added!');
    }
  } catch {
    /* Optimistic local update if API unreachable */
    if (editingId) {
      const idx = assignments.findIndex(a => a.id === editingId);
      if (idx !== -1) assignments[idx] = { ...assignments[idx], ...payload };
    } else {
      assignments.push({ id: Date.now(), ...payload, progress: 0 });
    }
    showToast(editingId ? 'Assignment updated!' : 'Assignment added!');
  }

  renderProgress();
  renderTable();
  showView(activeTab);
});

/* ── BACK BUTTON ── */
$('back-btn').addEventListener('click', () => showView(activeTab));

/* ── INFO FAB — toggle legend ── */
if (legendEl) legendEl.style.display = 'none';

infoFab.addEventListener('click', () => {
  if (!legendEl) return;
  const hidden = legendEl.style.display === 'none' || legendEl.style.display === '';
  legendEl.style.display = hidden ? 'flex' : 'none';
});

/* ── SIDEBAR MOBILE ── */
const sidebarToggle   = $('sidebar-toggle');
const sidebarEl       = $('sidebar');
const sidebarBackdrop = $('sidebar-backdrop');

sidebarToggle.addEventListener('click', () => {
  const isOpen = sidebarEl.classList.contains('open');
  sidebarEl.classList.toggle('open', !isOpen);
  sidebarBackdrop.classList.toggle('open', !isOpen);
  sidebarToggle.setAttribute('aria-expanded', String(!isOpen));
});
sidebarBackdrop.addEventListener('click', () => {
  sidebarEl.classList.remove('open');
  sidebarBackdrop.classList.remove('open');
});

/* ── LOGOUT ── */
$('logout-btn').addEventListener('click', () => logoutModal.classList.add('open'));
$('logout-cancel-btn').addEventListener('click', () => logoutModal.classList.remove('open'));
logoutModal.addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});
$('logout-confirm-btn').addEventListener('click', () => {
  logoutModal.classList.remove('open');
  /* CONNECT: CLAP.Auth.clearTokens(); */
  window.location.href = 'signin.html';
});

/* ── INIT ── */
loadAssignments();


</script>

</body>
</html>
