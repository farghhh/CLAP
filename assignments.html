<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAP — My Assignments</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/app.css" />

  <style>
    /* ============================================================
       ASSIGNMENTS PAGE — PAGE SPECIFIC UI
       ============================================================ */
    .assign-page-wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ---- Header row ---- */
    .assign-page-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .assign-page-title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--clap-teal);
      line-height: 1.1;
    }

    .assign-page-title svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .assign-search {
      flex: 1;
      min-width: 250px;
      max-width: 360px;
      position: relative;
      display: flex;
      align-items: center;
    }

    .assign-search .s-icon {
      position: absolute;
      left: 14px;
      color: var(--placeholder);
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    .assign-search input {
      width: 100%;
      height: 44px;
      padding: 10px 14px 10px 40px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-pill);
      font-size: 0.88rem;
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .assign-search input:focus {
      outline: none;
      border-color: var(--clap-teal);
      box-shadow: 0 0 0 4px rgba(75, 191, 191, 0.10);
    }

    .assign-search input::placeholder {
      color: var(--placeholder);
    }

    .add-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 44px;
      padding: 0 20px;
      background: var(--grad-primary);
      color: var(--white);
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(75,191,191,0.28);
      transition: transform var(--transition), box-shadow var(--transition);
      white-space: nowrap;
    }

    .add-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(75,191,191,0.34);
    }

    /* ---- Tabs ---- */
    .tab-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: fit-content;
      margin: 0 auto 22px;
      background: var(--white);
      border-radius: var(--radius-pill);
      padding: 5px;
      box-shadow: var(--shadow-card);
    }

    .tab-btn {
      min-width: 178px;
      height: 40px;
      border: none;
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-heading);
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
    }

    .tab-btn.active {
      background: var(--clap-teal);
      color: var(--white);
      box-shadow: 0 4px 12px rgba(75,191,191,0.28);
    }

    .tab-btn:hover:not(.active) {
      color: var(--clap-teal);
    }

    /* ---- Shared view widths ---- */
    #view-progress,
    #view-all,
    #view-form {
      width: 100%;
    }

    /* ---- Progress view ---- */
    .progress-view-wrap {
      max-width: 860px;
      margin: 0 auto;
    }

    .progress-card {
      background: var(--white);
      border-radius: 24px;
      padding: 22px 24px;
      box-shadow: var(--shadow-card);
    }

    .progress-item {
      padding: 14px 0;
    }

    .progress-item + .progress-item {
      border-top: 1px solid var(--border);
    }

    .progress-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .progress-item-name {
      font-size: 0.92rem;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.35;
    }

    .progress-pct-badge {
      min-width: 46px;
      height: 28px;
      padding: 0 10px;
      border-radius: var(--radius-pill);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 0.72rem;
      font-weight: 800;
      flex-shrink: 0;
    }

    /* KEEP THIS prettier bar style */
    .progress-bar {
      height: 10px;
      width: 100%;
      background: #E6F3F5;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(75,191,191,0.08);
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #4BBFBF 0%, #3DA8C8 100%);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
      white-space: nowrap;
      overflow: hidden;
      transition: width 0.45s ease;
      min-width: 0;
    }

    .progress-fill.completed {
      background: linear-gradient(90deg, #2ECC71 0%, #22b562 100%);
    }

    .progress-fill.not-started {
      background: linear-gradient(90deg, #2f3e46 0%, #1f2a30 100%);
    }

    .progress-label {
      font-size: 0.54rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.95);
      line-height: 1;
      padding-top: 1px;
    }

    .progress-legend {
      margin-top: 14px !important;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      background: transparent;
      padding: 0;
      box-shadow: none;
      position: static;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ---- Table view: closer to design ---- */
    .assignments-table-wrap {
      max-width: 1030px;
      margin: 0 auto;
      background: #f9f9f9;
      border-radius: 24px;
      padding: 18px 20px 10px;
      box-shadow: none;
      overflow-x: auto;
    }

    .table-search-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .table-search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #8bb2bb;
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    .table-search-input {
      width: 100%;
      height: 52px;
      background: #deedf0;
      border: 1px solid #c8e0e6;
      border-radius: 999px;
      padding: 0 18px 0 46px;
      font-size: 0.95rem;
      color: var(--text-primary);
      box-shadow: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .table-search-input:focus {
      outline: none;
      border-color: var(--clap-teal);
      box-shadow: 0 0 0 3px rgba(75,191,191,0.08);
    }

    .table-search-input::placeholder {
      color: #8bb2bb;
    }

    .assignments-table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    .assignments-table th {
      padding: 16px 14px 14px;
      text-align: left;
      border-bottom: 1px solid #cfe2e6;
      font-family: var(--font-heading);
      font-size: 0.9rem;
      font-weight: 800;
      color: #7ea5af;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .assignments-table td {
      padding: 18px 14px;
      border-bottom: none;
      font-size: 0.96rem;
      font-weight: 600;
      color: #3d5562;
      vertical-align: middle;
    }

    .assignments-table tbody tr:hover {
      background: transparent;
    }

    .assignments-table tbody tr.overdue td {
      color: var(--danger);
    }

    .diff-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 64px;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: capitalize;
    }

    .diff-badge.easy {
      background: rgba(46,204,113,0.14);
      color: #25a75a;
    }

    .diff-badge.medium {
      background: rgba(243,156,18,0.14);
      color: #d9830a;
    }

    .diff-badge.hard {
      background: rgba(231,76,60,0.14);
      color: #db4b3d;
    }

    .tbl-action-cell {
      white-space: nowrap;
    }

    .tbl-action-btn svg {
      width: 16px;
      height: 16px;
    }

    .tbl-action-btn {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: #88aeb8;
      cursor: pointer;
      font-size: 1rem;
      transition: all var(--transition);
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tbl-action-btn:hover {
      background: rgba(75,191,191,0.08);
    }

    .tbl-action-btn.edit:hover {
      color: var(--clap-teal);
    }

    .tbl-action-btn.del:hover {
      color: var(--danger);
    }

    /* ---- Form view ---- */
    .assign-form-stage {
      max-width: 620px;
      margin: 0 auto;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      margin-bottom: 14px;
      transition: color var(--transition);
    }

    .back-btn:hover {
      color: var(--clap-teal);
    }

    .add-assign-title {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--clap-teal);
      margin-bottom: 22px;
    }

    .add-assign-wrap {
      background: var(--white);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow-card);
    }

    .form-field {
      margin-bottom: 16px;
    }

    .form-field label {
      display: block;
      font-size: 0.84rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 7px;
    }

    .form-field label span {
      color: var(--danger);
    }

    .form-field input,
    .form-field select {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      background: var(--input-bg);
      border: 1.5px solid transparent;
      border-radius: var(--radius-md);
      font-size: 0.92rem;
      color: var(--text-primary);
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    .form-field input:focus,
    .form-field select:focus {
      outline: none;
      border-color: var(--clap-teal);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(75,191,191,0.10);
    }

    .form-field input::placeholder {
      color: var(--placeholder);
    }

    .form-field input.error,
    .form-field select.error {
      border-color: var(--danger) !important;
      background: var(--danger-light) !important;
    }

    .save-btn {
      min-width: 132px;
      height: 44px;
      padding: 0 24px;
      background: var(--grad-primary);
      color: var(--white);
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.92rem;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(75,191,191,0.28);
      transition: transform var(--transition), box-shadow var(--transition);
      margin-top: 6px;
    }

    .save-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(75,191,191,0.34);
    }

    /* ---- Delete modal ---- */
    .delete-modal-icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
    }

    .delete-modal-title {
      font-family: var(--font-heading);
      font-size: 1.18rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .delete-modal-sub {
      color: var(--text-muted);
      font-size: 0.88rem;
      line-height: 1.5;
      margin-bottom: 22px;
    }

    .delete-modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ---- Responsive ---- */
    @media (max-width: 820px) {
      .assign-page-header {
        align-items: stretch;
      }

      .assign-search {
        max-width: none;
        width: 100%;
      }

      .add-btn {
        width: 100%;
      }

      .tab-bar {
        width: 100%;
        max-width: 420px;
      }

      .tab-btn {
        min-width: 0;
        flex: 1;
      }

      .progress-card,
      .assignments-table-wrap,
      .add-assign-wrap {
        padding-left: 18px;
        padding-right: 18px;
      }
    }

    @media (max-width: 560px) {
      .assign-page-title {
        font-size: 1.45rem;
      }

      .progress-item-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .progress-legend {
        align-items: flex-start;
        justify-content: flex-start;
        flex-direction: column;
        width: fit-content;
        margin-left: auto;
        margin-right: auto;
      }

      .add-assign-title {
        font-size: 1.55rem;
      }
    }
  </style>
</head>
<body>
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>
<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>

  <main class="main-content" id="main">
    <div class="assign-page-wrap">
      <!-- Header row -->
      <div class="assign-page-header">
        <h1 class="assign-page-title">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            <path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
          My Assignments
        </h1>

        <button class="add-btn ml-auto" id="add-btn" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          Add Assignment
        </button>
      </div>

      <!-- Tabs -->
      <div class="tab-bar" role="tablist" aria-label="Assignment views">
        <button class="tab-btn active" id="tab-progress" role="tab" data-tab="progress" aria-selected="true" type="button">
          Assignment Progress
        </button>
        <button class="tab-btn" id="tab-all" role="tab" data-tab="all" aria-selected="false" type="button">
          All Assignments
        </button>
      </div>

      <!-- Progress View -->
      <div id="view-progress">
        <div class="progress-view-wrap">
          <div class="progress-card" id="progress-list">
            <p style="color:var(--text-muted);text-align:center;padding:20px">Loading…</p>
          </div>

          <div class="progress-legend" style="margin-top:var(--space-md);">
            <div class="legend-item">
              <div class="legend-dot" style="background:var(--success)"></div>
              Completed
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:#222"></div>
              Not Started Yet
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:var(--clap-teal)"></div>
              In Progress
            </div>
          </div>
        </div>
      </div>

      <!-- All Assignments View -->
      <div id="view-all" style="display:none">
        <div class="assignments-table-wrap">
          <div class="table-search-wrap">
            <span class="table-search-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
            </span>
            <input
              class="table-search-input"
              id="table-search-input"
              type="search"
              placeholder="Find your assignments."
              autocomplete="off"
            />
          </div>

          <table class="assignments-table" id="assign-table">
            <thead>
              <tr>
                <th>No.</th>
                <th>Code</th>
                <th>Assignment Title</th>
                <th>Deadline</th>
                <th>Hours</th>
                <th>Difficulty</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="assign-tbody">
              <tr>
                <td colspan="7" style="text-align:center;padding:20px;color:var(--text-muted)">Loading…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Add / Edit Form -->
      <div id="view-form" style="display:none">
        <div class="assign-form-stage">
          <button class="back-btn" id="back-btn" type="button">&#8249; Back</button>
          <h2 class="add-assign-title" id="form-title">Add Assignment</h2>

          <div class="add-assign-wrap">
            <div class="form-field">
              <label for="f-code">Course Code<span>*</span></label>
              <input type="text" id="f-code" placeholder="Eg. CSC2343" maxlength="20" />
            </div>

            <div class="form-field">
              <label for="f-title">Assignment Title<span>*</span></label>
              <input type="text" id="f-title" placeholder="Eg. Database Final Project" maxlength="100" />
            </div>

            <div class="form-field">
              <label for="f-deadline">Deadline<span>*</span></label>
              <input type="date" id="f-deadline" />
            </div>

            <div class="form-field">
              <label for="f-hours">Estimated Hours<span>*</span></label>
              <input type="number" id="f-hours" placeholder="Eg. 6" min="1" max="999" />
            </div>

            <div class="form-field">
              <label for="f-difficulty">Difficulty Level<span>*</span></label>
              <select id="f-difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
              </select>
            </div>

            <button class="save-btn" id="save-btn" type="button">Save</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Delete Modal -->
<div
  id="del-modal"
  class="modal-overlay"
  style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(26,58,92,0.35);backdrop-filter:blur(4px);align-items:center;justify-content:center;"
>
  <div style="background:var(--white);border-radius:var(--radius-xl);padding:var(--space-xl);max-width:400px;width:90%;text-align:center;animation:modalIn 0.25s ease both;">
    <div class="delete-modal-icon">🗑️</div>
    <div class="delete-modal-title">Delete Assignment?</div>
    <div class="delete-modal-sub">
      This will permanently remove the assignment. This action cannot be undone.
    </div>
    <div class="delete-modal-actions">
      <button class="btn btn-ghost btn-sm" id="del-cancel" type="button">Cancel</button>
      <button class="btn btn-danger btn-sm" id="del-confirm" type="button">Delete</button>
    </div>
  </div>
</div>

<script src="js/core.js"></script>
<script src="js/app-shell.js"></script>
<script>
'use strict';

AppShell.init('assignments.html', { showTopbar: false });

const MOCK = [
  { id: 1, course_code: 'CSC2383', title: 'Database Final Project',         deadline: '2026-03-22', hours: 6,  difficulty: 'easy',   progress: 80 },
  { id: 2, course_code: 'CSC2613', title: 'Parallel Computing System',      deadline: '2026-03-25', hours: 10, difficulty: 'medium', progress: 60 },
  { id: 3, course_code: 'CSC2434', title: 'Mobile Application Development', deadline: '2026-03-31', hours: 25, difficulty: 'hard',   progress: 20 },
  { id: 4, course_code: 'CSC2672', title: 'UI/UX Design Prototype',         deadline: '2026-04-25', hours: 20, difficulty: 'hard',   progress: 100 },
  { id: 5, course_code: 'CSC4832', title: 'AI Research Thesis',             deadline: '2026-03-05', hours: 7,  difficulty: 'easy',   progress: 0 },
];

let assignments = [];
let editingId = null;
let deleteId = null;
let activeTab = 'progress';

/* ---- Normalize backend payload ---- */
function normalizeAssignment(a) {
  if (!a) return null;

  return {
    id: a.id ?? Date.now(),
    course_code: a.course_code ?? a.code ?? '',
    title: a.title ?? a.assignment_title ?? a.name ?? '',
    deadline: a.deadline ?? a.due_date ?? '',
    hours: Number(a.hours ?? a.estimated_hours ?? 0),
    difficulty: (a.difficulty ?? 'easy').toLowerCase(),
    progress: Number(a.progress ?? a.progress_percentage ?? 0),
  };
}

/* ---- Load ---- */
async function loadAssignments() {
  try {
    const data = await CLAP.API.get('/assignments/');
    assignments = Array.isArray(data) ? data.map(normalizeAssignment) : MOCK.map(normalizeAssignment);
  } catch {
    assignments = MOCK.map(normalizeAssignment);
  }
  renderProgress();
  renderTable();
}

/* ---- Search helpers ---- */
function getHeaderSearchValue() {
  return document.getElementById('search-input').value.toLowerCase();
}

function getTableSearchValue() {
  const el = document.getElementById('table-search-input');
  return el ? el.value.toLowerCase() : '';
}

function getCombinedQuery() {
  return (activeTab === 'all' ? getTableSearchValue() : getHeaderSearchValue()).trim();
}

/* ---- Progress View ---- */
function renderProgress() {
  const q = getHeaderSearchValue();
  const list = document.getElementById('progress-list');

  const items = assignments.filter(a =>
    !q ||
    a.title.toLowerCase().includes(q) ||
    a.course_code.toLowerCase().includes(q)
  );

  if (!items.length) {
    list.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">No assignments found.</p>';
    return;
  }

  list.innerHTML = items.map(a => {
    const pct = Math.max(0, Math.min(100, Number(a.progress ?? 0)));
    const isComplete = pct === 100;
    const isNotStart = pct === 0;
    const fillClass = isComplete ? 'completed' : isNotStart ? 'not-started' : '';
    const labelTxt = isComplete ? 'C O M P L E T E D' : isNotStart ? 'N O T  S T A R T E D  Y E T' : '';
    const badgeBg = isComplete ? 'var(--success)' : isNotStart ? '#222' : 'var(--clap-teal)';

    return `
      <div class="progress-item">
        <div class="progress-item-header">
          <div class="progress-item-name">${esc(a.course_code)} ${esc(a.title)}</div>
          <div class="progress-pct-badge" style="background:${badgeBg}">${pct}%</div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${fillClass}" style="width:${pct}%">
            ${labelTxt ? `<span class="progress-label">${labelTxt}</span>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

/* ---- Table View ---- */
function renderTable() {
  const q = getTableSearchValue();
  const items = assignments.filter(a =>
    !q ||
    a.title.toLowerCase().includes(q) ||
    a.course_code.toLowerCase().includes(q)
  );

  const tbody = document.getElementById('assign-tbody');

  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text-muted)">No assignments found.</td></tr>';
    return;
  }

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  tbody.innerHTML = items.map((a, i) => {
    const dl = new Date(a.deadline);
    const over = !isNaN(dl) && dl < today;
    const dlStr = !isNaN(dl) ? dl.toLocaleDateString('en-GB') : '—';
    const diff = a.difficulty || 'easy';

    return `
      <tr class="${over ? 'overdue' : ''}">
        <td>${i + 1}</td>
        <td>${esc(a.course_code)}</td>
        <td>${esc(a.title)}</td>
        <td>${dlStr}</td>
        <td>${a.hours || 0}</td>
        <td><span class="diff-badge ${diff}">${diff.charAt(0).toUpperCase() + diff.slice(1)}</span></td>
        <td class="tbl-action-cell">
          <button class="tbl-action-btn edit" onclick="startEdit('${safeId}')" title="Edit">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 20h9"/>
              <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
            </svg>
          </button>

          <button class="tbl-action-btn del" onclick="startDelete('${safeId}')" title="Delete">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4h6v2"/>
            </svg>
          </button>
        </td>
      </tr>
    `;
  }).join('');
}

/* ---- Tabs ---- */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-selected', 'false');
    });

    btn.classList.add('active');
    btn.setAttribute('aria-selected', 'true');
    activeTab = btn.dataset.tab;

    document.getElementById('view-progress').style.display = activeTab === 'progress' ? '' : 'none';
    document.getElementById('view-all').style.display = activeTab === 'all' ? '' : 'none';
    document.getElementById('view-form').style.display = 'none';
  });
});

/* ---- Search ---- */
document.getElementById('search-input').addEventListener('input', () => {
  renderProgress();
});

document.getElementById('table-search-input').addEventListener('input', () => {
  renderTable();
});

/* ---- Add ---- */
document.getElementById('add-btn').addEventListener('click', () => {
  editingId = null;
  document.getElementById('form-title').textContent = 'Add Assignment';
  ['f-code', 'f-title', 'f-deadline', 'f-hours'].forEach(id => {
    document.getElementById(id).value = '';
    document.getElementById(id).classList.remove('error');
  });
  document.getElementById('f-difficulty').value = 'easy';
  document.getElementById('f-difficulty').classList.remove('error');
  showView('form');
});

/* ---- Edit ---- */
window.startEdit = function(id) {
  const a = assignments.find(x => x.id === id);
  if (!a) return;

  editingId = id;
  document.getElementById('form-title').textContent = 'Edit Assignment';
  document.getElementById('f-code').value = a.course_code;
  document.getElementById('f-title').value = a.title;
  document.getElementById('f-deadline').value = a.deadline;
  document.getElementById('f-hours').value = a.hours;
  document.getElementById('f-difficulty').value = a.difficulty;
  showView('form');
};

/* ---- Delete ---- */
window.startDelete = function(id) {
  deleteId = id;
  document.getElementById('del-modal').style.display = 'flex';
};

document.getElementById('del-cancel').addEventListener('click', () => {
  document.getElementById('del-modal').style.display = 'none';
});

document.getElementById('del-confirm').addEventListener('click', async () => {
  document.getElementById('del-modal').style.display = 'none';

  try {
    await CLAP.API.delete(`/assignments/${deleteId}/`);
    assignments = assignments.filter(a => a.id !== deleteId);
  } catch {
    assignments = assignments.filter(a => a.id !== deleteId);
  }

  renderProgress();
  renderTable();
  CLAP.Toast.success('Assignment deleted.');
});

/* ---- Save ---- */
document.getElementById('save-btn').addEventListener('click', async () => {
  const codeEl = document.getElementById('f-code');
  const titleEl = document.getElementById('f-title');
  const dlEl = document.getElementById('f-deadline');
  const hrsEl = document.getElementById('f-hours');
  const diffEl = document.getElementById('f-difficulty');

  const code = codeEl.value.trim();
  const title = titleEl.value.trim();
  const dl = dlEl.value;
  const hrs = parseInt(hrsEl.value, 10);
  const diff = diffEl.value;

  [codeEl, titleEl, dlEl, hrsEl, diffEl].forEach(el => el.classList.remove('error'));

  let hasError = false;
  if (!code)  { codeEl.classList.add('error'); hasError = true; }
  if (!title) { titleEl.classList.add('error'); hasError = true; }
  if (!dl)    { dlEl.classList.add('error'); hasError = true; }
  if (!hrs || hrs < 1) { hrsEl.classList.add('error'); hasError = true; }

  if (hasError) {
    CLAP.Toast.error('Please fill all required fields.');
    return;
  }

  const payload = {
    course_code: code,
    title,
    deadline: dl,
    hours: hrs,
    difficulty: diff
  };

  try {
    if (editingId) {
      const updated = await CLAP.API.put(`/assignments/${editingId}/`, payload);
      const idx = assignments.findIndex(a => a.id === editingId);
      if (idx !== -1) {
        assignments[idx] = normalizeAssignment({ ...assignments[idx], ...payload, ...(updated || {}) });
      }
      CLAP.Toast.success('Assignment updated!');
    } else {
      const created = await CLAP.API.post('/assignments/', payload);
      assignments.push(normalizeAssignment(created || { id: Date.now(), ...payload, progress: 0 }));
      CLAP.Toast.success('Assignment added!');
    }
  } catch {
    if (editingId) {
      const idx = assignments.findIndex(a => a.id === editingId);
      if (idx !== -1) assignments[idx] = normalizeAssignment({ ...assignments[idx], ...payload });
    } else {
      assignments.push(normalizeAssignment({ id: Date.now(), ...payload, progress: 0 }));
    }
    CLAP.Toast.success(editingId ? 'Assignment updated!' : 'Assignment added!');
  }

  renderProgress();
  renderTable();
  showView(activeTab);
});

/* ---- Back ---- */
document.getElementById('back-btn').addEventListener('click', () => showView(activeTab));

function showView(name) {
  const header = document.querySelector('.assign-page-header');
  const tabs = document.querySelector('.tab-bar');

  if (name === 'form') {
    header.style.display = 'none';
    tabs.style.display = 'none';
  } else {
    header.style.display = '';
    tabs.style.display = '';
  }

  document.getElementById('view-progress').style.display = name === 'progress' ? '' : 'none';
  document.getElementById('view-all').style.display = name === 'all' ? '' : 'none';
  document.getElementById('view-form').style.display = name === 'form' ? '' : 'none';

  document.getElementById('tab-progress').classList.remove('active');
  document.getElementById('tab-all').classList.remove('active');
  document.getElementById('tab-progress').setAttribute('aria-selected', 'false');
  document.getElementById('tab-all').setAttribute('aria-selected', 'false');

  if (name === 'progress') {
    document.getElementById('tab-progress').classList.add('active');
    document.getElementById('tab-progress').setAttribute('aria-selected', 'true');
  }

  if (name === 'all') {
    document.getElementById('tab-all').classList.add('active');
    document.getElementById('tab-all').setAttribute('aria-selected', 'true');
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s ?? '';
  return d.innerHTML;
}

loadAssignments();
</script>
</body>
</html>
