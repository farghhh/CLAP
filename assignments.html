<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAP — My Assignments</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/app.css" />

  <style>
    /* ============================================================
       ASSIGNMENTS PAGE — PAGE SPECIFIC UI
       ============================================================ */

    .assign-page-wrap {
      width: 100%;
      max-width: none;
      margin: 0;
    }

    .assign-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .assign-page-title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--clap-teal);
      line-height: 1.1;
    }

    .assign-page-title svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .add-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 44px;
      padding: 0 20px;
      background: var(--grad-primary);
      color: var(--white);
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(75, 191, 191, 0.28);
      transition: transform var(--transition), box-shadow var(--transition);
      white-space: nowrap;
    }

    .add-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(75, 191, 191, 0.34);
    }

    /* ============================================================
       TABS
       ============================================================ */
    .tab-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: fit-content;
      margin: 0 auto 22px;
      background: var(--white);
      border-radius: var(--radius-pill);
      padding: 5px;
      box-shadow: var(--shadow-card);
      position: relative;
      z-index: 10;
    }

    .tab-btn {
      min-width: 178px;
      height: 40px;
      border: none;
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-heading);
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
    }

    .tab-btn.active {
      background: var(--clap-teal);
      color: var(--white);
      box-shadow: 0 4px 12px rgba(75, 191, 191, 0.28);
    }

    .tab-btn:hover:not(.active) {
      color: var(--clap-teal);
    }

    #view-progress,
    #view-all,
    #view-form {
      width: 100%;
    }

    /* ============================================================
       PROGRESS VIEW
       ============================================================ */
    .progress-view-wrap {
      width: 100%;
      max-width: none;
      margin: 0;
    }

    .progress-card {
      background: var(--white);
      border-radius: 24px;
      padding: 22px 24px;
      box-shadow: var(--shadow-card);
      width: 100%;
      margin: 0 0 20px;
      position: relative;
      z-index: 1;
    }

    .progress-item {
      padding: 14px 0;
    }

    .progress-item + .progress-item {
      border-top: 1px solid var(--border);
    }

    .progress-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .progress-item-name {
      font-size: 0.92rem;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.35;
    }

    .progress-pct-badge {
      min-width: 46px;
      height: 28px;
      padding: 0 10px;
      border-radius: var(--radius-pill);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 0.72rem;
      font-weight: 800;
      flex-shrink: 0;
    }

    .progress-bar {
      height: 10px;
      width: 100%;
      background: #E6F3F5;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(75, 191, 191, 0.08);
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #4BBFBF 0%, #3DA8C8 100%);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      white-space: nowrap;
      overflow: hidden;
      transition: width 0.45s ease;
      min-width: 0;
    }

    .progress-fill.has-label {
      padding-right: 10px;
    }

    .progress-fill.completed {
      background: linear-gradient(90deg, #2ECC71 0%, #22B562 100%);
    }

    .progress-label {
      font-size: 0.54rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.95);
      line-height: 1;
      padding-top: 1px;
    }

    .progress-legend {
      margin-top: 14px !important;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      background: transparent;
      padding: 0;
      box-shadow: none;
      position: static;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ============================================================
       TABLE VIEW
       ============================================================ */
    .assignments-table-wrap {
      max-width: none;
      margin: 0;
      width: 100%;
      background: var(--white);
      border-radius: 24px;
      padding: 20px;
      box-shadow: var(--shadow-card);
      overflow-x: auto;
    }

    .table-search-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .table-search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #8BB2BB;
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    .table-search-input {
      width: 100%;
      height: 52px;
      background: #DEEDF0;
      border: 1px solid #C8E0E6;
      border-radius: 999px;
      padding: 0 18px 0 46px;
      font-size: 0.95rem;
      color: var(--text-primary);
      box-shadow: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .table-search-input:focus {
      outline: none;
      border-color: var(--clap-teal);
      box-shadow: 0 0 0 3px rgba(75, 191, 191, 0.08);
    }

    .table-search-input::placeholder {
      color: #8BB2BB;
    }

    .assignments-table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    .assignments-table th {
      padding: 16px 14px 14px;
      text-align: left;
      border-bottom: 1px solid #CFE2E6;
      font-family: var(--font-heading);
      font-size: 0.9rem;
      font-weight: 800;
      color: #7EA5AF;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .assignments-table td {
      padding: 18px 14px;
      border-bottom: none;
      font-size: 0.96rem;
      font-weight: 600;
      color: #3D5562;
      vertical-align: middle;
    }

    .assignments-table tbody tr:hover {
      background: transparent;
    }

    .assignments-table tbody tr.overdue td {
      color: var(--danger);
    }

    .diff-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 64px;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: capitalize;
    }

    .diff-badge.easy   { background: rgba(46, 204, 113, 0.14); color: #25A75A; }
    .diff-badge.medium { background: rgba(243, 156, 18, 0.14);  color: #D9830A; }
    .diff-badge.hard   { background: rgba(231, 76, 60, 0.14);   color: #DB4B3D; }

    .tbl-action-cell { white-space: nowrap; }

    .tbl-action-btn {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: #88AEB8;
      cursor: pointer;
      font-size: 1rem;
      transition: all var(--transition);
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .tbl-action-btn svg { width: 16px; height: 16px; }
    .tbl-action-btn:hover { background: rgba(75, 191, 191, 0.08); }
    .tbl-action-btn.edit:hover { color: var(--clap-teal); }
    .tbl-action-btn.del:hover  { color: var(--danger); }

    /* ============================================================
       FORM VIEW
       ============================================================ */
    .assign-form-stage {
      width: min(100%, 620px);
      max-width: 620px;
      margin: 0;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      margin-bottom: 14px;
      transition: color var(--transition);
      padding: 0;
    }

    .back-btn:hover { color: var(--clap-teal); }

    .add-assign-title {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--clap-teal);
      margin-bottom: 22px;
      text-align: left;
    }

    .add-assign-wrap {
      background: var(--white);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow-card);
    }

    .form-field { margin-bottom: 16px; }

    .form-field label {
      display: block;
      font-size: 0.84rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 7px;
    }

    .form-field label span { color: var(--danger); }

    .form-field input,
    .form-field select {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      background: var(--input-bg);
      border: 1.5px solid transparent;
      border-radius: var(--radius-md);
      font-size: 0.92rem;
      color: var(--text-primary);
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    .form-field input:focus,
    .form-field select:focus {
      outline: none;
      border-color: var(--clap-teal);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(75, 191, 191, 0.10);
    }

    .form-field input::placeholder { color: var(--placeholder); }

    .form-field input.error,
    .form-field select.error {
      border-color: var(--danger) !important;
      background: var(--danger-light) !important;
    }

    .save-btn {
      min-width: 132px;
      height: 44px;
      padding: 0 24px;
      background: var(--grad-primary);
      color: var(--white);
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.92rem;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(75, 191, 191, 0.28);
      transition: transform var(--transition), box-shadow var(--transition);
      margin-top: 6px;
    }

    .save-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(75, 191, 191, 0.34);
    }

    .save-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    /* ============================================================
       DELETE MODAL
       ============================================================ */
    .delete-modal-icon {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--danger);
    }

    .delete-modal-title {
      font-family: var(--font-heading);
      font-size: 1.18rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .delete-modal-sub {
      color: var(--text-muted);
      font-size: 0.88rem;
      line-height: 1.5;
      margin-bottom: 22px;
    }

    .delete-modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 820px) {
      .assign-page-header { align-items: stretch; }
      .add-btn { width: 100%; }
      .tab-bar { width: 100%; max-width: 420px; }
      .tab-btn { min-width: 0; flex: 1; }
      .progress-card,
      .assignments-table-wrap,
      .add-assign-wrap { padding-left: 18px; padding-right: 18px; }
    }

    @media (max-width: 560px) {
      .assign-page-title { font-size: 1.45rem; }
      .progress-item-header { align-items: flex-start; flex-direction: column; }
      .progress-legend {
        align-items: flex-start;
        justify-content: flex-start;
        flex-direction: column;
        width: fit-content;
        margin-left: auto;
        margin-right: auto;
      }
      .add-assign-title { font-size: 1.55rem; }
    }
  </style>
</head>
<body>
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>

    <main class="main-content" id="main">
      <div class="assign-page-wrap">
        <div class="assign-page-header">
          <h1 class="assign-page-title">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
              <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
            My Assignments
          </h1>

          <button class="add-btn ml-auto" id="add-btn" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="16"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            Add Assignment
          </button>
        </div>

        <div class="tab-bar" role="tablist" aria-label="Assignment views">
          <button class="tab-btn active" id="tab-progress" role="tab" data-tab="progress" aria-selected="true" type="button">
            Assignment Progress
          </button>
          <button class="tab-btn" id="tab-all" role="tab" data-tab="all" aria-selected="false" type="button">
            All Assignments
          </button>
        </div>

        <!-- PROGRESS VIEW -->
        <div id="view-progress">
          <div class="progress-view-wrap">
            <div class="progress-card" id="progress-list">
              <p style="color:var(--text-muted);text-align:center;padding:20px">Loading…</p>
            </div>

            <div class="progress-legend" style="margin-top:var(--space-md);">
              <div class="legend-item">
                <div class="legend-dot" style="background:var(--success)"></div>
                Completed
              </div>
              <div class="legend-item">
                <div class="legend-dot" style="background:#222"></div>
                Not Started Yet
              </div>
              <div class="legend-item">
                <div class="legend-dot" style="background:var(--clap-teal)"></div>
                In Progress
              </div>
            </div>
          </div>
        </div>

        <!-- TABLE VIEW -->
        <div id="view-all" style="display:none">
          <div class="assignments-table-wrap">
            <div class="table-search-wrap">
              <span class="table-search-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.35-4.35"></path>
                </svg>
              </span>
              <input
                class="table-search-input"
                id="table-search-input"
                type="search"
                placeholder="Find your assignments."
                autocomplete="off"
              />
            </div>

            <table class="assignments-table" id="assign-table">
              <thead>
                <tr>
                  <th>No.</th>
                  <th>Code</th>
                  <th>Assignment Title</th>
                  <th>Deadline</th>
                  <th>Hours</th>
                  <th>Difficulty</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="assign-tbody">
                <tr>
                  <td colspan="7" style="text-align:center;padding:20px;color:var(--text-muted)">Loading…</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- FORM VIEW -->
        <div id="view-form" style="display:none">
          <div class="assign-form-stage">
            <button class="back-btn" id="back-btn" type="button">&#8249; Back</button>
            <h2 class="add-assign-title" id="form-title">Add Assignment</h2>

            <div class="add-assign-wrap">
              <div class="form-field">
                <label for="f-code">Course Code<span>*</span></label>
                <input type="text" id="f-code" placeholder="Eg. CSC2343" maxlength="20" />
              </div>

              <div class="form-field">
                <label for="f-title">Assignment Title<span>*</span></label>
                <input type="text" id="f-title" placeholder="Eg. Database Final Project" maxlength="100" />
              </div>

              <div class="form-field">
                <label for="f-deadline">Deadline<span>*</span></label>
                <input type="date" id="f-deadline" />
              </div>

              <div class="form-field">
                <label for="f-hours">Estimated Hours<span>*</span></label>
                <input type="number" id="f-hours" placeholder="Eg. 6" min="1" max="999" />
              </div>

              <div class="form-field">
                <label for="f-difficulty">Difficulty Level<span>*</span></label>
                <select id="f-difficulty">
                  <option value="easy">Easy</option>
                  <option value="medium">Medium</option>
                  <option value="hard">Hard</option>
                </select>
              </div>

              <button class="save-btn" id="save-btn" type="button">Save</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- DELETE MODAL -->
  <div
    id="del-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="del-modal-title"
    style="display:none;position:fixed;inset:0;z-index:99999;background:rgba(26,58,92,0.35);backdrop-filter:blur(4px);align-items:center;justify-content:center;"
  >
    <div style="background:var(--white);border-radius:var(--radius-xl);padding:var(--space-xl);max-width:400px;width:90%;text-align:center;animation:modalIn 0.25s ease both;">
      <div class="delete-modal-icon" aria-hidden="true">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
      </div>
      <div class="delete-modal-title" id="del-modal-title">Delete Assignment?</div>
      <div class="delete-modal-sub">
        This will permanently remove the assignment. This action cannot be undone.
      </div>
      <div class="delete-modal-actions">
        <button class="btn btn-ghost btn-sm" id="del-cancel" type="button">Cancel</button>
        <button class="btn btn-danger btn-sm" id="del-confirm" type="button">Delete</button>
      </div>
    </div>
  </div>

  <script src="js/core.js"></script>
  <script src="js/app-shell.js"></script>
  <script>
    'use strict';

    /* ============================================================
       APP SHELL
       ============================================================ */
    AppShell.init('assignments.html', { showTopbar: false });

    /* ============================================================
       FALLBACK DATA (used when API is unreachable)
       ============================================================ */
    const _d = (offset) => { const dt = new Date(); dt.setDate(dt.getDate() + offset); return dt.toISOString().slice(0,10); };
    const MOCK = [
      { id: 1, course_code: 'CSC2383', title: 'Database Final Project',    deadline: _d(14), hours: 6,  difficulty: 'easy',   progress: 80 },
      { id: 2, course_code: 'CSC2613', title: 'Parallel Computing System', deadline: _d(18), hours: 10, difficulty: 'medium', progress: 60 },
    ];

    /* ============================================================
       GLOBAL STATE
       ============================================================ */
    let assignments = [];
    let editingId   = null;
    let deleteId    = null;
    let activeTab   = 'progress';

    /* ============================================================
       HELPERS
       ============================================================ */
    function isNumericId(value) {
      return value !== null && value !== '' && !isNaN(Number(value));
    }

    function sortAssignmentsForDisplay(list) {
      const items = [...list];
      /* Backend always returns created_at; prefer that for stable ordering.
         Fall back to lexicographic id sort (handles string PKs like "T001"). */
      if (items.length && items.every(a => a.created_at)) {
        return items.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      }
      return items.sort((a, b) => String(a.id).localeCompare(String(b.id)));
    }

    function normalizeAssignment(a) {
      if (!a) return null;
      return {
        id:          a.id ?? Date.now(),
        course_code: a.course_code ?? a.code ?? '',
        title:       a.title ?? a.assignment_title ?? a.name ?? '',
        deadline:    a.deadline ?? a.due_date ?? '',
        hours:       Number(a.hours ?? a.estimated_hours ?? 0),
        difficulty:  (a.difficulty ?? 'easy').toLowerCase(),
        progress:    Number(a.progress ?? a.progress_percentage ?? 0),
        created_at:  a.created_at ?? a.createdAt ?? null,
      };
    }

    function esc(value) {
      const div = document.createElement('div');
      div.textContent = value ?? '';
      return div.innerHTML;
    }

    function formatDateDDMMYYYY(value) {
      const date = new Date(value);
      if (isNaN(date)) return '—';
      const day   = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      return `${day}/${month}/${date.getFullYear()}`;
    }

    function getTableSearchValue() {
      const el = document.getElementById('table-search-input');
      return el ? el.value.toLowerCase() : '';
    }

    /* ============================================================
       MODAL HELPERS — centralise open/close so nothing is missed
       ============================================================ */
    function openDeleteModal() {
      const modal = document.getElementById('del-modal');
      if (modal) modal.style.display = 'flex';
    }

    function closeDeleteModal() {
      const modal       = document.getElementById('del-modal');
      const confirmBtn  = document.getElementById('del-confirm');

      if (modal)      modal.style.display = 'none';

      /* FIX: always reset button state when modal closes */
      if (confirmBtn) {
        confirmBtn.disabled    = false;
        confirmBtn.textContent = 'Delete';
      }

      deleteId = null;
    }

    /* ============================================================
       DATA LOADING
       ============================================================ */
    async function loadAssignments() {
      try {
        const data = await CLAP.API.get('/assignments/');
        assignments = Array.isArray(data)
          ? sortAssignmentsForDisplay(data.map(normalizeAssignment))
          : sortAssignmentsForDisplay(MOCK.map(normalizeAssignment));
      } catch {
        assignments = sortAssignmentsForDisplay(MOCK.map(normalizeAssignment));
      }

      renderProgress();
      renderTable();
    }

    /* ============================================================
       RENDER: PROGRESS VIEW
       ============================================================ */
    function renderProgress() {
      const list = document.getElementById('progress-list');

      if (!assignments.length) {
        list.innerHTML = `<p style="color:var(--text-muted);text-align:center;padding:20px">No assignments found.</p>`;
        return;
      }

    list.innerHTML = assignments.map(a => {
        const pct          = Math.max(0, Math.min(100, Number(a.progress ?? 0)));
        const isComplete   = pct === 100;
        const isNotStarted = pct === 0;
        const badgeBg      = isComplete ? 'var(--success)' : isNotStarted ? '#222' : 'var(--clap-teal)';
        const labelTxt     = isComplete ? 'C O M P L E T E D' : '';
        /* Hours done based on progress percentage × total hours */
        const totalHrs     = a.hours || 0;
        const doneHrs      = pct > 0 ? (pct / 100 * totalHrs).toFixed(1) : 0;
        const hrsSub       = totalHrs > 0 ? `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px;">${doneHrs} / ${totalHrs} hrs completed</div>` : '';

        return `
          <div class="progress-item">
            <div class="progress-item-header">
              <div>
                <div class="progress-item-name">${esc(a.course_code)} ${esc(a.title)}</div>
                ${hrsSub}
              </div>
              <div class="progress-pct-badge" style="background:${badgeBg}">${pct}%</div>
            </div>
            <div class="progress-bar">
              ${pct > 0 ? `
                <div class="progress-fill ${isComplete ? 'completed' : ''} ${labelTxt ? 'has-label' : ''}" style="width:${pct}%">
                  ${labelTxt ? `<span class="progress-label">${labelTxt}</span>` : ''}
                </div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    /* ============================================================
       RENDER: TABLE VIEW
       ============================================================ */
    function renderTable() {
      const tbody = document.getElementById('assign-tbody');
      const query = getTableSearchValue();

      const filtered = assignments.filter(a =>
        !query ||
        a.title.toLowerCase().includes(query) ||
        a.course_code.toLowerCase().includes(query)
      );

      if (!filtered.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" style="text-align:center;padding:20px;color:var(--text-muted)">No assignments found.</td>
          </tr>`;
        return;
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      tbody.innerHTML = filtered.map((a, index) => {
        const dl       = new Date(a.deadline);
        const isOverdue = !isNaN(dl) && dl < today;
        const diff     = (a.difficulty || 'easy').toLowerCase();
        const safeId   = String(a.id).replace(/"/g, '&quot;');

        return `
          <tr class="${isOverdue ? 'overdue' : ''}">
            <td>${index + 1}</td>
            <td>${esc(a.course_code)}</td>
            <td>${esc(a.title)}</td>
            <td>${formatDateDDMMYYYY(a.deadline)}</td>
            <td>${a.hours || 0}</td>
            <td><span class="diff-badge ${diff}">${diff.charAt(0).toUpperCase() + diff.slice(1)}</span></td>
            <td class="tbl-action-cell">
              <button class="tbl-action-btn edit" data-action="edit"   data-id="${safeId}" title="Edit"   aria-label="Edit assignment"   type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                </svg>
              </button>
              <button class="tbl-action-btn del"  data-action="delete" data-id="${safeId}" title="Delete" aria-label="Delete assignment" type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
                  <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
                </svg>
              </button>
            </td>
          </tr>`;
      }).join('');
    }

    /* ============================================================
       TABLE ACTION CLICKS
       ============================================================ */
    document.getElementById('assign-tbody').addEventListener('click', (event) => {
      const btn = event.target.closest('button[data-action]');
      if (!btn) return;

      const { action, id } = btn.dataset;
      if (!id) return;

      if (action === 'edit')   startEdit(id);
      if (action === 'delete') startDelete(id);
    });

    /* ============================================================
       VIEW CONTROL
       ============================================================ */
    function showView(name) {
      const header = document.querySelector('.assign-page-header');
      const tabs   = document.querySelector('.tab-bar');

      if (name === 'form') {
        header.style.display = 'none';
        tabs.style.display   = 'none';
      } else {
        header.style.display = '';
        tabs.style.display   = '';
      }

      document.getElementById('view-progress').style.display = name === 'progress' ? '' : 'none';
      document.getElementById('view-all').style.display      = name === 'all'      ? '' : 'none';
      document.getElementById('view-form').style.display     = name === 'form'     ? '' : 'none';

      ['tab-progress', 'tab-all'].forEach(id => {
        document.getElementById(id).classList.remove('active');
        document.getElementById(id).setAttribute('aria-selected', 'false');
      });

      if (name === 'progress') {
        document.getElementById('tab-progress').classList.add('active');
        document.getElementById('tab-progress').setAttribute('aria-selected', 'true');
      }
      if (name === 'all') {
        document.getElementById('tab-all').classList.add('active');
        document.getElementById('tab-all').setAttribute('aria-selected', 'true');
      }
    }

    /* ============================================================
       TAB SWITCHING
       ============================================================ */
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        showView(activeTab);
      });
    });

    /* ============================================================
       SEARCH
       ============================================================ */
    const tableSearchInput = document.getElementById('table-search-input');
    if (tableSearchInput) tableSearchInput.addEventListener('input', renderTable);

    /* ============================================================
       OPEN FORM: ADD
       ============================================================ */
    document.getElementById('add-btn').addEventListener('click', () => {
      editingId = null;

      document.getElementById('form-title').textContent = 'Add Assignment';
      document.getElementById('f-code').value      = '';
      document.getElementById('f-title').value     = '';
      document.getElementById('f-deadline').value  = '';
      document.getElementById('f-hours').value     = '';
      document.getElementById('f-difficulty').value = 'easy';

      ['f-code', 'f-title', 'f-deadline', 'f-hours', 'f-difficulty'].forEach(id => {
        document.getElementById(id).classList.remove('error');
      });

      showView('form');
    });

    /* ============================================================
       OPEN FORM: EDIT
       ============================================================ */
    window.startEdit = function(id) {
      const item = assignments.find(a => String(a.id) === String(id));
      if (!item) return;

      editingId = item.id;

      document.getElementById('form-title').textContent  = 'Edit Assignment';
      document.getElementById('f-code').value            = item.course_code;
      document.getElementById('f-title').value           = item.title;
      document.getElementById('f-deadline').value        = item.deadline;
      document.getElementById('f-hours').value           = item.hours;
      document.getElementById('f-difficulty').value      = item.difficulty;

      /* Clear any validation error state left from a previous form session */
      ['f-code', 'f-title', 'f-deadline', 'f-hours', 'f-difficulty'].forEach(fid => {
        document.getElementById(fid).classList.remove('error');
      });

      showView('form');
    };

    /* ============================================================
       BACK BUTTON
       ============================================================ */
    document.getElementById('back-btn').addEventListener('click', () => {
      showView(activeTab);
    });

    /* ============================================================
       DELETE — open modal
       ============================================================ */
    window.startDelete = function(id) {
      if (!id) return;
      deleteId = id;
      openDeleteModal();
    };

    /* Cancel: close modal, reset state */
    document.getElementById('del-cancel').addEventListener('click', closeDeleteModal);

    /* Close modal when clicking the backdrop */
    document.getElementById('del-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeDeleteModal();
    });

    /* ============================================================
       DELETE — confirm
       FIX: modal always closes; button always re-enabled;
            204 / network errors don't block local removal;
            deleteId always cleared regardless of outcome.
       ============================================================ */
    document.getElementById('del-confirm').addEventListener('click', async () => {
      if (deleteId == null) return;

      const confirmBtn = document.getElementById('del-confirm');

      /* Prevent accidental double-clicks */
      confirmBtn.disabled    = true;
      confirmBtn.textContent = 'Deleting…';

      const idToDelete = deleteId; // capture before any async gap

      try {
        /* FIX: use bracket notation so 'delete' reserved word is never
           misread by the JS engine in strict mode */
        await CLAP.API['delete'](`/assignments/${idToDelete}/`);

      } catch (err) {
        const status = err?.status ?? 0;

        /* FIX: 404 means "already gone on the server" — treat as success.
           Network errors (status 0) still allow local removal so the UI
           stays consistent. Only real 4xx/5xx server errors (except 404)
           abort the operation. */
        if (status >= 400 && status !== 404) {
          CLAP.Toast.error(err.message || 'Failed to delete assignment.');
          closeDeleteModal();
          return;
        }
        /* Fall through for 404 / network errors — remove locally */
      }

      /* Remove from local state */
      assignments = assignments.filter(a => String(a.id) !== String(idToDelete));
      assignments = sortAssignmentsForDisplay(assignments);

      renderProgress();
      renderTable();

      /* FIX: close modal & reset button AFTER local state is updated */
      closeDeleteModal();

      /* Notify schedule.html (if open) that this assignment no longer exists */
      broadcastAssignmentChange('assignment_deleted', idToDelete);

      CLAP.Toast.success('Assignment deleted.');
    });

    /* ============================================================
       SAVE (ADD OR EDIT)
       ============================================================ */
    document.getElementById('save-btn').addEventListener('click', async () => {
      const codeEl     = document.getElementById('f-code');
      const titleEl    = document.getElementById('f-title');
      const deadlineEl = document.getElementById('f-deadline');
      const hoursEl    = document.getElementById('f-hours');
      const diffEl     = document.getElementById('f-difficulty');
      const saveBtn    = document.getElementById('save-btn');

      const payload = {
        course_code: codeEl.value.trim(),
        title:       titleEl.value.trim(),
        deadline:    deadlineEl.value,
        hours:       Number(hoursEl.value),
        difficulty:  diffEl.value,
      };

      [codeEl, titleEl, deadlineEl, hoursEl, diffEl].forEach(el => el.classList.remove('error'));

      let hasError = false;
      if (!payload.course_code)          { codeEl.classList.add('error');     hasError = true; }
      if (!payload.title)                { titleEl.classList.add('error');    hasError = true; }
      if (!payload.deadline) {
        deadlineEl.classList.add('error'); hasError = true;
      } else {
      /* FIX (Bug 2): Was `dl <= today` which rejected today, but core.js futureDate
         uses `>= today` which allows today. The backend also rejects deadline <= today.
         All three must agree: reject only dates strictly in the past (< today). */
        const today = new Date(); today.setHours(0,0,0,0);
        const dl    = new Date(payload.deadline);
        if (dl < today) {
          deadlineEl.classList.add('error');
          CLAP.Toast.error('Deadline must be today or in the future.');
          hasError = true;
        }
      }
      if (!payload.hours || payload.hours < 1) { hoursEl.classList.add('error'); hasError = true; }

      if (hasError) {
        CLAP.Toast.error('Please fill all required fields.');
        return;
      }

      saveBtn.disabled    = true;
      saveBtn.textContent = editingId ? 'Saving…' : 'Adding…';

      try {
        if (editingId) {
          const updated = await CLAP.API.put(`/assignments/${editingId}/`, payload);
          const index   = assignments.findIndex(a => String(a.id) === String(editingId));
          if (index !== -1) {
            assignments[index] = normalizeAssignment({ ...assignments[index], ...payload, ...(updated || {}) });
          }
          broadcastAssignmentChange('assignment_updated', editingId, { title: payload.title });
          CLAP.Toast.success('Assignment updated!');
        } else {
          const created = await CLAP.API.post('/assignments/', payload);
          assignments.push(normalizeAssignment({
            id:       created?.id ?? Date.now(),
            ...payload,
            ...(created || {}),
            progress: created?.progress ?? created?.progress_percentage ?? 0,
          }));
          CLAP.Toast.success('Assignment added!');
        }
      } catch {
        /* FIX: fall back to local update so the UI never silently breaks */
        if (editingId) {
          const index = assignments.findIndex(a => String(a.id) === String(editingId));
          if (index !== -1) {
            assignments[index] = normalizeAssignment({ ...assignments[index], ...payload });
          }
        } else {
          assignments.push(normalizeAssignment({ id: Date.now(), ...payload, progress: 0 }));
        }
        CLAP.Toast.success(editingId ? 'Assignment updated!' : 'Assignment added!');
      } finally {
        saveBtn.disabled    = false;
        saveBtn.textContent = 'Save';
      }

      assignments = sortAssignmentsForDisplay(assignments);
      renderProgress();
      renderTable();
      showView(activeTab);
    });

    /* ============================================================
       LIVE PROGRESS SYNC FROM SCHEDULE PAGE
       Listens for BroadcastChannel messages sent by toggleDone()
       in schedule.html and updates the local assignment progress
       + re-renders the progress bar without a full reload.
       ============================================================ */
    try {
      const progressChannel = new BroadcastChannel('clap_progress');
      progressChannel.addEventListener('message', (event) => {
        const { type, assignmentId, progress } = event.data || {};
        if (type !== 'progress_update' || assignmentId == null) return;

        const index = assignments.findIndex(a => String(a.id) === String(assignmentId));
        if (index !== -1) {
          assignments[index] = { ...assignments[index], progress: Number(progress) };
          renderProgress();
          /* If the table is currently visible, refresh it too */
          if (activeTab === 'all') renderTable();
        }
      });
    } catch {
      /* BroadcastChannel not supported (very old browsers) — silent fail */
    }

    /**
     * Broadcast an assignment change (rename, delete) to any other tab
     * running schedule.html so it can re-fetch or show stale indicators.
     * @param {'assignment_updated'|'assignment_deleted'} type
     * @param {string|number} id  Assignment ID
     * @param {object} [patch]    Changed fields (for 'assignment_updated')
     */
    function broadcastAssignmentChange(type, id, patch = {}) {
      try {
        const ch = new BroadcastChannel('clap_assignments');
        ch.postMessage({ type, assignmentId: id, ...patch });
        ch.close();
      } catch { /* silent */ }
    }

    /* ============================================================
       INITIAL LOAD
       ============================================================ */
    loadAssignments();
  </script>
</body>
</html>
