<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAP — My Assignments</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/app.css" />
  <style>
  /* ===== Page spacing ===== */
  .main-content {
    padding-top: 34px;
  }

  /* ===== Header ===== */
  .assign-page-header {
    display: grid;
    grid-template-columns: auto minmax(260px, 1fr) auto;
    align-items: center;
    gap: 18px;
    margin-bottom: 18px;
  }

  .assign-page-title {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin: 0;
    font-family: var(--font-heading);
    font-size: 2rem;
    font-weight: 800;
    color: var(--clap-teal);
    line-height: 1.1;
  }

  .assign-page-title svg {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }

  /* ===== Search ===== */
  .assign-search {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 44px;
    padding: 0 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.78);
    border: 1px solid rgba(75,191,191,0.14);
    box-shadow: 0 8px 24px rgba(31, 73, 125, 0.05);
    min-width: 260px;
    max-width: 420px;
  }

  .assign-search .s-icon {
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .assign-search input {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 0.95rem;
    font-weight: 600;
  }

  .assign-search input::placeholder {
    color: #9ab4bf;
  }

  /* ===== Add button ===== */
  .add-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 46px;
    padding: 0 18px;
    border: none;
    border-radius: 999px;
    background: var(--grad-primary);
    color: #fff;
    font-family: var(--font-heading);
    font-size: 0.98rem;
    font-weight: 800;
    box-shadow: 0 10px 24px rgba(75,191,191,0.25);
    cursor: pointer;
    transition: transform .18s ease, box-shadow .18s ease;
  }

  .add-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 28px rgba(75,191,191,0.32);
  }

  .ml-auto {
    margin-left: auto;
  }

  /* ===== Tabs ===== */
  .tab-bar {
    display: flex;
    justify-content: center;
    margin: 10px 0 26px;
  }

  .tab-bar[role="tablist"] {
    gap: 0;
    width: fit-content;
    padding: 5px;
    border-radius: 999px;
    background: rgba(255,255,255,0.82);
    box-shadow: 0 8px 24px rgba(31, 73, 125, 0.05);
  }

  .tab-btn {
    border: none;
    background: transparent;
    color: #8da4b0;
    min-width: 190px;
    height: 44px;
    padding: 0 20px;
    border-radius: 999px;
    font-family: var(--font-heading);
    font-size: 0.96rem;
    font-weight: 800;
    cursor: pointer;
    transition: all .18s ease;
  }

  .tab-btn.active {
    background: var(--grad-primary);
    color: #fff;
    box-shadow: 0 8px 18px rgba(75,191,191,0.24);
  }

  /* ===== Progress card ===== */
  .progress-card {
    max-width: 780px;
    margin: 0 auto;
    padding: 28px 38px;
    border-radius: 22px;
    background: rgba(255,255,255,0.88);
    box-shadow: 0 14px 32px rgba(31, 73, 125, 0.06);
  }

  .progress-item + .progress-item {
    margin-top: 18px;
  }

  .progress-item-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }

  .progress-item-name {
    color: var(--text-secondary);
    font-weight: 800;
    font-size: 0.95rem;
  }

  .progress-pct-badge {
    color: #fff;
    font-weight: 800;
  }

  .progress-bar {
    width: 100%;
    height: 8px;
    border-radius: 999px;
    background: #eaf3f5;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 999px;
    background: var(--clap-teal);
  }

  .progress-fill.completed {
    background: var(--success);
  }

  .progress-fill.not-started {
    background: #222;
  }

  .progress-legend {
    width: fit-content;
    margin-left: auto;
    padding: 14px 18px;
    border-radius: 18px;
    background: rgba(255,255,255,0.9);
    box-shadow: 0 12px 28px rgba(31, 73, 125, 0.06);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 0.82rem;
    font-weight: 700;
  }

  .legend-item + .legend-item {
    margin-top: 8px;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ===== Table ===== */
  .assignments-table-wrap {
    width: 100%;
    max-width: 980px;
    margin: 0 auto;
    padding: 14px 18px 6px;
    border-radius: 22px;
    background: rgba(255,255,255,0.88);
    box-shadow: 0 14px 32px rgba(31, 73, 125, 0.06);
    overflow-x: auto;
  }

  .assignments-table {
    width: 100%;
    border-collapse: collapse;
  }

  .assignments-table thead th {
    padding: 16px 14px;
    border-bottom: 2px solid #d9e9ee;
    color: #7397a7;
    font-size: 0.86rem;
    font-weight: 800;
    text-align: left;
  }

  .assignments-table tbody td {
    padding: 18px 14px;
    border-bottom: 1px solid #edf4f6;
    color: var(--text-secondary);
    font-size: 0.95rem;
    font-weight: 600;
  }

  .assignments-table tbody tr:last-child td {
    border-bottom: none;
  }

  .assignments-table tbody tr.overdue td {
    color: #a1aeb6;
  }

  .diff-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 56px;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 800;
  }

  .diff-badge.easy {
    background: #dff6e9;
    color: #21945b;
  }

  .diff-badge.medium {
    background: #fff2d8;
    color: #b98005;
  }

  .diff-badge.hard {
    background: #ffe0e0;
    color: #ca4d4d;
  }

  .tbl-action-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 4px 6px;
  }

  /* ===== Form ===== */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: none;
    background: transparent;
    color: var(--clap-teal);
    font-family: var(--font-heading);
    font-size: 1rem;      /* bigger */
    font-weight: 800;     /* thicker */
    padding: 8px 4px;     /* larger click area */
    margin-bottom: 18px;
    cursor: pointer;
  }

  .back-btn:hover {
    text-decoration: underline;
  }

  .add-assign-title {
    margin: 0 0 26px;
    color: var(--clap-teal);
    font-family: var(--font-heading);
    font-size: 2rem;
    font-weight: 800;
  }

  .add-assign-wrap {
    max-width: 640px;
  }

  .form-field {
    margin-bottom: 16px;
  }

  .form-field label {
    display: block;
    margin-bottom: 8px;
    color: #6f95a4;
    font-size: 0.88rem;
    font-weight: 800;
  }

  .form-field input,
  .form-field select {
    width: 100%;
    height: 46px;
    padding: 0 14px;
    border-radius: 12px;
    border: 1px solid rgba(75,191,191,0.18);
    background: rgba(255,255,255,0.88);
    outline: none;
    color: var(--text-secondary);
    font-size: 0.94rem;
    font-weight: 600;
  }

  .save-btn {
    margin-top: 8px;
    min-width: 110px;
    height: 46px;
    border: none;
    border-radius: 12px;
    background: var(--grad-primary);
    color: #fff;
    font-family: var(--font-heading);
    font-size: 0.98rem;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(75,191,191,0.25);
  }

  /* ===== Delete modal ===== */
  .delete-modal-icon {
    font-size: 2.5rem;
    margin-bottom: var(--space-md);
  }

  .delete-modal-title {
    font-family: var(--font-heading);
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: var(--space-sm);
  }

  .delete-modal-sub {
    color: var(--text-muted);
    font-size: 0.9rem;
    line-height: 1.5;
    margin-bottom: var(--space-xl);
  }

  .delete-modal-actions {
    display: flex;
    justify-content: center;
    gap: var(--space-md);
  }

  @media (max-width: 980px) {
    .assign-page-header {
      grid-template-columns: 1fr;
      align-items: stretch;
    }

    .assign-search {
      max-width: 100%;
    }

    .add-btn {
      margin-left: 0;
      width: fit-content;
    }

    .progress-legend {
      margin: 16px auto 0;
    }
  }

  @media (max-width: 700px) {
    .assign-page-title {
      font-size: 1.7rem;
    }

    .tab-btn {
      min-width: 150px;
      font-size: 0.9rem;
    }

    .assignments-table thead th,
    .assignments-table tbody td {
      padding-left: 10px;
      padding-right: 10px;
    }
  }
</style>
</head>
<body>
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>
<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main-content" id="main">

    <!-- ── Page header: title, search bar, add button ── -->
    <div class="assign-page-header">
      <h1 class="assign-page-title">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
        My Assignments
      </h1>

      <!-- Search bar filters both progress and table views -->
      <div class="assign-search">
        <span class="s-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </span>
        <input type="search" id="search-input" placeholder="Find your past assignments."
               autocomplete="off" aria-label="Search assignments" />
      </div>

      <!-- Opens the add-assignment form -->
      <button class="add-btn ml-auto" id="add-btn" aria-label="Add new assignment">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        Add Assignment
      </button>
    </div>

    <!-- ── Tab bar ── -->
    <div class="tab-bar" role="tablist">
      <button class="tab-btn active" id="tab-progress" role="tab"
              data-tab="progress" aria-selected="true">Assignment Progress</button>
      <button class="tab-btn"        id="tab-all"      role="tab"
              data-tab="all"         aria-selected="false">All Assignments</button>
    </div>

    <!-- ── Progress view: visual progress bars ── -->
    <div id="view-progress">
      <div class="progress-card" id="progress-list">
        <p style="color:var(--text-muted);text-align:center;padding:20px">Loading…</p>
      </div>
      <!-- Legend explaining the bar colour coding -->
      <div class="progress-legend" style="margin-top:var(--space-md);">
        <div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div>Completed</div>
        <div class="legend-item"><div class="legend-dot" style="background:#222"></div>Not Started Yet</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--clap-teal)"></div>In Progress</div>
      </div>
    </div>

    <!-- ── All assignments table view ── -->
    <div id="view-all" style="display:none">
      <div class="assignments-table-wrap">
        <table class="assignments-table" id="assign-table" aria-label="All assignments">
          <thead>
            <tr>
              <th>No.</th><th>Code</th><th>Assignment Title</th>
              <th>Deadline</th><th>Hours</th><th>Difficulty</th><th>Actions</th>
            </tr>
          </thead>
          <!-- tbody rows injected by renderTable() -->
          <tbody id="assign-tbody">
            <tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text-muted)">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ── Add / Edit form (hidden by default) ── -->
    <div id="view-form" style="display:none">
      <button class="back-btn" id="back-btn" aria-label="Go back">&#8249; Back</button>
      <h2 class="add-assign-title" id="form-title">Add Assignment</h2>
      <div class="add-assign-wrap">
        <div class="form-field">
          <label for="f-code">Course Code<span aria-hidden="true">*</span></label>
          <input type="text" id="f-code" placeholder="Eg; CSC2343" maxlength="20"
                 aria-required="true" />
        </div>
        <div class="form-field">
          <label for="f-title">Assignment Title<span aria-hidden="true">*</span></label>
          <input type="text" id="f-title" placeholder="Eg; Database Final Project" maxlength="100"
                 aria-required="true" />
        </div>
        <div class="form-field">
          <label for="f-deadline">Deadline<span aria-hidden="true">*</span></label>
          <input type="date" id="f-deadline" aria-required="true" />
        </div>
        <div class="form-field">
          <label for="f-hours">Estimated Hours<span aria-hidden="true">*</span></label>
          <input type="number" id="f-hours" placeholder="Eg; 6" min="1" max="999"
                 aria-required="true" />
        </div>
        <div class="form-field">
          <label for="f-difficulty">Difficulty Level<span aria-hidden="true">*</span></label>
          <select id="f-difficulty" aria-required="true">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>
        <button class="save-btn" id="save-btn">Save</button>
      </div>
    </div>

  </main>
</div>

<!-- ── Delete confirmation modal ── -->
<div id="del-modal" class="modal-overlay"
     style="display:none;position:fixed;inset:0;z-index:9000;
            background:rgba(26,58,92,0.35);backdrop-filter:blur(4px);
            align-items:center;justify-content:center;"
     role="dialog" aria-modal="true" aria-labelledby="del-modal-title">
  <div style="background:var(--white);border-radius:var(--radius-xl);padding:var(--space-xl);
              max-width:400px;width:90%;text-align:center;animation:modalIn 0.25s ease both;">
    <div class="delete-modal-icon" aria-hidden="true">🗑️</div>
    <div class="delete-modal-title" id="del-modal-title">Delete Assignment?</div>
    <div class="delete-modal-sub">This will permanently remove the assignment. This action cannot be undone.</div>
    <div class="delete-modal-actions">
      <button class="btn btn-ghost btn-sm"  id="del-cancel">Cancel</button>
      <button class="btn btn-danger btn-sm" id="del-confirm">Delete</button>
    </div>
  </div>
</div>

<script src="js/core.js"></script>
<script src="js/app-shell.js"></script>
<script>
'use strict';

/*
 * Assignments page uses its own header (assign-page-header)
 * instead of the AppShell topbar, so showTopbar: false.
 */
AppShell.init('assignments.html', { showTopbar: false });

/*
 * FIX: The original file had two copies of the MOCK array —
 * one commented-out block immediately followed by an identical
 * live block. The commented block is removed here; only the
 * active definition below remains.
 *
 * CONNECT: replace MOCK with real data from GET /api/assignments/
 */
const MOCK = [
  { id:1, course_code:'CSC2383', title:'Database Final Project',         deadline:'2026-03-22', hours:6,  difficulty:'easy',   progress:80  },
  { id:2, course_code:'CSC2613', title:'Parallel Computing System',      deadline:'2026-03-25', hours:10, difficulty:'medium', progress:60  },
  { id:3, course_code:'CSC2434', title:'Mobile Application Development', deadline:'2026-03-31', hours:25, difficulty:'hard',   progress:20  },
  { id:4, course_code:'CSC2672', title:'UI/UX Design Prototype',         deadline:'2026-04-25', hours:20, difficulty:'hard',   progress:100 },
  { id:5, course_code:'CSC4832', title:'AI Research Thesis',             deadline:'2026-03-05', hours:7,  difficulty:'easy',   progress:0   },
];

/* ── State ── */
let assignments = []; // current working dataset (API or mock)
let editingId   = null; // id of the assignment being edited (null = adding new)
let deleteId    = null; // id queued for deletion
let activeTab   = 'progress'; // which tab is currently visible

/* ── LOAD ───────────────────────────────────────────────────
   Fetch the assignment list from the API; fall back to MOCK.
   CONNECT: GET /api/assignments/
   ─────────────────────────────────────────────────────────── */
async function loadAssignments() {
  try {
    assignments = await CLAP.API.get('/assignments/');
  } catch {
    /* Backend not yet connected — use static mock data. */
    assignments = MOCK;
  }
  renderProgress();
  renderTable();
}

/* ── PROGRESS VIEW ──────────────────────────────────────────
   Renders visual progress bars for each assignment.
   Respects the current search query.
   ─────────────────────────────────────────────────────────── */
function renderProgress() {
  const q    = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('progress-list');

  /* Filter by search query across title and course code. */
  const items = assignments.filter(a =>
    !q ||
    a.title.toLowerCase().includes(q) ||
    a.course_code.toLowerCase().includes(q)
  );

  if (!items.length) {
    list.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">No assignments found.</p>';
    return;
  }

  list.innerHTML = items.map(a => {
    const pct        = a.progress ?? 0;
    const isComplete = pct === 100;
    const isNotStart = pct === 0;

    /* Colour and label vary by completion status. */
    const fillClass = isComplete ? 'completed' : isNotStart ? 'not-started' : '';
    const badgeBg   = isComplete ? 'var(--success)' : isNotStart ? '#222' : 'var(--clap-teal)';
    const labelTxt  = isComplete ? 'Completed' : isNotStart ? 'Not Started' : `${pct}% In Progress`;

    return `
      <div class="progress-item">
        <div class="progress-item-header">
          <div class="progress-item-name">${esc(a.course_code)} — ${esc(a.title)}</div>
          <div class="progress-pct-badge"
               style="background:${badgeBg};min-width:56px;border-radius:var(--radius-pill);
                      padding:4px 10px;font-size:0.7rem">${labelTxt}</div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${fillClass}" style="width:${pct}%"></div>
        </div>
      </div>`;
  }).join('');
}

/* ── TABLE VIEW ─────────────────────────────────────────────
   Renders the full assignments table with edit/delete actions.
   Overdue rows are styled with the .overdue class.
   ─────────────────────────────────────────────────────────── */
function renderTable() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const items = assignments.filter(a =>
    !q ||
    a.title.toLowerCase().includes(q) ||
    a.course_code.toLowerCase().includes(q)
  );

  const tbody = document.getElementById('assign-tbody');

  if (!items.length) {
    tbody.innerHTML =
      '<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text-muted)">No assignments found.</td></tr>';
    return;
  }

  /* Strip time portion so today's date is never falsely flagged as overdue. */
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  tbody.innerHTML = items.map((a, i) => {
    const dl    = new Date(a.deadline);
    const over  = dl < today;
    const dlStr = dl.toLocaleDateString('en-GB');
    const diff  = a.difficulty || 'easy';

    return `
      <tr class="${over ? 'overdue' : ''}">
        <td>${i + 1}</td>
        <td>${esc(a.course_code)}</td>
        <td>${esc(a.title)}</td>
        <td>${dlStr}</td>
        <td>${a.hours}</td>
        <td><span class="diff-badge ${diff}">${diff.charAt(0).toUpperCase() + diff.slice(1)}</span></td>
        <td style="display:flex;gap:4px;">
          <button class="tbl-action-btn edit" onclick="startEdit(${a.id})"   title="Edit assignment"   aria-label="Edit ${esc(a.title)}">✏️</button>
          <button class="tbl-action-btn del"  onclick="startDelete(${a.id})" title="Delete assignment" aria-label="Delete ${esc(a.title)}">🗑️</button>
        </td>
      </tr>`;
  }).join('');
}

/* ── TABS ───────────────────────────────────────────────────
   Toggle between progress and table views.
   ─────────────────────────────────────────────────────────── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    /* Update active tab button. */
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-selected', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-selected', 'true');

    activeTab = btn.dataset.tab;
    document.getElementById('view-progress').style.display = activeTab === 'progress' ? '' : 'none';
    document.getElementById('view-all').style.display      = activeTab === 'all'      ? '' : 'none';
    document.getElementById('view-form').style.display     = 'none';
  });
});

/* ── SEARCH ─────────────────────────────────────────────────
   Re-render both views whenever the search query changes.
   Also listens for the global clap:search custom event.
   ─────────────────────────────────────────────────────────── */
document.getElementById('search-input').addEventListener('input', () => {
  renderProgress();
  renderTable();
});
document.addEventListener('clap:search', e => {
  document.getElementById('search-input').value = e.detail;
  renderProgress();
  renderTable();
});

/* ── ADD ────────────────────────────────────────────────────
   Clear the form and switch to the add view.
   ─────────────────────────────────────────────────────────── */
document.getElementById('add-btn').addEventListener('click', () => {
  editingId = null;
  document.getElementById('form-title').textContent = 'Add Assignment';
  /* Clear all inputs. */
  ['f-code', 'f-title', 'f-deadline', 'f-hours'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-difficulty').value = 'easy';
  showView('form');
});

/* ── EDIT ───────────────────────────────────────────────────
   Populate the form with the selected assignment's data.
   CONNECT: data comes from the local `assignments` array
   (already fetched from GET /api/assignments/ on load).
   ─────────────────────────────────────────────────────────── */
window.startEdit = function(id) {
  const a = assignments.find(x => x.id === id);
  if (!a) return;

  editingId = id;
  document.getElementById('form-title').textContent    = 'Edit Assignment';
  document.getElementById('f-code').value              = a.course_code;
  document.getElementById('f-title').value             = a.title;
  document.getElementById('f-deadline').value          = a.deadline;
  document.getElementById('f-hours').value             = a.hours;
  document.getElementById('f-difficulty').value        = a.difficulty;
  showView('form');
};

/* ── DELETE ─────────────────────────────────────────────────
   Show the confirmation modal; actual deletion in del-confirm.
   CONNECT: DELETE /api/assignments/{id}/
   ─────────────────────────────────────────────────────────── */
window.startDelete = function(id) {
  deleteId = id;
  document.getElementById('del-modal').style.display = 'flex';
};

/* Close modal on Cancel click. */
document.getElementById('del-cancel').addEventListener('click', () => {
  document.getElementById('del-modal').style.display = 'none';
});

/* Close modal on backdrop click. */
document.getElementById('del-modal').addEventListener('click', function(e) {
  if (e.target === this) this.style.display = 'none';
});

/* Confirm deletion: call API then update local state. */
document.getElementById('del-confirm').addEventListener('click', async () => {
  document.getElementById('del-modal').style.display = 'none';
  try {
    await CLAP.API.delete(`/assignments/${deleteId}/`);
  } catch {
    /* Remove locally even if API fails (optimistic UI). */
  }
  assignments = assignments.filter(a => a.id !== deleteId);
  renderProgress();
  renderTable();
  CLAP.Toast.success('Assignment deleted.');
});

/* ── SAVE ───────────────────────────────────────────────────
   Validate form fields, then POST (new) or PUT (edit).
   CONNECT: POST /api/assignments/  or  PUT /api/assignments/{id}/
   ─────────────────────────────────────────────────────────── */
document.getElementById('save-btn').addEventListener('click', async () => {
  const codeEl  = document.getElementById('f-code');
  const titleEl = document.getElementById('f-title');
  const dlEl    = document.getElementById('f-deadline');
  const hrsEl   = document.getElementById('f-hours');

  const code  = codeEl.value.trim();
  const title = titleEl.value.trim();
  const dl    = dlEl.value;
  const hrs   = parseInt(hrsEl.value); // NaN when empty → falsy
  const diff  = document.getElementById('f-difficulty').value;

  /* Highlight empty/invalid fields with a red border. */
  [codeEl, titleEl, dlEl, hrsEl].forEach(el => {
    const invalid = !el.value.trim();
    el.style.borderColor = invalid ? 'var(--danger)' : '';
    el.style.background  = invalid ? 'var(--danger-light)' : '';
  });

  /* Guard: all required fields must have a value. */
  if (!code || !title || !dl || !hrs) {
    CLAP.Toast.error('Please fill all required fields.');
    return;
  }

  /* All valid — clear error styles. */
  [codeEl, titleEl, dlEl, hrsEl].forEach(el => {
    el.style.borderColor = '';
    el.style.background  = '';
  });

  const payload = { course_code: code, title, deadline: dl, hours: hrs, difficulty: diff };

  try {
    if (editingId) {
      /* Update an existing assignment. */
      await CLAP.API.put(`/assignments/${editingId}/`, payload);
      const idx = assignments.findIndex(a => a.id === editingId);
      if (idx !== -1) assignments[idx] = { ...assignments[idx], ...payload };
      CLAP.Toast.success('Assignment updated!');
    } else {
      /* Create a new assignment. */
      const created = await CLAP.API.post('/assignments/', payload);
      assignments.push(created || { id: Date.now(), ...payload, progress: 0 });
      CLAP.Toast.success('Assignment added!');
    }
  } catch {
    /* Optimistic local update if API call fails. */
    if (editingId) {
      const idx = assignments.findIndex(a => a.id === editingId);
      if (idx !== -1) assignments[idx] = { ...assignments[idx], ...payload };
    } else {
      assignments.push({ id: Date.now(), ...payload, progress: 0 });
    }
    CLAP.Toast.success(editingId ? 'Assignment updated!' : 'Assignment added!');
  }

  renderProgress();
  renderTable();
  showView(activeTab);
});

/* ── BACK BUTTON ────────────────────────────────────────────
   Return from the form view to whichever tab was active.
   ─────────────────────────────────────────────────────────── */
document.getElementById('back-btn').addEventListener('click', () => showView(activeTab));

/* ── VIEW SWITCHER ──────────────────────────────────────────
   Controls which of the three sections is visible and keeps
   the tab button states in sync.
   @param {'progress'|'all'|'form'} name
   ─────────────────────────────────────────────────────────── */
function showView(name) {
  const header = document.querySelector('.assign-page-header');
  const tabs   = document.querySelector('.tab-bar');

  /* Hide the header and tab bar when showing the form. */
  if (name === 'form') {
    header.style.display = 'none';
    tabs.style.display   = 'none';
  } else {
    header.style.display = '';
    tabs.style.display   = '';
  }

  document.getElementById('view-progress').style.display = name === 'progress' ? '' : 'none';
  document.getElementById('view-all').style.display      = name === 'all'      ? '' : 'none';
  document.getElementById('view-form').style.display     = name === 'form'     ? '' : 'none';

  /* Keep tab active classes in sync with the current view. */
  document.getElementById('tab-progress').classList.remove('active');
  document.getElementById('tab-all').classList.remove('active');
  if (name === 'progress') document.getElementById('tab-progress').classList.add('active');
  if (name === 'all')      document.getElementById('tab-all').classList.add('active');
}

/**
 * HTML-escape a string to safely render user-supplied text in innerHTML.
 * @param {string} s  Raw string.
 * @returns {string}  Escaped HTML string.
 */
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ── INIT ───────────────────────────────────────────────────── */
loadAssignments();
</script>
</body>
</html>
