<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAP — Forgot Password</title>
  <meta name="description" content="Reset your CLAP password" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<!-- Full-screen page loader (removed by CLAP.hideLoader()) -->
<div id="page-loader" role="status" aria-label="Loading">
  <div class="loader-logo">
    <img src="assets/clap-loader.png" alt="CLAP" class="loader-brand-img" />
    <div class="loader-spinner"></div>
  </div>
</div>

<!-- Toast notifications injected by Toast.show() -->
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>

<!-- ══════════════ FORGOT PASSWORD PAGE ══════════════ -->
<main class="auth-card-page" id="forgot-page">

  <!-- Decorative geometric shapes (purely visual) -->
  <div class="geo-tri-1" aria-hidden="true" style="bottom:25%;right:8%;"></div>
  <div class="geo-tri-2" aria-hidden="true" style="top:12%;left:12%;"></div>
  <div class="geo-rect"  aria-hidden="true" style="top:55%;right:6%;"></div>

  <div class="auth-card" role="main" aria-label="Forgot password form">

    <!-- Brand logo -->
    <div class="auth-card-logo" aria-label="CLAP Logo">
      <img src="assets/logo.png" alt="CLAP Logo" />
    </div>

    <!-- ── STEP 1: Enter email address ── -->
    <div id="step-email">
      <h1 class="auth-card-title">Forgot Password?</h1>
      <p class="auth-card-sub">
        Enter your email and we'll send you a link to change your password instantly.
      </p>

      <form id="forgot-form" novalidate style="width:100%">
        <div class="auth-fields">
          <div class="form-group">
            <label class="form-label sr-only" for="forgot-email">Email</label>
            <div class="form-input-wrap">
              <span class="input-icon" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="m2 7 10 7 10-7"/>
                </svg>
              </span>
              <input
                type="email"
                id="forgot-email"
                class="form-input"
                placeholder="Email"
                autocomplete="email"
                aria-required="true"
                aria-describedby="forgot-email-error"
                maxlength="254"
              />
            </div>
            <span class="field-error" id="forgot-email-error" role="alert"></span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="forgot-btn">
          SEND LINK
        </button>
        <!-- Screen-reader status announcements -->
        <span class="sr-only" id="forgot-status" aria-live="polite"></span>
      </form>

      <button type="button" class="back-to-login"
              onclick="window.location.href='signin.html'">
        Back to Login
      </button>
    </div>

    <!-- ── STEP 2: Confirmation (shown after the email is sent) ── -->
    <div id="step-confirm" class="hidden" aria-live="polite">
      <div class="check-email-icon" aria-hidden="true">📧</div>
      <h1 class="auth-card-title">Check Your Email</h1>
      <p class="auth-card-sub">
        If an account exists for <strong id="confirm-email-display"></strong>,
        you'll receive an email with a reset password link.
      </p>

      <div class="check-email-steps">
        <p>Check your inbox and follow the reset password link.</p>
      </div>

      <button type="button" class="btn btn-primary btn-full"
              onclick="window.location.href='signin.html'"
              aria-label="Return to sign in">
        BACK TO LOGIN
      </button>

      <!-- Resend option with 60-second cooldown -->
      <button type="button" class="back-to-login" id="resend-btn"
              style="margin-top:12px">
        Didn't receive it? Resend
      </button>
    </div>

  </div>
</main>

<script src="js/core.js"></script>
<script>
(function() {
  /* ── DOM references ── */
  const form        = document.getElementById('forgot-form');
  const emailInp    = document.getElementById('forgot-email');
  const submitBtn   = document.getElementById('forgot-btn');
  const statusEl    = document.getElementById('forgot-status');
  const stepEmail   = document.getElementById('step-email');
  const stepConfirm = document.getElementById('step-confirm');
  const confirmDisp = document.getElementById('confirm-email-display');
  const resendBtn   = document.getElementById('resend-btn');

  /* Tracks the most recently submitted email for the resend button. */
  let lastEmail = '';
  /* True during the 60-second cooldown after a resend. */
  let resendCooldown = false;

  /* Attach live validation to the email field. */
  const { Validate } = CLAP;
  Validate.attachLive(emailInp, [Validate.rules.required, Validate.rules.email]);

  /**
   * Submit a password-reset request.
   * Always shows the confirmation step regardless of success/failure
   * to prevent email enumeration (revealing whether an address exists).
   * CONNECT: POST /api/auth/password/reset/  { email }
   * @param {string} email  The address to send the reset link to.
   */
  async function sendLink(email) {
    submitBtn.classList.add('loading');
    submitBtn.disabled = true;
    statusEl.textContent = 'Sending reset link…';

    try {
      await CLAP.API.post('/auth/password/reset/', { email }, { auth: false });
    } catch (err) {
      /*
       * Silently absorb the error — we never reveal to the user whether
       * the email address is registered (security best practice).
       */
      console.warn('Password reset request:', err.message);
    } finally {
      submitBtn.classList.remove('loading');
      submitBtn.disabled = false;
    }

    /* Always show the confirmation step to avoid email enumeration. */
    lastEmail = email;
    confirmDisp.textContent = email;
    stepEmail.classList.add('hidden');
    stepConfirm.classList.remove('hidden');
    statusEl.textContent = 'Reset link sent.';
  }

  /* ── Form submit ── */
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    /* Validate email before calling the API. */
    const valid = Validate.form([
      { input: emailInp, rules: [Validate.rules.required, Validate.rules.email] },
    ]);
    if (!valid) return;

    await sendLink(emailInp.value.trim().toLowerCase());
  });

  /* ── Resend button ── */
  resendBtn.addEventListener('click', async () => {
    if (resendCooldown) {
      CLAP.Toast.warning('Please wait 60 seconds before resending.');
      return;
    }
    if (!lastEmail) return;

    /* Start 60-second cooldown. */
    resendCooldown = true;
    resendBtn.disabled = true;
    resendBtn.textContent = 'Sent! (60s cooldown)';

    try {
      await CLAP.API.post('/auth/password/reset/', { email: lastEmail }, { auth: false });
      CLAP.Toast.success('Reset link resent!');
    } catch {
      /* Still show success to prevent enumeration. */
      CLAP.Toast.info('Link resent if account exists.');
    }

    /* Re-enable after 60 seconds. */
    setTimeout(() => {
      resendCooldown = false;
      resendBtn.disabled = false;
      resendBtn.textContent = "Didn't receive it? Resend";
    }, 60000);
  });

  /* Hide the loading overlay once the page is ready. */
  CLAP.hideLoader();
})();
</script>
</body>
</html>
