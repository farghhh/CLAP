<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAP — Set New Password</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<div id="page-loader" role="status" aria-label="Loading">
  <div class="loader-logo">
    <img src="assets/clap-loader.png" alt="CLAP" class="loader-brand-img" />
    <div class="loader-spinner"></div>
  </div>
</div>
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>

<main class="auth-card-page">

  <div class="geo-tri-1" aria-hidden="true"></div>
  <div class="geo-tri-2" aria-hidden="true"></div>
  <div class="geo-rect"  aria-hidden="true"></div>

  <!-- Step 1: Set password form -->
  <div class="auth-card" id="step-form" role="main" aria-label="Set new password form">
    <div class="auth-card-logo" aria-label="CLAP Logo">
      <img src="assets/logo.png" alt="CLAP Logo"/>
    </div>

    <h1 class="auth-card-title">Set New Password</h1>
    <p class="auth-card-sub" id="token-status-msg"></p>

    <form id="set-pw-form" novalidate style="width:100%">
      <div class="auth-fields">

        <!-- New Password -->
        <div class="form-group">
          <label class="form-label sr-only" for="new-pw">New Password</label>
          <div class="form-input-wrap">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="new-pw"
              class="form-input"
              placeholder="New Password"
              autocomplete="new-password"
              aria-required="true"
              aria-describedby="new-pw-error new-pw-strength-label"
              maxlength="128"
            />
            <button type="button" class="pw-toggle" id="new-pw-toggle" aria-label="Show password">👁</button>
          </div>
          <div class="pw-strength" aria-live="polite">
            <div class="pw-strength-bar" role="progressbar" aria-label="Password strength">
              <div class="pw-strength-fill" id="new-pw-bar"></div>
            </div>
            <span class="pw-strength-label" id="new-pw-strength-label"></span>
          </div>
          <span class="field-error" id="new-pw-error" role="alert"></span>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label class="form-label sr-only" for="confirm-pw">Confirm New Password</label>
          <div class="form-input-wrap">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="confirm-pw"
              class="form-input"
              placeholder="Confirm New Password"
              autocomplete="new-password"
              aria-required="true"
              aria-describedby="confirm-pw-error"
              maxlength="128"
            />
            <button type="button" class="pw-toggle" id="confirm-pw-toggle" aria-label="Show password">👁</button>
          </div>
          <span class="field-error" id="confirm-pw-error" role="alert"></span>
        </div>

      </div>

      <button type="submit" class="btn btn-primary btn-full" id="set-pw-btn" disabled>
        SET NEW PASSWORD
      </button>
      <span class="sr-only" id="set-pw-status" aria-live="polite"></span>
    </form>

    <button type="button" class="back-to-login"
            onclick="window.location.href='signin.html'">
      Back to Login
    </button>
  </div>

  <!-- Step 2: Success -->
  <div class="auth-card hidden" id="step-success" role="main" aria-live="assertive">
    <div class="check-email-icon" aria-hidden="true">✅</div>
    <h1 class="auth-card-title" style="color:var(--success)">Password Reset!</h1>
    <p class="auth-card-sub">
      Your password has been successfully updated. You can now sign in with your new password.
    </p>
    <button type="button" class="btn btn-primary btn-full"
            onclick="window.location.href='signin.html'">
      GO TO SIGN IN
    </button>
  </div>

  <!-- Invalid token state -->
  <div class="auth-card hidden" id="step-invalid" role="main" aria-live="assertive">
    <div class="check-email-icon" aria-hidden="true">⚠️</div>
    <h1 class="auth-card-title" style="color:var(--warning)">Link Expired</h1>
    <p class="auth-card-sub">
      This password reset link is invalid or has expired. Please request a new one.
    </p>
    <button type="button" class="btn btn-primary btn-full"
            onclick="window.location.href='forgot-password.html'">
      REQUEST NEW LINK
    </button>
  </div>

</main>

<script src="js/core.js"></script>
<script>
(function() {
  /* Extract token & uid from URL: /reset-password.html?uid=XX&token=YY */
  const params = new URLSearchParams(window.location.search);
  const uid    = params.get('uid');
  const token  = params.get('token');

  const stepForm    = document.getElementById('step-form');
  const stepSuccess = document.getElementById('step-success');
  const stepInvalid = document.getElementById('step-invalid');

  /* Show invalid step if token or uid missing from URL */
  if (!uid || !token) {
    stepForm.classList.add('hidden');
    stepInvalid.classList.remove('hidden');
    CLAP.hideLoader();
    return;
  }

  const newPwInp      = document.getElementById('new-pw');
  const confirmPwInp  = document.getElementById('confirm-pw');
  const newPwToggle   = document.getElementById('new-pw-toggle');
  const confirmToggle = document.getElementById('confirm-pw-toggle');
  const newPwBar      = document.getElementById('new-pw-bar');
  const newPwLabel    = document.getElementById('new-pw-strength-label');
  const submitBtn     = document.getElementById('set-pw-btn');
  const statusEl      = document.getElementById('set-pw-status');
  const form          = document.getElementById('set-pw-form');

  CLAP.initPwToggle(newPwToggle, newPwInp);
  CLAP.initPwToggle(confirmToggle, confirmPwInp);
  CLAP.initPasswordStrength(newPwInp, newPwBar, newPwLabel);

  const { Validate } = CLAP;

  /* FIX: enable submit button based on both fields having content;
     also handle paste events so pasted passwords trigger the check */
  function checkEnableSubmit() {
    submitBtn.disabled = !(newPwInp.value.trim() && confirmPwInp.value.trim());
  }
  ['input', 'paste'].forEach(evt => {
    newPwInp.addEventListener(evt, () => setTimeout(checkEnableSubmit, 0));
    confirmPwInp.addEventListener(evt, () => setTimeout(checkEnableSubmit, 0));
  });

  Validate.attachLive(newPwInp,     [Validate.rules.required, Validate.rules.minLen(8), Validate.rules.pwStrength]);
  Validate.attachLive(confirmPwInp, [Validate.rules.required, Validate.rules.pwMatch(newPwInp)]);

  /* Re-validate confirm field whenever new password changes */
  newPwInp.addEventListener('input', () => {
    if (confirmPwInp.value) {
      const err = Validate.field(confirmPwInp.value, [Validate.rules.required, Validate.rules.pwMatch(newPwInp)]);
      Validate.setError(confirmPwInp, err);
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const valid = Validate.form([
      { input: newPwInp,     rules: [Validate.rules.required, Validate.rules.minLen(8), Validate.rules.pwStrength] },
      { input: confirmPwInp, rules: [Validate.rules.required, Validate.rules.pwMatch(newPwInp)] },
    ]);
    if (!valid) return;

    submitBtn.classList.add('loading');
    submitBtn.disabled = true;
    statusEl.textContent = 'Updating password…';

    try {
      /* CONNECT: POST /api/auth/password/reset/confirm/ */
      await CLAP.API.post('/auth/password/reset/confirm/', {
        uid,
        token,
        new_password1: newPwInp.value,
        new_password2: confirmPwInp.value,
      }, { auth: false });

      stepForm.classList.add('hidden');
      stepSuccess.classList.remove('hidden');
      CLAP.Toast.success('Password updated successfully!');
      statusEl.textContent = 'Password reset successful.';

      setTimeout(() => { window.location.href = 'signin.html'; }, 3000);

    } catch (err) {
      statusEl.textContent = 'Password reset failed.';
      submitBtn.classList.remove('loading');
      submitBtn.disabled = false;

      if (err.status === 400) {
        /* Token invalid / expired — show the invalid state */
        if (err.data && (err.data.token || err.data.uid)) {
          stepForm.classList.add('hidden');
          stepInvalid.classList.remove('hidden');
        } else {
          /* Other 400 errors (e.g. password too common, similar to username) */
          const msg = err.message || 'Invalid request. Please check your password and try again.';
          CLAP.Toast.error(msg);
          /* Show field-level error if Django returned specific field errors */
          if (err.data?.new_password2) {
            Validate.setError(confirmPwInp, Array.isArray(err.data.new_password2) ? err.data.new_password2[0] : err.data.new_password2);
          } else if (err.data?.new_password1) {
            Validate.setError(newPwInp, Array.isArray(err.data.new_password1) ? err.data.new_password1[0] : err.data.new_password1);
          }
        }
      } else {
        CLAP.Toast.error(err.message || 'Failed to reset password. Please try again.');
      }
    }
  });

  CLAP.hideLoader();
})();
</script>
</body>
</html>
